<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mborder2: #f3f4f6;
    --mtext: #374151;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mborder2: #22263a;
    --mtext: #c9cce0;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0
  }

  /* Tabs */
  .tabs-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--mborder);
    padding-bottom: 1px
  }

  .tab-btn {
    padding: 10px 20px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--mmuted);
    cursor: pointer;
    position: relative;
    transition: all .2s
  }

  .tab-btn:hover {
    color: var(--mtext2)
  }

  .tab-btn.active {
    color: #4f46e5
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: #4f46e5
  }

  .tab-content {
    display: none;
    animation: mfadeUp .3s ease
  }

  .tab-content.active {
    display: block
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mod-header p {
    color: var(--mmuted);
    font-size: 13px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-primary {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
  }

  .mbtn-primary:hover {
    background: #3730a3;
    transform: translateY(-1px)
  }

  .mbtn-edit {
    background: #e0e7ff;
    color: #3730a3;
    border: 1px solid #c7d2fe;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer
  }

  .mbtn-edit:hover {
    background: #c7d2fe
  }

  html[data-theme="dark"] .mbtn-edit {
    background: #2e3250;
    color: #a78bfa;
    border-color: #3d4270
  }

  .mbtn-danger {
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer
  }

  .mbtn-danger:hover {
    background: #fecaca
  }

  .filial-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    background: #e0e7ff;
    color: #3730a3;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600
  }

  html[data-theme="dark"] .filial-chip {
    background: #2e3250;
    color: #a78bfa
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 360px
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--mmuted);
    fill: none;
    pointer-events: none
  }

  .search-input {
    width: 100%;
    background: var(--mc);
    border: 1.5px solid var(--mborder);
    border-radius: 10px;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px 10px 34px;
    outline: none
  }

  .search-input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    width: 100%;
    flex-wrap: wrap
  }

  .mtable-wrap {
    background: var(--mc);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
    border: 1px solid var(--mborder);
    animation: mfadeUp .35s ease .05s both
  }

  html[data-theme="dark"] .mtable-wrap {
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
  }

  .mtable {
    width: 100%;
    border-collapse: collapse
  }

  .mtable thead tr {
    background: linear-gradient(90deg, #4f46e5, #6366f1)
  }

  .mtable th {
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, .9);
    font-weight: 600;
    text-align: left
  }

  .mtable td {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--mtext);
    border-bottom: 1px solid var(--mborder2);
    vertical-align: middle
  }

  .mtable tbody tr:last-child td {
    border-bottom: none
  }

  .mtable tbody tr:hover {
    background: var(--mc2)
  }

  .badge-dec {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fcd34d
  }

  .badge-cli {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #e5e7eb
  }

  html[data-theme="dark"] .badge-cli {
    background: #22263a;
    color: #c9cce0;
    border-color: #2e3250
  }

  .acoes-cell {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center
  }

  .mstate td {
    text-align: center;
    padding: 52px;
    color: var(--mmuted);
    font-size: 14px
  }

  .mstate-icon {
    font-size: 34px;
    display: block;
    margin-bottom: 10px
  }

  /* Import Excel Styles */
  .import-area {
    padding: 40px;
    text-align: center;
    border: 2px dashed var(--mborder);
    border-radius: 14px;
    background: var(--mc2);
    margin-bottom: 20px
  }

  .import-area svg {
    width: 48px;
    height: 48px;
    stroke: #4f46e5;
    margin-bottom: 12px
  }

  .import-area h3 {
    font-size: 16px;
    color: var(--mtext2);
    margin-bottom: 8px
  }

  .import-area p {
    font-size: 13px;
    color: var(--mmuted);
    margin-bottom: 20px
  }

  .progress-container {
    display: none;
    margin-top: 20px;
    text-align: left
  }

  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: var(--mborder);
    border-radius: 5px;
    overflow: hidden
  }

  .progress-bar-fill {
    width: 0%;
    height: 100%;
    background: #4f46e5;
    transition: width .3s
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--mmuted);
    margin-top: 8px
  }

  @media(max-width:700px) {
    .header-actions {
      flex-direction: column;
      align-items: flex-start
    }

    .search-wrap {
      max-width: 100%;
      width: 100%
    }

    .mtable-wrap {
      border-radius: 10px;
      overflow: visible;
      background: transparent;
      border: none;
      box-shadow: none
    }

    .mtable thead {
      display: none
    }

    .mtable tbody tr {
      display: block;
      background: var(--mc);
      border: 1px solid var(--mborder);
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(79, 70, 229, .06)
    }

    .mtable tbody tr:hover {
      background: var(--mc)
    }

    .mtable td {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--mborder2);
      font-size: 13px
    }

    .mtable td:last-child {
      border-bottom: none;
      padding-top: 10px
    }

    .mtable td::before {
      content: attr(data-label);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--mmuted);
      font-weight: 600;
      min-width: 90px;
      flex-shrink: 0
    }
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(10px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2>👥 Clientes</h2>
      <p>Filial: <span class="filial-chip" id="chip-fil-cli">—</span></p>
    </div>
    <button class="mbtn mbtn-primary"
      onclick="window._editData=null;carregarModulo('form_cliente.html','nav-clientes')">+ Novo Cliente</button>
  </div>

  <div class="tabs-nav">
    <button class="tab-btn active" onclick="CliMod.switchTab('lista', this)">Lista de Clientes</button>
    <button class="tab-btn" onclick="CliMod.switchTab('importar', this)">Importar Excel</button>
  </div>

  <!-- ABA LISTA -->
  <div id="tab-lista" class="tab-content active">
    <div class="header-actions" style="margin-bottom:16px">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
        </svg>
        <input class="search-input" type="text" id="busca-cli" placeholder="Pesquisar por nome ou telefone..."
          oninput="CliMod.filtrar(this.value)">
      </div>
    </div>
    <div class="mtable-wrap">
      <table class="mtable">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
            <th>CPF</th>
            <th>Tipo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-clientes">
          <tr class="mstate">
            <td colspan="6"><span class="mstate-icon">⏳</span>Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ABA IMPORTAR -->
  <div id="tab-importar" class="tab-content">
    <div class="import-area">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <h3>Importar Clientes via Excel</h3>
      <p>Selecione um arquivo .xlsx ou .xls com as colunas: <br><strong>Nome, Telefone, E-mail, CPF, Nascimento,
          Endereço, CEP,
          Bairro, Cidade, UF</strong></p>
      <input type="file" id="import-file-cli" accept=".xlsx, .xls" style="display:none"
        onchange="CliMod.importar(this)">
      <button class="mbtn mbtn-primary" onclick="document.getElementById('import-file-cli').click()">Selecionar
        Arquivo</button>

      <div class="progress-container" id="prog-cont-cli">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="prog-fill-cli"></div>
        </div>
        <div class="progress-info">
          <span id="prog-status-cli">Processando...</span>
          <span id="prog-perc-cli">0%</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  window.CliMod = (function () {
    var lista = [];
    (function () { var el = document.getElementById('chip-fil-cli'), f = window.filialLogada; if (el) el.textContent = f ? f.codigo + ' – ' + f.nome : 'Todas'; })();

    function switchTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      btn.classList.add('active');
    }

    function setTbody(h) { var el = document.getElementById('tabela-clientes'); if (el) el.innerHTML = h; }

    function render(data) {
      if (!data || !data.length) { setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">👥</span>Nenhum cliente cadastrado</td></tr>'); return; }
      setTbody(data.map(function (c) {
        var badge = c.decorador ? '<span class="badge-dec">🎨 Decorador</span>' : '<span class="badge-cli">👤 Cliente</span>';
        return '<tr id="cli-row-' + c.pk + '">' +
          '<td data-label="Nome"><strong style="color:var(--mtext2)">' + c.nome + '</strong></td>' +
          '<td data-label="Telefone">' + (c.telefone || '—') + '</td>' +
          '<td data-label="E-mail">' + (c.email || '—') + '</td>' +
          '<td data-label="CPF"><span style="font-family:DM Mono,monospace;font-size:13px">' + (c.cpf || '—') + '</span></td>' +
          '<td data-label="Tipo">' + badge + '</td>' +
          '<td data-label="Ações"><div class="acoes-cell">' +
          '<button class="mbtn-edit" onclick="CliMod.editar(' + c.pk + ')">Alterar</button>' +
          '<button class="mbtn-danger" onclick="CliMod.excluir(' + c.pk + ')">Excluir</button>' +
          '</div></td></tr>';
      }).join(''));
    }

    function filtrar(t) {
      if (!t || !t.trim()) { render(lista); return; }
      t = t.toLowerCase();
      render(lista.filter(function (c) { return c.nome.toLowerCase().includes(t) || (c.telefone || '').includes(t) || (c.email || '').toLowerCase().includes(t); }));
    }

    function editar(pk) { var c = lista.find(function (x) { return x.pk === pk; }); if (!c) return; window._editData = c; carregarModulo('form_cliente.html', 'nav-clientes'); }

    async function excluir(pk) {
      var c = lista.find(function (x) { return x.pk === pk; });
      if (!c || !confirm('Excluir cliente "' + c.nome + '"?')) return;
      var res = await window.supabase.from('clientes').delete().eq('pk', pk);
      if (res.error) { window.showToast('Erro: ' + res.error.message, 'error'); return; }
      lista = lista.filter(function (x) { return x.pk !== pk; });
      var row = document.getElementById('cli-row-' + pk); if (row) row.remove();
      window.showToast('"' + c.nome + '" excluído.'); if (!lista.length) render([]);
    }

    async function carregar() {
      setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">⏳</span>Carregando...</td></tr>');
      var f = window.filialLogada;
      var q = window.supabase.from('clientes').select('*').order('nome');
      if (f && f.pk) q = q.eq('filial_pk', f.pk);
      var res = await q;
      if (res.error) { setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro: ' + res.error.message + '</td></tr>'); return; }
      lista = res.data || []; render(lista);
    }

    async function importar(el) {
      var file = el.files[0]; if (!file) return;
      var reader = new FileReader();
      var progCont = document.getElementById('prog-cont-cli');
      var progFill = document.getElementById('prog-fill-cli');
      var progPerc = document.getElementById('prog-perc-cli');
      var progStatus = document.getElementById('prog-status-cli');

      reader.onload = async function (e) {
        try {
          var data = new Uint8Array(e.target.result);
          var workbook = XLSX.read(data, { type: 'array', cellDates: true });
          var sheet = workbook.Sheets[workbook.SheetNames[0]];
          var rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          if (!rows.length) { throw new Error('O arquivo está vazio.'); }

          // Identifica colunas pelo nome (flexível)
          var headers = (rows[0] || []).map(h => String(h || '').toLowerCase().trim());
          function getCol(keys) {
            return headers.findIndex(h => keys.some(k => h.includes(k.toLowerCase())));
          }

          var col = {
            nome: getCol(['nome', 'cliente', 'razao', 'nome completo']),
            telefone: getCol(['tel', 'fone', 'celular', 'whatsapp', 'contato']),
            email: getCol(['email', 'e-mail']),
            cpf: getCol(['cpf', 'doc', 'documento']),
            nasc: getCol(['nasc', 'data de nascimento', 'aniversario', 'dt']),
            cep: getCol(['cep']),
            end: getCol(['end', 'rua', 'logradouro', 'endereco']),
            num: getCol(['num', 'número', 'nº']),
            comp: getCol(['comp', 'complemento']),
            bairro: getCol(['bairro']),
            cidade: getCol(['cid', 'cidade', 'localidade']),
            uf: getCol(['uf', 'estado'])
          };

          function formatExcelDate(d) {
            if (!d) return null;
            if (d instanceof Date) return d.toISOString().split('T')[0];
            if (typeof d === 'number') {
              var date = new Date(Math.round((d - 25569) * 864e5));
              return date.toISOString().split('T')[0];
            }
            if (typeof d === 'string') {
              var parts = d.split(/[-/]/);
              if (parts.length === 3) {
                if (parts[0].length === 4) return d;
                if (parts[2].length === 4) return parts[2] + '-' + parts[1].padStart(2, '0') + '-' + parts[0].padStart(2, '0');
              }
            }
            return d;
          }

          progCont.style.display = 'block';
          var dataRows = rows.slice(1); // Pula o cabeçalho
          var total = dataRows.length;
          var sucessos = 0, erros = 0;
          var fil = window.filialLogada;

          function cleanTel(v) {
            if (!v) return null;
            v = String(v).trim();
            if (v.startsWith(':')) v = v.substring(1).trim();
            return v || null;
          }

          var batchSize = 50;
          for (var i = 0; i < total; i += batchSize) {
            var batch = dataRows.slice(i, i + batchSize).map(function (r) {
              function val(c) { return (c >= 0 && r[c]) ? String(r[c]).trim() : null; }
              var nome = val(col.nome);
              if (!nome) return null;
              return {
                nome: nome,
                telefone: cleanTel(r[col.telefone]),
                email: val(col.email),
                cpf: val(col.cpf),
                data_nascimento: formatExcelDate(r[col.nasc]),
                cep: val(col.cep),
                logradouro: val(col.end),
                numero: val(col.num),
                complemento: val(col.comp),
                bairro: val(col.bairro),
                cidade: val(col.cidade),
                uf: val(col.uf) ? val(col.uf).toUpperCase() : null,
                filial_pk: fil ? fil.pk : null
              };
            }).filter(Boolean);

            if (batch.length) {
              var { error } = await window.supabase.from('clientes').insert(batch);
              if (error) {
                console.error('Erro no lote:', error);
                window.showToast('Erro ao importar: ' + (error.details || error.message), 'error');
                erros += batch.length;
              } else {
                sucessos += batch.length;
              }
            }

            var perc = Math.round(((i + batch.length) / total) * 100);
            progFill.style.width = perc + '%';
            progPerc.textContent = perc + '%';
            progStatus.textContent = 'Importando ' + Math.min(i + batch.length, total) + ' de ' + total + '...';
          }

          window.showToast('Importação concluída: ' + sucessos + ' sucessos, ' + erros + ' erros.');
          el.value = '';
          setTimeout(() => {
            progCont.style.display = 'none';
            switchTab('lista', document.querySelector('.tab-btn'));
            carregar();
          }, 2000);
        } catch (err) {
          window.showToast('Erro ao ler arquivo: ' + err.message, 'error');
          progCont.style.display = 'none';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    carregar();
    return { filtrar, editar, excluir, switchTab, importar };
  })();
</script>
