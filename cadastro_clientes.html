<link rel="icon" href="img/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mborder2:#f3f4f6;--mtext:#374151;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mborder2:#22263a;--mtext:#c9cce0;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}.mod-header p{color:var(--mmuted);font-size:13px}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-edit{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-edit:hover{background:#c7d2fe}
html[data-theme="dark"] .mbtn-edit{background:#2e3250;color:#a78bfa;border-color:#3d4270}
.mbtn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-danger:hover{background:#fecaca}
.filial-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#e0e7ff;color:#3730a3;border-radius:20px;font-size:12px;font-weight:600}
html[data-theme="dark"] .filial-chip{background:#2e3250;color:#a78bfa}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:360px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--mmuted);fill:none;pointer-events:none}
.search-input{width:100%;background:var(--mc);border:1.5px solid var(--mborder);border-radius:10px;color:var(--mtext2);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px 10px 34px;outline:none}
.search-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.header-actions{display:flex;gap:10px;align-items:center;width:100%;flex-wrap:wrap}
.mtable-wrap{background:var(--mc);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mtable-wrap{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mtable{width:100%;border-collapse:collapse}
.mtable thead tr{background:linear-gradient(90deg,#4f46e5,#6366f1)}
.mtable th{padding:12px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.9);font-weight:600;text-align:left}
.mtable td{padding:12px 16px;font-size:14px;color:var(--mtext);border-bottom:1px solid var(--mborder2);vertical-align:middle}
.mtable tbody tr:last-child td{border-bottom:none}.mtable tbody tr:hover{background:var(--mc2)}
.badge-dec{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.badge-cli{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
html[data-theme="dark"] .badge-cli{background:#22263a;color:#c9cce0;border-color:#2e3250}
.acoes-cell{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mstate td{text-align:center;padding:52px;color:var(--mmuted);font-size:14px}
.mstate-icon{font-size:34px;display:block;margin-bottom:10px}
@media(max-width:700px){
  .header-actions{flex-direction:column;align-items:flex-start}.search-wrap{max-width:100%;width:100%}
  .mtable-wrap{border-radius:10px;overflow:visible;background:transparent;border:none;box-shadow:none}
  .mtable thead{display:none}
  .mtable tbody tr{display:block;background:var(--mc);border:1px solid var(--mborder);border-radius:10px;margin-bottom:12px;padding:14px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
  .mtable tbody tr:hover{background:var(--mc)}
  .mtable td{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--mborder2);font-size:13px}
  .mtable td:last-child{border-bottom:none;padding-top:10px}
  .mtable td::before{content:attr(data-label);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mmuted);font-weight:600;min-width:90px;flex-shrink:0}
}
@keyframes mfadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
<div class="mod">
  <div class="mod-header" style="flex-direction:column;align-items:flex-start;gap:14px">
    <div><h2>👥 Clientes</h2><p>Filial: <span class="filial-chip" id="chip-fil-cli">—</span></p></div>
    <div class="header-actions">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" type="text" id="busca-cli" placeholder="Pesquisar por nome ou telefone..." oninput="CliMod.filtrar(this.value)">
      </div>
      <button class="mbtn mbtn-primary" onclick="window._editData=null;carregarModulo('form_cliente.html','nav-clientes')">+ Novo Cliente</button>
    </div>
  </div>
  <div class="mtable-wrap">
    <table class="mtable">
      <thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>CPF</th><th>Tipo</th><th>Ações</th></tr></thead>
      <tbody id="tabela-clientes"><tr class="mstate"><td colspan="6"><span class="mstate-icon">⏳</span>Carregando...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
window.CliMod = (function(){
  var lista=[];
  (function(){var el=document.getElementById('chip-fil-cli'),f=window.filialLogada;if(el)el.textContent=f?f.codigo+' – '+f.nome:'Todas';})();
  function setTbody(h){var el=document.getElementById('tabela-clientes');if(el)el.innerHTML=h;}
  function render(data){
    if(!data||!data.length){setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">👥</span>Nenhum cliente cadastrado</td></tr>');return;}
    setTbody(data.map(function(c){
      var badge=c.decorador?'<span class="badge-dec">🎨 Decorador</span>':'<span class="badge-cli">👤 Cliente</span>';
      return '<tr id="cli-row-'+c.pk+'">'+
        '<td data-label="Nome"><strong style="color:var(--mtext2)">'+c.nome+'</strong></td>'+
        '<td data-label="Telefone">'+(c.telefone||'—')+'</td>'+
        '<td data-label="E-mail">'+(c.email||'—')+'</td>'+
        '<td data-label="CPF"><span style="font-family:DM Mono,monospace;font-size:13px">'+(c.cpf||'—')+'</span></td>'+
        '<td data-label="Tipo">'+badge+'</td>'+
        '<td data-label="Ações"><div class="acoes-cell">'+
          '<button class="mbtn-edit" onclick="CliMod.editar('+c.pk+')">Alterar</button>'+
          '<button class="mbtn-danger" onclick="CliMod.excluir('+c.pk+')">Excluir</button>'+
        '</div></td></tr>';
    }).join(''));
  }
  function filtrar(t){
    if(!t||!t.trim()){render(lista);return;}
    t=t.toLowerCase();
    render(lista.filter(function(c){return c.nome.toLowerCase().includes(t)||(c.telefone||'').includes(t)||(c.email||'').toLowerCase().includes(t);}));
  }
  function editar(pk){var c=lista.find(function(x){return x.pk===pk;});if(!c)return;window._editData=c;carregarModulo('form_cliente.html','nav-clientes');}
  async function excluir(pk){
    var c=lista.find(function(x){return x.pk===pk;});
    if(!c||!confirm('Excluir cliente "'+c.nome+'"?'))return;
    var res=await window.supabase.from('clientes').delete().eq('pk',pk);
    if(res.error){window.showToast('Erro: '+res.error.message,'error');return;}
    lista=lista.filter(function(x){return x.pk!==pk;});
    var row=document.getElementById('cli-row-'+pk);if(row)row.remove();
    window.showToast('"'+c.nome+'" excluído.');if(!lista.length)render([]);
  }
  async function carregar(){
    setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">⏳</span>Carregando...</td></tr>');
    var f=window.filialLogada;
    var q=window.supabase.from('clientes').select('*').order('nome');
    if(f&&f.pk) q=q.eq('filial_pk',f.pk);
    var res=await q;
    if(res.error){setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro: '+res.error.message+'</td></tr>');return;}
    lista=res.data||[];render(lista);
  }
  carregar();
  return {filtrar,editar,excluir};
})();
</script>
