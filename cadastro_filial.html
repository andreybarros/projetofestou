<link rel="icon" href="img/logo.png" type="image/png">
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mborder2: #f3f4f6;
    --mtext: #374151;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mborder2: #22263a;
    --mtext: #c9cce0;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mod-header p {
    color: var(--mmuted);
    font-size: 13px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-primary {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
  }

  .mbtn-primary:hover {
    background: #3730a3;
    transform: translateY(-1px)
  }

  .mbtn-edit {
    background: #e0e7ff;
    color: #3730a3;
    border: 1px solid #c7d2fe;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer
  }

  .mbtn-edit:hover {
    background: #c7d2fe
  }

  html[data-theme="dark"] .mbtn-edit {
    background: #2e3250;
    color: #a78bfa;
    border-color: #3d4270
  }

  .mbtn-danger {
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer
  }

  .mbtn-danger:hover {
    background: #fecaca
  }

  .mtable-wrap {
    background: var(--mc);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
    border: 1px solid var(--mborder);
    animation: mfadeUp .35s ease .05s both
  }

  html[data-theme="dark"] .mtable-wrap {
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
  }

  .mtable {
    width: 100%;
    border-collapse: collapse
  }

  .mtable thead tr {
    background: linear-gradient(90deg, #4f46e5, #6366f1)
  }

  .mtable th {
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, .9);
    font-weight: 600;
    text-align: left
  }

  .mtable td {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--mtext);
    border-bottom: 1px solid var(--mborder2);
    vertical-align: middle
  }

  .mtable tbody tr:last-child td {
    border-bottom: none
  }

  .mtable tbody tr:hover {
    background: var(--mc2)
  }

  .code-cell {
    font-family: 'DM Mono', monospace !important;
    font-size: 16px;
    font-weight: 700;
    color: #4f46e5
  }

  html[data-theme="dark"] .code-cell {
    color: #a78bfa
  }

  .badge-ativo {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #a7f3d0
  }

  .badge-inativo {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5
  }

  .acoes-cell {
    display: flex;
    gap: 6px;
    flex-wrap: wrap
  }

  @media(max-width:580px) {
    .mtable-wrap {
      border-radius: 10px;
      overflow: visible;
      background: transparent;
      border: none;
      box-shadow: none
    }

    .mtable thead {
      display: none
    }

    .mtable tbody tr {
      display: block;
      background: var(--mc);
      border: 1px solid var(--mborder);
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(79, 70, 229, .06)
    }

    .mtable tbody tr:hover {
      background: var(--mc)
    }

    .mtable td {
      display: flex;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--mborder2);
      font-size: 13px
    }

    .mtable td:last-child {
      border-bottom: none;
      padding-top: 10px
    }

    .mtable td::before {
      content: attr(data-label);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--mmuted);
      font-weight: 600;
      min-width: 80px;
      flex-shrink: 0
    }
  }

  .mstate td {
    text-align: center;
    padding: 52px;
    color: var(--mmuted);
    font-size: 14px
  }

  .mstate-icon {
    font-size: 34px;
    display: block;
    margin-bottom: 10px
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(10px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>
<div class="mod">
  <div class="mod-header">
    <div>
      <h2>🏢 Filiais Cadastradas</h2>
      <p>Gerenciar unidades da empresa</p>
    </div>
    <button class="mbtn mbtn-primary"
      onclick="window._editData=null; carregarModulo('form_filial.html','nav-filiais')">+ Cadastrar Filial</button>
  </div>
  <div class="mtable-wrap">
    <table class="mtable">
      <thead>
        <tr>
          <th>Código</th>
          <th>Nome</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-filiais">
        <tr class="mstate">
          <td colspan="4"><span class="mstate-icon">⏳</span>Carregando...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script>
  window._listaFiliais = [];
  async function carregarFiliais() {
    const { data, error } = await window.supabase.from('filiais').select('*').order('codigo');
    const tbody = document.getElementById('tabela-filiais');
    if (!tbody) return;
    if (error) { tbody.innerHTML = `<tr class="mstate"><td colspan="4"><span class="mstate-icon">❌</span>Erro: ${error.message}</td></tr>`; return; }
    if (!data || !data.length) { tbody.innerHTML = `<tr class="mstate"><td colspan="4"><span class="mstate-icon">🏢</span>Nenhuma filial cadastrada</td></tr>`; return; }
    window._listaFiliais = data;
    tbody.innerHTML = data.map(f => `
    <tr id="fil-row-${f.pk}">
      <td data-label="Código" class="code-cell">${f.codigo}</td>
      <td data-label="Nome">${f.nome}</td>
      <td data-label="Status"><span class="${f.ativo ? 'badge-ativo' : 'badge-inativo'}">${f.ativo ? 'Ativa' : 'Inativa'}</span></td>
      <td data-label="Ações"><div class="acoes-cell">
        <button class="mbtn-edit"   onclick="editarFilial(${f.pk})">Alterar</button>
        <button class="mbtn-danger" onclick="excluirFilial(${f.pk})">Excluir</button>
      </div></td>
    </tr>`).join('');
  }
  function editarFilial(pk) {
    window._editData = window._listaFiliais.find(f => f.pk === pk);
    carregarModulo('form_filial.html', 'nav-filiais');
  }
  async function excluirFilial(pk) {
    const f = window._listaFiliais.find(f => f.pk === pk);
    if (!f) return;
    if (!confirm(`Excluir filial "${f.nome}"?\nAtenção: isso afetará operadores e dados vinculados!`)) return;
    const { error } = await window.supabase.from('filiais').delete().eq('pk', pk);
    if (error) { window.showToast('Erro: ' + error.message, 'error'); return; }
    window._listaFiliais = window._listaFiliais.filter(x => x.pk !== pk);
    document.getElementById('fil-row-' + pk)?.remove();
    window.showToast('Filial excluída.');
  }
  carregarFiliais();
</script>
