<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mborder2:#f3f4f6;--mtext:#374151;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mborder2:#22263a;--mtext:#c9cce0;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}.mod-header p{color:var(--mmuted);font-size:13px}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-edit{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-edit:hover{background:#c7d2fe}
html[data-theme="dark"] .mbtn-edit{background:#2e3250;color:#a78bfa;border-color:#3d4270}
.mbtn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-danger:hover{background:#fecaca}
.mtable-wrap{background:var(--mc);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mtable-wrap{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mtable{width:100%;border-collapse:collapse}
.mtable thead tr{background:linear-gradient(90deg,#4f46e5,#6366f1)}
.mtable th{padding:12px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.9);font-weight:600;text-align:left}
.mtable td{padding:12px 16px;font-size:14px;color:var(--mtext);border-bottom:1px solid var(--mborder2);vertical-align:middle}
.mtable tbody tr:last-child td{border-bottom:none}.mtable tbody tr:hover{background:var(--mc2)}
.login-cell{font-family:'DM Mono',monospace!important;font-size:13px;color:#4f46e5}
html[data-theme="dark"] .login-cell{color:#a78bfa}
.badge-adm{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe}
.badge-op{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.badge-fil{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;font-family:'DM Mono',monospace}
html[data-theme="dark"] .badge-fil{background:#22263a;color:#c9cce0;border-color:#2e3250}
.badge-super{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.acoes-cell{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
@media(max-width:700px){
  .mtable-wrap{border-radius:10px;overflow:visible;background:transparent;border:none;box-shadow:none}
  .mtable thead{display:none}
  .mtable tbody tr{display:block;background:var(--mc);border:1px solid var(--mborder);border-radius:10px;margin-bottom:12px;padding:14px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
  .mtable tbody tr:hover{background:var(--mc)}
  .mtable td{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--mborder2);font-size:13px}
  .mtable td:last-child{border-bottom:none;padding-top:10px}
  .mtable td::before{content:attr(data-label);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mmuted);font-weight:600;min-width:85px;flex-shrink:0}
}
.mstate td{text-align:center;padding:52px;color:var(--mmuted);font-size:14px}
.mstate-icon{font-size:34px;display:block;margin-bottom:10px}
@keyframes mfadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
<div class="mod">
  <div class="mod-header">
    <div><h2>Operadores Cadastrados</h2><p id="op-scope-label">Carregando...</p></div>
    <button class="mbtn mbtn-primary" onclick="window._editData=null;carregarModulo('form_operador.html','nav-operador')">+ Cadastrar</button>
  </div>
  <div class="mtable-wrap">
    <table class="mtable">
      <thead><tr><th>Nome</th><th>Login</th><th>Filial</th><th>Perfil</th><th>Ações</th></tr></thead>
      <tbody id="tabela-operadores"><tr class="mstate"><td colspan="5"><span class="mstate-icon">⏳</span>Carregando...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
window._listaOperadores=[];
window._listaFiliaisOp=[];

async function carregarOperadores(){
  // Carrega filiais para mostrar nome
  const{data:fils}=await window.supabase.from('filiais').select('pk,codigo,nome');
  window._listaFiliaisOp=fils||[];

  const op=window.operadorLogado;
  const fil=window.filialLogada;
  let q=window.supabase.from('operadores').select('*').order('nome');
  // Superadmin (filial_pk null) vê todos. Admin de filial vê só a sua.
  if(op&&op.admin&&op.filial_pk){
    q=q.eq('filial_pk',op.filial_pk);
    document.getElementById('op-scope-label').textContent=`Filial ${fil?.codigo} – ${fil?.nome}`;
  } else if(op&&op.admin&&!op.filial_pk){
    document.getElementById('op-scope-label').textContent='Todas as filiais (superadmin)';
  }
  const{data,error}=await q;
  const tbody=document.getElementById('tabela-operadores');if(!tbody)return;
  if(error){tbody.innerHTML=`<tr class="mstate"><td colspan="5"><span class="mstate-icon">❌</span>Erro: ${error.message}</td></tr>`;return}
  if(!data||!data.length){tbody.innerHTML=`<tr class="mstate"><td colspan="5"><span class="mstate-icon">👤</span>Nenhum operador cadastrado</td></tr>`;return}
  window._listaOperadores=data;
  tbody.innerHTML=data.map(u=>{
    const filObj=window._listaFiliaisOp.find(f=>f.pk===u.filial_pk);
    const filBadge=filObj?`<span class="badge-fil">${filObj.codigo} – ${filObj.nome}</span>`:`<span class="badge-super">Superadmin</span>`;
    return `<tr id="op-row-${u.id}">
      <td data-label="Nome">${u.nome??'—'}</td>
      <td data-label="Login" class="login-cell">${u.login??'—'}</td>
      <td data-label="Filial">${filBadge}</td>
      <td data-label="Perfil">${u.admin?'<span class="badge-adm">Admin</span>':'<span class="badge-op">Operador</span>'}</td>
      <td data-label="Ações"><div class="acoes-cell">
        <button class="mbtn-edit" onclick="editarOperador(${u.id})">Alterar</button>
        ${u.login!=='Admin'?`<button class="mbtn-danger" onclick="excluirOperador(${u.id})">Excluir</button>`:'<span style="font-size:11px;color:var(--mmuted)">protegido</span>'}
      </div></td>
    </tr>`;}).join('');
}
function editarOperador(id){window._editData=window._listaOperadores.find(u=>u.id===id);carregarModulo('form_operador.html','nav-operador')}
async function excluirOperador(id){
  const u=window._listaOperadores.find(x=>x.id===id);if(!u)return;
  if(!confirm(`Excluir operador "${u.nome}"?`))return;
  const{error}=await window.supabase.from('operadores').delete().eq('id',id);
  if(error){window.showToast('Erro: '+error.message,'error');return}
  window._listaOperadores=window._listaOperadores.filter(x=>x.id!==id);
  document.getElementById('op-row-'+id)?.remove();
  window.showToast(`"${u.nome}" removido.`);
  if(!window._listaOperadores.length){const tbody=document.getElementById('tabela-operadores');if(tbody)tbody.innerHTML=`<tr class="mstate"><td colspan="5"><span class="mstate-icon">👤</span>Nenhum operador cadastrado</td></tr>`}
}
carregarOperadores();
</script>
