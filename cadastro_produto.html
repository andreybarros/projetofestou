<link rel="icon" href="img/logo.png" type="image/png">
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280;
    --mtext: #374151
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0;
    --mtext: #c9cce0
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mod-header p {
    color: var(--mmuted);
    font-size: 13px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-primary {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
  }

  .mbtn-primary:hover {
    background: #3730a3;
    transform: translateY(-1px)
  }

  .mbtn-ghost {
    background: var(--mc);
    color: #4f46e5;
    border: 1px solid #c7d2fe
  }

  .mbtn-ghost:hover {
    background: var(--mc2)
  }

  .edit-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #92400e
  }

  html[data-theme="dark"] .edit-banner {
    background: #2d2000;
    border-color: #78350f;
    color: #fcd34d
  }

  .mform-card {
    background: var(--mc);
    border-radius: 14px;
    padding: 24px 26px;
    max-width: 560px;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
    border: 1px solid var(--mborder);
    animation: mfadeUp .35s ease .05s both
  }

  html[data-theme="dark"] .mform-card {
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
  }

  @media(max-width:520px) {
    .mform-card {
      padding: 16px;
      border-radius: 10px
    }
  }

  .mform-group {
    margin-bottom: 15px
  }

  .mform-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    color: var(--mmuted);
    margin-bottom: 6px;
    text-transform: uppercase
  }

  .mform-group input {
    width: 100%;
    background: var(--mc2);
    border: 1.5px solid var(--mborder);
    border-radius: 8px;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s
  }

  .mform-group input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
  }

  .mform-group input::placeholder {
    color: #c4c9d9
  }

  .mform-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px
  }

  @media(max-width:400px) {
    .mform-row {
      grid-template-columns: 1fr
    }
  }

  .mdivider {
    height: 1px;
    background: var(--mborder);
    margin: 16px 0
  }

  .mform-footer {
    display: flex;
    gap: 10px;
    flex-wrap: wrap
  }

  .filial-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ede9fe;
    border: 1.5px solid #c4b5fd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    color: #4f46e5;
    width: 100%
  }

  html[data-theme="dark"] .filial-badge {
    background: #1e1a3a;
    border-color: #4c3a9e;
    color: #a78bfa
  }

  /* Foto */
  .foto-area {
    border: 2px dashed var(--mborder);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s;
    position: relative;
    overflow: hidden
  }

  .foto-area:hover {
    border-color: #a5b4fc
  }

  .foto-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%
  }

  .foto-placeholder {
    color: var(--mmuted);
    font-size: 13px
  }

  .foto-placeholder span {
    font-size: 32px;
    display: block;
    margin-bottom: 8px
  }

  .foto-placeholder strong {
    color: #4f46e5
  }

  .foto-preview {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 6px;
    display: block
  }

  .foto-preview-wrap {
    position: relative;
    display: inline-block;
    width: 100%
  }

  .btn-rm-foto {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #dc2626;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2
  }

  /* Localização dropdown */
  .loc-wrap {
    position: relative
  }

  .loc-input-row {
    display: flex;
    gap: 0
  }

  .loc-input-row input {
    border-radius: 8px 0 0 8px;
    cursor: pointer
  }

  .btn-lupa {
    background: #4f46e5;
    border: none;
    border-radius: 0 8px 8px 0;
    padding: 0 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-shrink: 0
  }

  .btn-lupa svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none
  }

  .loc-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--mc);
    border: 1.5px solid #c7d2fe;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(79, 70, 229, .18);
    z-index: 999;
    overflow: hidden;
    display: none
  }

  html[data-theme="dark"] .loc-dropdown {
    border-color: #3d4270;
    box-shadow: 0 8px 32px rgba(0, 0, 0, .4)
  }

  .loc-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--mborder)
  }

  .loc-search input {
    width: 100%;
    border: 1.5px solid var(--mborder);
    border-radius: 6px;
    padding: 8px 10px;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--mc2);
    color: var(--mtext2)
  }

  .loc-search input:focus {
    border-color: #4f46e5
  }

  .loc-list {
    max-height: 220px;
    overflow-y: auto
  }

  .loc-item {
    padding: 11px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--mborder);
    display: flex;
    gap: 10px;
    align-items: center;
    transition: background .1s
  }

  .loc-item:last-child {
    border-bottom: none
  }

  .loc-item:hover {
    background: var(--mc2)
  }

  .loc-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0
  }

  .loc-tag-f {
    background: #e0e7ff;
    color: #3730a3
  }

  .loc-tag-a {
    background: #d1fae5;
    color: #065f46
  }

  html[data-theme="dark"] .loc-tag-f {
    background: #2e3250;
    color: #a78bfa
  }

  html[data-theme="dark"] .loc-tag-a {
    background: #064e3b;
    color: #6ee7b7
  }

  .loc-empty {
    padding: 20px;
    text-align: center;
    color: var(--mmuted);
    font-size: 13px
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(8px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2 id="form-titulo">Cadastrar Produto</h2>
      <p id="form-subtitulo">Adicione um novo item ao estoque</p>
    </div>
    <button class="mbtn mbtn-ghost" onclick="window._editData=null;carregarModulo('get_produtos.html','nav-produtos')">←
      Ver Produtos</button>
  </div>
  <div id="edit-banner" class="edit-banner" style="display:none">
    ✏️ <span>Modo edição — altere os campos e clique em <strong>Salvar Alterações</strong></span>
  </div>
  <div class="mform-card">
    <!-- Filial -->
    <div class="mform-group">
      <label>Filial</label>
      <div class="filial-badge">🏢 <span id="f-filial-nome">—</span></div>
    </div>
    <!-- Foto -->
    <div class="mform-group">
      <label>Foto do Produto</label>
      <div class="foto-area" id="foto-area">
        <input type="file" id="f-foto" accept="image/*" capture="environment" onchange="ProdForm.onFoto(this)">
        <div id="foto-conteudo">
          <div class="foto-placeholder"><span>📷</span>
            <div>Toque para <strong>tirar foto</strong> ou escolher da galeria</div>
          </div>
        </div>
      </div>
    </div>
    <!-- Código + Saldo -->
    <div class="mform-row">
      <div class="mform-group"><label>Código</label><input type="text" id="f-codigo" placeholder="Ex: PRD-001"></div>
      <div class="mform-group"><label>Saldo</label><input type="number" id="f-saldo" placeholder="0" min="0"
          inputmode="numeric"></div>
    </div>
    <!-- Descrição -->
    <div class="mform-group"><label>Descrição</label><input type="text" id="f-descricao" placeholder="Nome do produto">
    </div>
    <!-- Localização -->
    <div class="mform-group">
      <label>Localização</label>
      <div class="loc-wrap" id="loc-wrap">
        <div class="loc-input-row">
          <input type="text" id="f-localizacao" placeholder="🔍 Buscar localização..." readonly
            onclick="ProdForm.abrirLoc()" style="cursor:pointer">
          <button class="btn-lupa" onclick="ProdForm.abrirLoc()" type="button">
            <svg viewBox="0 0 24 24" stroke-width="2">
              <circle cx="11" cy="11" r="7" />
              <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
            </svg>
          </button>
        </div>
        <div class="loc-dropdown" id="loc-dropdown">
          <div class="loc-search"><input type="text" id="loc-busca" placeholder="Filtrar..."
              oninput="ProdForm.filtrarLoc(this.value)"></div>
          <div class="loc-list" id="loc-list">
            <div class="loc-empty">⏳ Carregando...</div>
          </div>
        </div>
      </div>
    </div>
    <div class="mdivider"></div>
    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="btn-salvar" onclick="ProdForm.salvar()">Salvar Produto</button>
      <button class="mbtn mbtn-ghost" onclick="ProdForm.limpar()">Limpar</button>
    </div>
  </div>
</div>

<script>
  window.ProdForm = (function () {
    var editPk = null;
    var fotoAtual = null;
    var fotoFile = null;
    var armazens = [];
    var armFiltro = [];

    // Filial badge
    (function () {
      var f = window.filialLogada;
      var el = document.getElementById('f-filial-nome');
      if (el) el.textContent = f ? f.codigo + ' – ' + f.nome : 'Sem filial';
    })();

    // Modo edição
    (function () {
      var d = window._editData; window._editData = null;
      if (!d) { editPk = null; fotoAtual = null; return; }
      editPk = d.pk; fotoAtual = d.foto_url || null;
      document.getElementById('form-titulo').textContent = 'Alterar Produto';
      document.getElementById('form-subtitulo').textContent = 'Edite os dados e salve';
      document.getElementById('edit-banner').style.display = 'flex';
      document.getElementById('btn-salvar').textContent = 'Salvar Alterações';
      document.getElementById('f-codigo').value = d.codigo || '';
      document.getElementById('f-saldo').value = d.saldo ?? 0;
      document.getElementById('f-descricao').value = d.descricao || '';
      document.getElementById('f-localizacao').value = d.localizacao || '';
      if (d.foto_url) mostrarPreviewUrl(d.foto_url);
    })();

    // Fecha dropdown clicando fora
    document.addEventListener('click', function (e) {
      var wrap = document.getElementById('loc-wrap');
      if (wrap && !wrap.contains(e.target)) fecharLoc();
    });

    function fecharLoc() {
      var dd = document.getElementById('loc-dropdown');
      if (dd) dd.style.display = 'none';
    }

    async function abrirLoc() {
      var dd = document.getElementById('loc-dropdown');
      if (!dd) return;
      if (dd.style.display === 'block') { fecharLoc(); return; }
      dd.style.display = 'block';
      var lb = document.getElementById('loc-busca');
      if (lb) { lb.value = ''; setTimeout(function () { lb.focus(); }, 60); }

      if (!armazens.length) {
        setLocList('<div class="loc-empty">⏳ Carregando...</div>');
        try {
          var fil = window.filialLogada;
          var q = window.supabase.from('armazem').select('pk,filial,id,localizacao').order('filial').order('id');
          if (fil && fil.codigo) q = q.eq('filial', fil.codigo);
          var res = await q;
          if (res.error) throw res.error;
          armazens = (res.data || []);
        } catch (e) {
          setLocList('<div class="loc-empty" style="color:#ef4444">❌ ' + e.message + '</div>');
          return;
        }
      }
      armFiltro = armazens.slice();
      renderLoc(armFiltro);
    }

    function setLocList(h) { var el = document.getElementById('loc-list'); if (el) el.innerHTML = h; }

    function renderLoc(lista) {
      if (!lista || !lista.length) { setLocList('<div class="loc-empty">Nenhuma localização encontrada</div>'); return; }
      setLocList(lista.map(function (a) {
        var loc = (a.localizacao || '').replace(/'/g, "\\'");
        return '<div class="loc-item" onclick="ProdForm.selecionar(\'' + a.filial + '\',\'' + a.id + '\',\'' + loc + '\')">' +
          '<span class="loc-tag loc-tag-f">F' + a.filial + '</span>' +
          '<span class="loc-tag loc-tag-a">A' + a.id + '</span>' +
          '<span style="font-size:14px;color:var(--mtext2)">' + (a.localizacao || '') + '</span>' +
          '</div>';
      }).join(''));
    }

    function filtrarLoc(t) {
      t = (t || '').toLowerCase();
      armFiltro = t ? armazens.filter(function (a) {
        return String(a.filial || '').toLowerCase().includes(t) ||
          String(a.id || '').toLowerCase().includes(t) ||
          (a.localizacao || '').toLowerCase().includes(t);
      }) : armazens.slice();
      renderLoc(armFiltro);
    }

    function selecionar(f, i, l) {
      var el = document.getElementById('f-localizacao');
      if (el) el.value = 'F' + f + ' · A' + i + ' · ' + l;
      fecharLoc();
    }

    // Foto
    function onFoto(input) {
      if (!input.files || !input.files[0]) return;
      fotoFile = input.files[0];
      var r = new FileReader();
      r.onload = function (e) { mostrarPreviewLocal(e.target.result); };
      r.readAsDataURL(fotoFile);
    }
    function mostrarPreviewLocal(src) {
      document.getElementById('foto-conteudo').innerHTML =
        '<div class="foto-preview-wrap"><img class="foto-preview" src="' + src + '"><button class="btn-rm-foto" onclick="ProdForm.removerFoto(event)">✕</button></div>';
    }
    function mostrarPreviewUrl(url) {
      document.getElementById('foto-conteudo').innerHTML =
        '<div class="foto-preview-wrap"><img class="foto-preview" src="' + url + '"><button class="btn-rm-foto" onclick="ProdForm.removerFoto(event)">✕</button></div>';
    }
    function removerFoto(e) {
      if (e) { e.stopPropagation(); e.preventDefault(); }
      fotoFile = null; fotoAtual = null;
      document.getElementById('foto-conteudo').innerHTML =
        '<div class="foto-placeholder"><span>📷</span><div>Toque para <strong>tirar foto</strong> ou escolher da galeria</div></div>';
      var fi = document.getElementById('f-foto'); if (fi) fi.value = '';
    }

    async function uploadFoto(file) {
      var ext = file.name.split('.').pop();
      var nome = 'produto_' + Date.now() + '.' + ext;
      var res = await window.supabase.storage.from('produtos-fotos').upload(nome, file, { upsert: true, contentType: file.type });
      if (res.error) throw new Error('Upload: ' + res.error.message);
      return window.supabase.storage.from('produtos-fotos').getPublicUrl(nome).data.publicUrl;
    }

    async function salvar() {
      var codigo = (document.getElementById('f-codigo')?.value || '').trim();
      var descricao = (document.getElementById('f-descricao')?.value || '').trim();
      var saldo = parseInt(document.getElementById('f-saldo')?.value) || 0;
      var localizacao = (document.getElementById('f-localizacao')?.value || '').trim();

      if (!codigo) { window.showToast('Informe o código.', 'error'); return; }
      if (!descricao) { window.showToast('Informe a descrição.', 'error'); return; }

      var btn = document.getElementById('btn-salvar');
      btn.disabled = true; btn.textContent = 'Salvando...';

      try {
        var foto_url = fotoAtual;
        if (fotoFile) foto_url = await uploadFoto(fotoFile);

        var payload = { codigo, descricao, saldo, localizacao, foto_url, filial_pk: window.filialLogada?.pk || null };
        var res;
        if (editPk) {
          res = await window.supabase.from('produtos').update(payload).eq('pk', editPk);
        } else {
          res = await window.supabase.from('produtos').insert([payload]);
        }
        if (res.error) throw new Error(res.error.message);
        window.showToast(editPk ? 'Produto atualizado!' : 'Produto cadastrado!');
        editPk = null;
        carregarModulo('get_produtos.html', 'nav-produtos');
      } catch (e) {
        window.showToast('Erro: ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = editPk ? 'Salvar Alterações' : 'Salvar Produto';
      }
    }

    function limpar() {
      editPk = null; fotoFile = null; fotoAtual = null; armazens = [];
      ['f-codigo', 'f-descricao', 'f-saldo', 'f-localizacao'].forEach(function (id) {
        var el = document.getElementById(id); if (el) el.value = '';
      });
      removerFoto();
      document.getElementById('btn-salvar').textContent = 'Salvar Produto';
      document.getElementById('edit-banner').style.display = 'none';
      document.getElementById('form-titulo').textContent = 'Cadastrar Produto';
    }

    return { abrirLoc, filtrarLoc, selecionar, onFoto, removerFoto, salvar, limpar };
  })();
</script>
