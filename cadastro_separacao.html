<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mborder2:#f3f4f6;--mtext:#374151;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mborder2:#22263a;--mtext:#c9cce0;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}
.mod-header p{color:var(--mmuted);font-size:13px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-sm{padding:5px 12px;font-size:12px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s}
.mbtn-open{background:#e0e7ff;color:#3730a3}.mbtn-open:hover{background:#c7d2fe}
.mbtn-close{background:#d1fae5;color:#065f46}.mbtn-close:hover{background:#a7f3d0}
.mbtn-del{background:#fee2e2;color:#dc2626}.mbtn-del:hover{background:#fecaca}
html[data-theme="dark"] .mbtn-open{background:#2e3250;color:#a78bfa}
html[data-theme="dark"] .mbtn-close{background:#064e3b;color:#6ee7b7}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;animation:mfadeUp .3s ease .05s both}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--mborder);background:var(--mc);color:var(--mmuted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#4f46e5;border-color:#4f46e5;color:#fff}
.filial-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#e0e7ff;color:#3730a3;border-radius:20px;font-size:12px;font-weight:600}
html[data-theme="dark"] .filial-chip{background:#2e3250;color:#a78bfa}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;animation:mfadeUp .35s ease .08s both}
.ordem-card{background:var(--mc);border-radius:12px;border:1.5px solid var(--mborder);padding:18px;transition:box-shadow .15s,border-color .15s;cursor:pointer}
.ordem-card:hover{box-shadow:0 4px 20px rgba(79,70,229,.12);border-color:#a5b4fc}
html[data-theme="dark"] .ordem-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-numero{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:#4f46e5}
html[data-theme="dark"] .card-numero{color:#a78bfa}
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-status.a_separar{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.badge-status.em_separacao{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd}
.badge-status.encerrada{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.card-titulo{font-size:15px;font-weight:600;color:var(--mtext2);margin-bottom:6px}
.card-meta{font-size:12px;color:var(--mmuted);display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.card-meta span{display:flex;align-items:center;gap:5px}
.card-progress{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--mmuted);margin-bottom:4px}
.progress-bar{height:6px;background:var(--mborder);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4f46e5,#818cf8);transition:width .3s}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.mstate{text-align:center;padding:52px 20px;color:var(--mmuted);font-size:14px}
.mstate-icon{font-size:36px;display:block;margin-bottom:10px}
@keyframes mfadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2>📋 Ordens de Separação</h2>
      <p>Filial: <span class="filial-chip" id="chip-filial-sep">—</span></p>
    </div>
    <div class="header-right">
      <button class="mbtn mbtn-primary" id="btn-nova-ordem" onclick="SepList.nova()" style="display:none">+ Nova Ordem</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="SepList.filtrar('todos',this)">Todos</button>
    <button class="filter-btn" onclick="SepList.filtrar('a_separar',this)">🔴 A Separar</button>
    <button class="filter-btn" onclick="SepList.filtrar('em_separacao',this)">🔵 Em Separação</button>
    <button class="filter-btn" onclick="SepList.filtrar('encerrada',this)">🟢 Encerradas</button>
  </div>

  <div id="sep-container">
    <div class="mstate"><span class="mstate-icon">⏳</span>Carregando ordens...</div>
  </div>
</div>

<script>
window.SepList = (function(){
  var todas = [];
  var filtroAtivo = 'todos';

  // Chip filial + permissão botão nova ordem
  (function(){
    var f=window.filialLogada, el=document.getElementById('chip-filial-sep');
    if(el) el.textContent = f ? f.codigo+' – '+f.nome : 'Todas';
    var op=window.operadorLogado;
    var btn=document.getElementById('btn-nova-ordem');
    if(btn && op && (op.admin||op.acesso_criar_ordem)) btn.style.display='';
  })();

  var STATUS_LABEL = {a_separar:'🔴 A Separar', em_separacao:'🔵 Em Separação', encerrada:'🟢 Encerrada'};

  function setContainer(html){ var el=document.getElementById('sep-container'); if(el) el.innerHTML=html; }

  function calcPct(itens, movs){
    var solicit=0, separ=0;
    itens.forEach(function(i){ solicit+=i.qtd_solicitada; });
    movs.forEach(function(m){ separ+=m.qtd; });
    return solicit>0 ? Math.min(100,Math.round(separ/solicit*100)) : 0;
  }

  function render(lista){
    if(!lista||!lista.length){
      setContainer('<div class="mstate"><span class="mstate-icon">📋</span>Nenhuma ordem encontrada</div>');
      return;
    }
    var op=window.operadorLogado;
    var podeGerir  = op&&(op.admin||op.acesso_criar_ordem);
    var podeExcluir = op&&(op.admin||op.acesso_excluir_ordem);
    setContainer('<div class="cards-grid">'+lista.map(function(o){
      var pct = o._pct||0;
      var dataFmt = o.criado_em ? new Date(o.criado_em).toLocaleDateString('pt-BR') : '—';
      var eventoTxt = o._evento ? '📅 '+o._evento : '';
      return '<div class="ordem-card" onclick="SepList.abrirOrdem('+o.pk+')">' +
        '<div class="card-header">'+
          '<span class="card-numero">#'+String(o.numero).padStart(4,'0')+'</span>'+
          '<span class="badge-status '+o.status+'">'+(STATUS_LABEL[o.status]||o.status)+'</span>'+
        '</div>'+
        '<div class="card-titulo">'+o.titulo+'</div>'+
        '<div class="card-meta">'+
          (eventoTxt?'<span>'+eventoTxt+'</span>':'')+
          '<span>👤 '+o.criado_por+'  ·  📅 '+dataFmt+'</span>'+
        '</div>'+
        '<div class="card-progress">'+
          '<div class="progress-label"><span>Separado</span><span>'+pct+'%</span></div>'+
          '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
        '</div>'+
        '<div class="card-actions" onclick="event.stopPropagation()">'+
          '<button class="mbtn-sm mbtn-open" onclick="SepList.abrirOrdem('+o.pk+')">Abrir</button>'+
          (podeGerir&&o.status!=='encerrada'?'<button class="mbtn-sm mbtn-close" onclick="SepList.encerrar('+o.pk+',event)">Encerrar</button>':'')+
          (podeExcluir?'<button class="mbtn-sm mbtn-del" onclick="SepList.excluir('+o.pk+',event)">Excluir</button>':'')+
        '</div>'+
      '</div>';
    }).join('')+'</div>');
  }

  async function carregar(){
    setContainer('<div class="mstate"><span class="mstate-icon">⏳</span>Carregando...</div>');
    var fil=window.filialLogada;
    var q=window.supabase.from('ordens_separacao').select('*').order('pk',{ascending:false});
    if(fil&&fil.pk) q=q.eq('filial_pk',fil.pk);
    var res=await q;
    if(res.error){ setContainer('<div class="mstate"><span class="mstate-icon">❌</span>Erro: '+res.error.message+'</div>'); return; }
    todas=res.data||[];

    // Busca eventos da agenda para mostrar o título
    var agPks=[...new Set(todas.filter(function(o){return o.agenda_pk;}).map(function(o){return o.agenda_pk;}))];
    var evMap={};
    if(agPks.length){
      var re=await window.supabase.from('agenda').select('pk,titulo').in('pk',agPks);
      if(!re.error) (re.data||[]).forEach(function(e){evMap[e.pk]=e.titulo;});
    }

    // Busca progresso: itens + movimentos
    var pks=todas.map(function(o){return o.pk;});
    var riItens={}, riMovs={};
    if(pks.length){
      var ri=await window.supabase.from('itens_separacao').select('pk,ordem_pk,qtd_solicitada').in('ordem_pk',pks);
      (ri.data||[]).forEach(function(i){
        if(!riItens[i.ordem_pk]) riItens[i.ordem_pk]=[];
        riItens[i.ordem_pk].push(i);
      });
      var itemPks=(ri.data||[]).map(function(i){return i.pk;});
      if(itemPks.length){
        var rm=await window.supabase.from('movimentos_separacao').select('item_pk,qtd').in('item_pk',itemPks);
        (rm.data||[]).forEach(function(m){
          if(!riMovs[m.item_pk]) riMovs[m.item_pk]=[];
          riMovs[m.item_pk].push(m);
        });
      }
    }

    todas.forEach(function(o){
      o._evento = evMap[o.agenda_pk]||'';
      var itens=riItens[o.pk]||[];
      var movs=[]; itens.forEach(function(i){(riMovs[i.pk]||[]).forEach(function(m){movs.push(m);})});
      o._pct=calcPct(itens,movs);
    });

    aplicarFiltro();
  }

  function aplicarFiltro(){
    var lista = filtroAtivo==='todos' ? todas : todas.filter(function(o){return o.status===filtroAtivo;});
    render(lista);
  }

  function filtrar(status, btn){
    filtroAtivo=status;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
    if(btn) btn.classList.add('active');
    aplicarFiltro();
  }

  function abrirOrdem(pk){
    var o=todas.find(function(x){return x.pk===pk;});
    if(!o) return;
    window._ordemAtual=o;
    carregarModulo('ordem_separacao.html','nav-separacao');
  }

  async function encerrar(pk,e){
    if(e) e.stopPropagation();
    if(!confirm('Encerrar a ordem #'+String(pk).padStart(4,'0')+'?\nNão será possível separar mais itens após encerrar.')) return;
    var res=await window.supabase.from('ordens_separacao').update({status:'encerrada'}).eq('pk',pk);
    if(res.error){window.showToast('Erro: '+res.error.message,'error');return;}
    window.showToast('Ordem encerrada!');
    carregar();
  }

  async function excluir(pk,e){
    if(e) e.stopPropagation();
    var o=todas.find(function(x){return x.pk===pk;});
    if(!o||!confirm('Excluir ordem #'+String(o.numero).padStart(4,'0')+' "'+o.titulo+'"?\nTodos os itens e movimentos serão removidos.')) return;
    var res=await window.supabase.from('ordens_separacao').delete().eq('pk',pk);
    if(res.error){window.showToast('Erro: '+res.error.message,'error');return;}
    window.showToast('Ordem excluída.');
    carregar();
  }

  function nova(){
    window._editData=null; window._ordemAtual=null;
    carregarModulo('form_separacao.html','nav-separacao');
  }

  carregar();
  return {filtrar,abrirOrdem,encerrar,excluir,nova};
})();
</script>
