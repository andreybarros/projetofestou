<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
<style>
    .mod* {
        box-sizing: border-box
    }

    .mod {
        font-family: 'DM Sans', sans-serif;
        --mc: #fff;
        --mc2: #fafafe;
        --mborder: #e0e7ff;
        --mtext2: #1e1b4b;
        --mmuted: #6b7280;
        --mprimary: #4f46e5;
        --msuccess: #10b981;
        --mdanger: #ef4444;
        --mwarning: #f59e0b;
    }

    html[data-theme="dark"] .mod {
        --mc: #1a1d27;
        --mc2: #22263a;
        --mborder: #2e3250;
        --mtext2: #e8e9f3;
        --mmuted: #7b7fa0
    }

    .mod-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
        animation: mfadeUp .3s ease;
        gap: 12px;
        flex-wrap: wrap
    }

    .mod-header h2 {
        font-size: 20px;
        font-weight: 600;
        color: var(--mtext2);
        margin-bottom: 4px
    }

    .mod-header p {
        color: var(--mmuted);
        font-size: 13px
    }

    .mbtn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        transition: all .15s;
        white-space: nowrap
    }

    .mbtn-primary { background: var(--mprimary); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.25) }
    .mbtn-primary:hover { background: #3730a3 }
    .mbtn-success { background: var(--msuccess); color: #fff }
    .mbtn-success:hover { background: #059669 }
    .mbtn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5 }
    .mbtn-danger:hover { background: #fecaca }
    .mbtn-ghost { background: var(--mc); color: var(--mprimary); border: 1px solid var(--mborder) }
    .mbtn-ghost:hover { background: var(--mc2) }

    .espelho-card {
        background: var(--mc);
        border-radius: 14px;
        border: 1px solid var(--mborder);
        margin-bottom: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(79,70,229,.08);
        animation: mfadeUp .35s ease .05s both
    }

    .espelho-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        gap: 12px;
        flex-wrap: wrap;
        cursor: pointer;
    }

    .espelho-card-header:hover { background: var(--mc2) }

    .espelho-card.pending .espelho-card-header {
        background: #fffbeb;
        border-bottom: 1px solid #fcd34d;
    }

    html[data-theme="dark"] .espelho-card.pending .espelho-card-header {
        background: #2d2000;
        border-bottom-color: #78350f;
    }

    .badge {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap
    }

    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d }
    .badge-approved { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0 }
    .badge-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5 }

    .espelho-body {
        padding: 20px;
        border-top: 1px solid var(--mborder);
        display: none;
    }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 16px
    }

    .stat-box {
        background: var(--mc2);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--mborder)
    }

    .stat-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--mmuted);
        text-transform: uppercase;
        margin-bottom: 4px
    }

    .stat-value { font-size: 15px; font-weight: 700; color: var(--mtext2) }

    .mtable { width: 100%; border-collapse: collapse; font-size: 12px }
    .mtable th { background: var(--mc2); padding: 10px 12px; text-align: left; color: var(--mmuted); text-transform: uppercase; font-size: 10px }
    .mtable td { padding: 9px 12px; border-bottom: 1px solid var(--mborder); color: var(--mtext2) }
    .mtable tbody tr:last-child td { border-bottom: none }

    .diff-pos { color: var(--msuccess); font-weight: 700 }
    .diff-neg { color: var(--mdanger); font-weight: 700 }

    .action-bar {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--mborder)
    }

    .reject-form {
        display: none;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
        padding: 14px;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-radius: 10px
    }

    html[data-theme="dark"] .reject-form {
        background: #2d0a0a;
        border-color: #7f1d1d
    }

    .reject-form textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1.5px solid #fca5a5;
        background: var(--mc);
        color: var(--mtext2);
        font-family: inherit;
        font-size: 13px;
        resize: vertical;
        outline: none
    }

    .empty-state {
        text-align: center;
        padding: 50px;
        color: var(--mmuted);
        font-size: 14px
    }

    .empty-state span { font-size: 36px; display: block; margin-bottom: 12px }

    .section-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--mmuted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 24px 0 10px
    }

    @keyframes mfadeUp {
        from { opacity: 0; transform: translateY(8px) }
        to { opacity: 1; transform: translateY(0) }
    }
</style>

<div class="mod">
    <div class="mod-header">
        <div>
            <h2>Espelho de Ponto</h2>
            <p id="espelho-subtitle">Carregando...</p>
        </div>
    </div>

    <div id="espelho-container">
        <div class="empty-state"><span>⏳</span>Carregando espelhos...</div>
    </div>
</div>

<script>
    (function () {
        var func = null; // funcionario record
        var espelhos = []; // fechamento_ponto records

        async function init() {
            var op = window.operadorLogado;
            if (!op || !op.matricula) {
                document.getElementById('espelho-subtitle').textContent = 'Seu usuário não possui matrícula vinculada.';
                document.getElementById('espelho-container').innerHTML = '<div class="empty-state"><span>🔒</span>Acesso disponível apenas para funcionários com matrícula cadastrada.</div>';
                return;
            }

            // Buscar funcionário pela matrícula do operador
            var { data: funcData } = await window.supabase.from('funcionarios').select('*').eq('matricula', op.matricula).maybeSingle();
            if (!funcData) {
                document.getElementById('espelho-subtitle').textContent = 'Matrícula não vinculada a nenhum funcionário.';
                document.getElementById('espelho-container').innerHTML = '<div class="empty-state"><span>🔍</span>Nenhum funcionário encontrado com a matrícula <strong>' + op.matricula + '</strong>. Contate o administrador.</div>';
                return;
            }
            func = funcData;
            document.getElementById('espelho-subtitle').textContent = 'Funcionário: ' + func.nome + ' • Matrícula: ' + func.matricula;

            await carregar();
        }

        async function carregar() {
            var { data } = await window.supabase
                .from('fechamento_ponto')
                .select('*')
                .eq('funcionario_pk', func.pk)
                .in('espelho_status', ['enviado', 'aprovado', 'rejeitado'])
                .order('ano', { ascending: false })
                .order('mes', { ascending: false })
                .order('quinzena', { ascending: false });

            espelhos = data || [];
            renderizar();
        }

        function renderizar() {
            var cont = document.getElementById('espelho-container');

            var pendentes = espelhos.filter(e => e.espelho_status === 'enviado');
            var historico = espelhos.filter(e => e.espelho_status !== 'enviado');

            var html = '';

            if (pendentes.length === 0 && historico.length === 0) {
                cont.innerHTML = '<div class="empty-state"><span>✅</span>Nenhum espelho de ponto enviado pelo administrador ainda.</div>';
                return;
            }

            if (pendentes.length > 0) {
                html += '<div class="section-title">⚠️ Pendente de Aprovação (' + pendentes.length + ')</div>';
                pendentes.forEach(e => { html += renderCard(e, true); });
            }

            if (historico.length > 0) {
                html += '<div class="section-title">Histórico</div>';
                historico.forEach(e => { html += renderCard(e, false); });
            }

            cont.innerHTML = html;
        }

        function nomeMes(m) {
            return ["", "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"][m];
        }

        function fmtH(v) { return (v || 0).toFixed(2) + 'h'; }
        function fmtCurrency(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function timeToSec(t) { var p = t.split(':'); return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60; }
        function formatSec(s) { var h = Math.floor(s / 3600); var m = Math.floor((s % 3600) / 60); return h + 'h' + String(m).padStart(2, '0'); }
        function getDayName(d) { return ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"][d]; }

        function renderCard(e, isPending) {
            var q = e.quinzena === 1 ? '1ª Quinzena (01 a 15)' : '2ª Quinzena (16 ao fim)';
            var periodo = q + ' — ' + nomeMes(e.mes) + '/' + e.ano;

            var badge = isPending
                ? '<span class="badge badge-pending">⏳ Aguardando Aprovação</span>'
                : (e.espelho_status === 'aprovado'
                    ? '<span class="badge badge-approved">✅ Aprovado</span>'
                    : '<span class="badge badge-rejected">❌ Rejeitado</span>');

            var saldoMes = (e.saldo_mes || 0);
            var saldoCls = saldoMes >= 0 ? 'diff-pos' : 'diff-neg';

            var rejecInfo = '';
            if (e.espelho_status === 'rejeitado' && e.espelho_observacao) {
                rejecInfo = '<div style="margin-top:10px; padding:10px 14px; background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; font-size:12px; color:#991b1b"><strong>Motivo da rejeição:</strong> ' + e.espelho_observacao + '</div>';
            }

            var approvedInfo = '';
            if (e.espelho_aprovado_em) {
                var dt = new Date(e.espelho_aprovado_em).toLocaleString('pt-BR');
                approvedInfo = '<div style="font-size:11px; color:var(--mmuted); margin-top:8px">Respondido em: ' + dt + '</div>';
            }

            var actionBar = '';
            if (isPending) {
                actionBar = `
                    <div class="action-bar">
                        <button class="mbtn mbtn-success" onclick="EspelhoMod.aprovar(${e.pk})">✅ Aprovar Espelho</button>
                        <button class="mbtn mbtn-danger" onclick="EspelhoMod.toggleRejeitar(${e.pk})">❌ Rejeitar</button>
                    </div>
                    <div class="reject-form" id="reject-form-${e.pk}">
                        <label style="font-size:12px; font-weight:700; color:#991b1b">Motivo da Rejeição</label>
                        <textarea id="reject-obs-${e.pk}" rows="3" placeholder="Descreva o motivo da rejeição para o administrador revisar..."></textarea>
                        <div style="display:flex; gap:8px">
                            <button class="mbtn mbtn-danger" style="flex:1" onclick="EspelhoMod.confirmarRejeitar(${e.pk})">Confirmar Rejeição</button>
                            <button class="mbtn mbtn-ghost" onclick="EspelhoMod.toggleRejeitar(${e.pk})">Cancelar</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="espelho-card ${isPending ? 'pending' : ''}" id="card-${e.pk}">
                    <div class="espelho-card-header" onclick="EspelhoMod.toggleDetalhes(${e.pk})">
                        <div>
                            <div style="font-weight:700; color:var(--mtext2); font-size:14px">${periodo}</div>
                            <div style="font-size:12px; color:var(--mmuted); margin-top:3px">
                                Trabalhado: <strong>${fmtH(e.horas_trabalhadas)}</strong> &nbsp;|&nbsp;
                                Previsto: <strong>${fmtH(e.horas_previstas)}</strong> &nbsp;|&nbsp;
                                Total Líquido: <strong>${fmtCurrency(e.total_liquido)}</strong>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px">
                            ${badge}
                            <span style="color:var(--mmuted); font-size:18px" id="chevron-${e.pk}">›</span>
                        </div>
                    </div>
                    <div class="espelho-body" id="body-${e.pk}">
                        <div class="stat-grid">
                            <div class="stat-box"><div class="stat-label">Previsto</div><div class="stat-value">${fmtH(e.horas_previstas)}</div></div>
                            <div class="stat-box"><div class="stat-label">Trabalhado</div><div class="stat-value">${fmtH(e.horas_trabalhadas)}</div></div>
                            <div class="stat-box"><div class="stat-label">Saldo do Período</div><div class="stat-value ${saldoCls}">${(saldoMes >= 0 ? '+' : '') + saldoMes.toFixed(2) + 'h'}</div></div>
                            <div class="stat-box"><div class="stat-label">Total Líquido</div><div class="stat-value" style="color:var(--mprimary)">${fmtCurrency(e.total_liquido)}</div></div>
                        </div>
                        <div id="tabela-detalhe-${e.pk}" style="border:1px solid var(--mborder); border-radius:10px; overflow:hidden">
                            <div style="text-align:center; padding:20px; color:var(--mmuted); font-size:13px">Clique em "Ver detalhes" para carregar as batidas...</div>
                        </div>
                        <button class="mbtn mbtn-ghost" style="margin-top:10px; font-size:12px" onclick="EspelhoMod.carregarDetalhes(${e.pk}, ${e.mes}, ${e.ano}, ${e.quinzena})">🔍 Carregar Batidas do Período</button>
                        ${rejecInfo}
                        ${approvedInfo}
                        ${actionBar}
                    </div>
                </div>
            `;
        }

        async function carregarDetalhes(pk, mes, ano, quinzena) {
            var el = document.getElementById('tabela-detalhe-' + pk);
            el.innerHTML = '<div style="text-align:center; padding:20px; color:var(--mmuted)">Carregando...</div>';

            var diaIni = quinzena === 1 ? '01' : '16';
            var dataIni = ano + '-' + String(mes).padStart(2, '0') + '-' + diaIni;
            var dataFim = quinzena === 1
                ? ano + '-' + String(mes).padStart(2, '0') + '-15'
                : new Date(ano, mes, 0).toISOString().split('T')[0];

            var [resP, resJ] = await Promise.all([
                window.supabase.from('registro_ponto').select('*').eq('funcionario_pk', func.pk).gte('data', dataIni).lte('data', dataFim).order('data').order('hora'),
                window.supabase.from('justificativas_ponto').select('*').eq('funcionario_pk', func.pk).gte('data', dataIni).lte('data', dataFim)
            ]);

            var punches = resP.data || [];
            var justs = resJ.data || [];
            var cargaSec = (func.carga_horaria_diaria || 8) * 3600;
            var intervaloSec = (func.minutos_intervalo || 60) * 60;

            var diasMap = {};
            punches.forEach(p => {
                if (!diasMap[p.data]) diasMap[p.data] = [];
                diasMap[p.data].push(p.hora.substring(0, 5));
            });

            var dIni = new Date(dataIni + 'T00:00:00');
            var dFim = new Date(dataFim + 'T00:00:00');
            var rows = '';

            for (var dt = new Date(dIni); dt <= dFim; dt.setDate(dt.getDate() + 1)) {
                var dtStr = dt.toISOString().split('T')[0];
                var isDomingo = dt.getDay() === 0;
                var isWeekend = isDomingo;
                var jst = justs.find(j => j.data === dtStr);
                var bats = diasMap[dtStr] || [];

                var previsto = (func.diarista || isWeekend) ? 0 : cargaSec;
                if (jst || isDomingo) previsto = 0;

                var trabalhado = 0;
                if (bats.length >= 2) {
                    var entSec = timeToSec(bats[0]);
                    // Carência de entrada: se o funcionário bateu antes do horário previsto,
                    // usa-se o horário de entrada cadastrado para não gerar hora extra antecipada.
                    if (func.hora_entrada) {
                        var entPrevSec = timeToSec(func.hora_entrada);
                        if (entSec < entPrevSec) entSec = entPrevSec;
                    }
                    trabalhado = Math.max(0, timeToSec(bats[bats.length - 1]) - entSec - intervaloSec);
                }

                var diff = trabalhado - previsto;
                var cls = diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : '');
                var fmtDiff = diff === 0 ? '--' : (diff > 0 ? '+' : '-') + formatSec(Math.abs(diff));
                var dia = dt.getDate();

                rows += '<tr>' +
                    '<td>' + dia + '/' + mes + ' (' + getDayName(dt.getDay()) + ')</td>' +
                    '<td>' + (jst ? '<strong>[' + jst.tipo + ']</strong>' : (previsto > 0 ? formatSec(previsto) : '--')) + '</td>' +
                    '<td>' + (bats.join(' | ') || '--') + '</td>' +
                    '<td>' + (trabalhado > 0 ? formatSec(trabalhado) : '--') + '</td>' +
                    '<td class="' + cls + '">' + fmtDiff + '</td>' +
                    '</tr>';
            }

            el.innerHTML = '<table class="mtable"><thead><tr><th>Data</th><th>Jornada</th><th>Batidas</th><th>Líquido</th><th>Saldo</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function toggleDetalhes(pk) {
            var body = document.getElementById('body-' + pk);
            var chevron = document.getElementById('chevron-' + pk);
            var open = body.style.display === 'block';
            body.style.display = open ? 'none' : 'block';
            chevron.textContent = open ? '›' : '˅';
        }

        function toggleRejeitar(pk) {
            var form = document.getElementById('reject-form-' + pk);
            form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
        }

        async function aprovar(pk) {
            if (!await window.showConfirm("Após aprovar, o administrador poderá finalizar o fechamento deste período.", "Aprovar Espelho de Ponto?")) return;
            var { error } = await window.supabase.from('fechamento_ponto').update({
                espelho_status: 'aprovado',
                espelho_observacao: null,
                espelho_aprovado_em: new Date().toISOString()
            }).eq('pk', pk);

            if (error) { window.showToast("Erro ao aprovar: " + error.message, "error"); return; }
            window.showToast("Espelho aprovado com sucesso!");
            carregar();
        }

        async function confirmarRejeitar(pk) {
            var obs = document.getElementById('reject-obs-' + pk).value.trim();
            if (!obs) { window.showToast("Informe o motivo da rejeição.", "warning"); return; }
            if (!await window.showConfirm("O administrador receberá seu motivo e deverá revisar o ponto antes de reenviar.", "Rejeitar Espelho de Ponto?")) return;

            var { error } = await window.supabase.from('fechamento_ponto').update({
                espelho_status: 'rejeitado',
                espelho_observacao: obs,
                espelho_aprovado_em: new Date().toISOString()
            }).eq('pk', pk);

            if (error) { window.showToast("Erro ao rejeitar: " + error.message, "error"); return; }
            window.showToast("Espelho rejeitado. O administrador será notificado.");
            carregar();
        }

        init();
        window.EspelhoMod = { toggleDetalhes, carregarDetalhes, toggleRejeitar, aprovar, confirmarRejeitar };
    })();
</script>
