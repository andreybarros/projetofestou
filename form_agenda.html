<link rel="icon" href="img/logo.png" type="image/png">
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280;
    --mtext: #374151
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0;
    --mtext: #c9cce0
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mod-header p {
    color: var(--mmuted);
    font-size: 13px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-primary {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
  }

  .mbtn-primary:hover {
    background: #3730a3;
    transform: translateY(-1px)
  }

  .mbtn-ghost {
    background: var(--mc);
    color: #4f46e5;
    border: 1px solid #c7d2fe
  }

  .mbtn-ghost:hover {
    background: var(--mc2)
  }

  .edit-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #92400e
  }

  html[data-theme="dark"] .edit-banner {
    background: #2d2000;
    border-color: #78350f;
    color: #fcd34d
  }

  .mform-card {
    background: var(--mc);
    border-radius: 14px;
    padding: 24px 26px;
    max-width: 640px;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
    border: 1px solid var(--mborder);
    animation: mfadeUp .35s ease .05s both
  }

  html[data-theme="dark"] .mform-card {
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
  }

  @media(max-width:600px) {
    .mform-card {
      padding: 16px;
      border-radius: 10px
    }
  }

  .mform-group {
    margin-bottom: 15px
  }

  .mform-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    color: var(--mmuted);
    margin-bottom: 6px;
    text-transform: uppercase
  }

  .mform-group input,
  .mform-group textarea {
    width: 100%;
    background: var(--mc2);
    border: 1.5px solid var(--mborder);
    border-radius: 8px;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s
  }

  .mform-group input:focus,
  .mform-group textarea:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
  }

  .mform-group input::placeholder,
  .mform-group textarea::placeholder {
    color: #c4c9d9
  }

  .mform-group textarea {
    resize: vertical;
    min-height: 150px;
    line-height: 1.6
  }

  .mform-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px
  }

  .mform-row-3 {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr;
    gap: 14px
  }

  @media(max-width:500px) {

    .mform-row,
    .mform-row-3 {
      grid-template-columns: 1fr
    }
  }

  .mdivider {
    height: 1px;
    background: var(--mborder);
    margin: 18px 0
  }

  .mform-footer {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap
  }

  .textarea-hint {
    font-size: 11px;
    color: var(--mmuted);
    margin-top: 5px
  }

  .filial-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ede9fe;
    border: 1.5px solid #c4b5fd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    color: #4f46e5;
    width: 100%
  }

  html[data-theme="dark"] .filial-badge {
    background: #1e1a3a;
    border-color: #4c3a9e;
    color: #a78bfa
  }

  /* Seções coloridas */
  .section-block {
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 4px
  }

  .section-block.montagem {
    background: #eff6ff;
    border: 1.5px solid #bfdbfe
  }

  html[data-theme="dark"] .section-block.montagem {
    background: #0d1f3c;
    border-color: #1e3a5f
  }

  .section-block.desmontagem {
    background: #fdf4ff;
    border: 1.5px solid #e9d5ff
  }

  html[data-theme="dark"] .section-block.desmontagem {
    background: #1a0d2e;
    border-color: #4c1d95
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--mtext2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 7px
  }

  .section-title .stag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 20px
  }

  .montagem .stag {
    background: #bfdbfe;
    color: #1e40af
  }

  .desmontagem .stag {
    background: #e9d5ff;
    color: #6b21a8
  }

  html[data-theme="dark"] .montagem .stag {
    background: #1e3a5f;
    color: #93c5fd
  }

  html[data-theme="dark"] .desmontagem .stag {
    background: #3b0764;
    color: #d8b4fe
  }

  /* Equipe picker */
  .equipe-wrap {
    border: 1.5px solid var(--mborder);
    border-radius: 8px;
    background: var(--mc2);
    overflow: hidden
  }

  .equipe-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--mborder)
  }

  .equipe-search input {
    width: 100%;
    border: none;
    background: transparent;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none
  }

  .equipe-search input::placeholder {
    color: var(--mmuted)
  }

  .equipe-lista {
    max-height: 180px;
    overflow-y: auto
  }

  .equipe-op {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--mborder);
    transition: background .1s;
    user-select: none
  }

  .equipe-op:last-child {
    border-bottom: none
  }

  .equipe-op:hover {
    background: var(--mc)
  }

  .equipe-op.selecionado {
    background: #eff6ff
  }

  html[data-theme="dark"] .equipe-op.selecionado {
    background: #0d1f3c
  }

  .equipe-chk {
    width: 18px;
    height: 18px;
    border: 2px solid var(--mborder);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .15s
  }

  .equipe-op.selecionado .equipe-chk {
    background: #4f46e5;
    border-color: #4f46e5
  }

  .equipe-op.selecionado .equipe-chk::after {
    content: '✓';
    color: #fff;
    font-size: 11px;
    font-weight: 700
  }

  .equipe-op-nome {
    font-size: 14px;
    color: var(--mtext2);
    font-weight: 500
  }

  .equipe-op-login {
    font-size: 11px;
    color: var(--mmuted);
    font-family: 'DM Mono', monospace
  }

  .equipe-selecionados {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    min-height: 20px
  }

  .equipe-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: #e0e7ff;
    color: #3730a3;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600
  }

  html[data-theme="dark"] .equipe-tag {
    background: #2e3250;
    color: #a78bfa
  }

  .equipe-tag button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 13px;
    padding: 0;
    line-height: 1;
    opacity: .7
  }

  .equipe-tag button:hover {
    opacity: 1
  }

  .equipe-empty {
    padding: 20px;
    text-align: center;
    color: var(--mmuted);
    font-size: 13px
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(8px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2 id="form-titulo">Incluir Evento</h2>
      <p id="form-subtitulo">Preencha os dados do evento</p>
    </div>
    <button class="mbtn mbtn-ghost"
      onclick="window._editData=null;window._editAgPk=null;carregarModulo('agenda.html','nav-agenda')">← Voltar à
      Agenda</button>
  </div>

  <div id="edit-banner" class="edit-banner" style="display:none">
    ✏️ <span>Modo edição — altere os campos e clique em <strong>Salvar Alterações</strong></span>
  </div>

  <div class="mform-card">

    <!-- Filial -->
    <div class="mform-group">
      <label>Filial</label>
      <div class="filial-badge">🏢 <span id="ag-filial-nome">—</span></div>
    </div>

    <!-- Título -->
    <div class="mform-group">
      <label>Título do Evento</label>
      <input type="text" id="ag-titulo" placeholder="Ex: Festa Minnie, Chá de Bebê, Aniversário 10 anos...">
    </div>

    <div class="mdivider"></div>

    <!-- MONTAGEM -->
    <div class="section-block montagem">
      <div class="section-title">🔧 <span>Montagem</span> <span class="stag">Início do evento</span></div>
      <div class="mform-row-3">
        <div class="mform-group" style="margin-bottom:0">
          <label>Data</label>
          <input type="date" id="ag-data">
        </div>
        <div class="mform-group" style="margin-bottom:0">
          <label>Hora Início</label>
          <input type="time" id="ag-hora-inicio">
        </div>
        <div class="mform-group" style="margin-bottom:0">
          <label>Hora Fim <span style="font-weight:400;text-transform:none;font-size:10px">(opcional)</span></label>
          <input type="time" id="ag-hora-fim">
        </div>
      </div>
    </div>

    <div style="height:10px"></div>

    <!-- DESMONTAGEM -->
    <div class="section-block desmontagem">
      <div class="section-title">📦 <span>Desmontagem</span> <span class="stag">Retirada do material</span></div>
      <div class="mform-row-3">
        <div class="mform-group" style="margin-bottom:0">
          <label>Data</label>
          <input type="date" id="ag-data-desmont">
        </div>
        <div class="mform-group" style="margin-bottom:0">
          <label>Hora Início</label>
          <input type="time" id="ag-hora-desmont-inicio">
        </div>
        <div class="mform-group" style="margin-bottom:0">
          <label>Hora Fim <span style="font-weight:400;text-transform:none;font-size:10px">(opcional)</span></label>
          <input type="time" id="ag-hora-desmont-fim">
        </div>
      </div>
    </div>

    <div class="mdivider"></div>

    <!-- EQUIPE ESCALADA -->
    <div class="mform-group">
      <label>👥 Equipe Escalada</label>
      <div class="equipe-wrap">
        <div class="equipe-search">
          <input type="text" id="equipe-busca" placeholder="Buscar operador..."
            oninput="AgForm.filtrarEquipe(this.value)">
        </div>
        <div class="equipe-lista" id="equipe-lista">
          <div class="equipe-empty">⏳ Carregando operadores...</div>
        </div>
      </div>
      <div class="equipe-selecionados" id="equipe-selecionados"></div>
    </div>

    <div class="mdivider"></div>

    <!-- DESCRIÇÃO -->
    <div class="mform-group">
      <label>O que precisa para o evento</label>
      <textarea id="ag-descricao"
        placeholder="Descreva tudo o que é necessário:&#10;&#10;• Decoração (balões, faixas, centro de mesa...)&#10;• Buffet (bolo, doces, salgados...)&#10;• Equipamentos&#10;• Observações importantes..."></textarea>
      <div class="textarea-hint">Este campo aparece somente ao abrir o evento na agenda</div>
    </div>

    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="btn-salvar-ag" onclick="AgForm.salvar()">Salvar Evento</button>
      <button class="mbtn mbtn-ghost" onclick="AgForm.limpar()">Limpar</button>
    </div>
  </div>
</div>

<script>
  window.AgForm = (function () {

    var editPk = null;
    var todosOps = [];   // operadores carregados
    var opsFiltro = [];   // lista filtrada exibida
    var equipe = [];   // [{id, nome, login}] selecionados

    // ── Filial badge ─────────────────────────────────────────────
    (function () {
      var f = window.filialLogada;
      var el = document.getElementById('ag-filial-nome');
      if (el) el.textContent = f ? f.codigo + ' – ' + f.nome : 'Sem filial';
    })();

    // ── Modo edição ──────────────────────────────────────────────
    (function () {
      var d = window._editData; window._editData = null;
      if (!d) return;
      editPk = d.pk;
      document.getElementById('form-titulo').textContent = 'Alterar Evento';
      document.getElementById('form-subtitulo').textContent = 'Edite os dados e salve';
      document.getElementById('edit-banner').style.display = 'flex';
      document.getElementById('btn-salvar-ag').textContent = 'Salvar Alterações';
      document.getElementById('ag-titulo').value = d.titulo || '';
      document.getElementById('ag-data').value = d.data_evento || '';
      document.getElementById('ag-hora-inicio').value = fmtTime(d.hora_inicio);
      document.getElementById('ag-hora-fim').value = fmtTime(d.hora_fim);
      document.getElementById('ag-data-desmont').value = d.data_desmontagem || '';
      document.getElementById('ag-hora-desmont-inicio').value = fmtTime(d.hora_desmont_inicio);
      document.getElementById('ag-hora-desmont-fim').value = fmtTime(d.hora_desmont_fim);
      document.getElementById('ag-descricao').value = d.descricao || '';
      // Equipe salva como JSON
      if (d.equipe) {
        try { equipe = Array.isArray(d.equipe) ? d.equipe : JSON.parse(d.equipe); } catch (e) { equipe = []; }
      }
      renderTags();
    })();

    function fmtTime(t) { return t ? String(t).slice(0, 5) : ''; }

    // ── Equipe: carrega operadores da filial ─────────────────────
    (async function carregarOps() {
      var fil = window.filialLogada;
      var res;
      if (fil && fil.pk) {
        // Busca operadores da filial + superadmins (filial_pk null)
        res = await window.supabase.from('operadores')
          .select('id,nome,login')
          .eq('ativo', true)
          .or('filial_pk.eq.' + fil.pk + ',filial_pk.is.null')
          .order('nome');
      } else {
        res = await window.supabase.from('operadores')
          .select('id,nome,login')
          .eq('ativo', true)
          .order('nome');
      }
      todosOps = (res.data || []);
      opsFiltro = todosOps.slice();
      renderLista(opsFiltro);
    })();

    function renderLista(ops) {
      var el = document.getElementById('equipe-lista');
      if (!el) return;
      if (!ops || !ops.length) {
        el.innerHTML = '<div class="equipe-empty">Nenhum operador encontrado</div>';
        return;
      }
      el.innerHTML = ops.map(function (op) {
        var sel = equipe.some(function (e) { return e.id === op.id; });
        return '<div class="equipe-op' + (sel ? ' selecionado' : '') + '" onclick="AgForm.toggleOp(' + op.id + ')" data-id="' + op.id + '">' +
          '<div class="equipe-chk"></div>' +
          '<div><div class="equipe-op-nome">' + op.nome + '</div><div class="equipe-op-login">@' + op.login + '</div></div>' +
          '</div>';
      }).join('');
    }

    function filtrarEquipe(t) {
      t = (t || '').toLowerCase();
      opsFiltro = t ? todosOps.filter(function (op) {
        return op.nome.toLowerCase().includes(t) || op.login.toLowerCase().includes(t);
      }) : todosOps.slice();
      renderLista(opsFiltro);
    }

    function toggleOp(id) {
      var idx = equipe.findIndex(function (e) { return e.id === id; });
      if (idx >= 0) {
        equipe.splice(idx, 1);
      } else {
        var op = todosOps.find(function (o) { return o.id === id; });
        if (op) equipe.push({ id: op.id, nome: op.nome, login: op.login });
      }
      renderLista(opsFiltro);
      renderTags();
    }

    function removerOp(id) {
      equipe = equipe.filter(function (e) { return e.id !== id; });
      renderLista(opsFiltro);
      renderTags();
    }

    function renderTags() {
      var el = document.getElementById('equipe-selecionados');
      if (!el) return;
      if (!equipe.length) { el.innerHTML = ''; return; }
      el.innerHTML = equipe.map(function (e) {
        return '<span class="equipe-tag">' + e.nome +
          ' <button onclick="AgForm.removerOp(' + e.id + ')" title="Remover">✕</button></span>';
      }).join('');
    }

    // ── Salvar ───────────────────────────────────────────────────
    async function salvar() {
      var titulo = (document.getElementById('ag-titulo')?.value || '').trim();
      var data_evento = document.getElementById('ag-data')?.value || '';
      var hora_inicio = document.getElementById('ag-hora-inicio')?.value || '';
      var hora_fim = document.getElementById('ag-hora-fim')?.value || null;
      var data_desmontagem = document.getElementById('ag-data-desmont')?.value || null;
      var hora_desmont_inicio = document.getElementById('ag-hora-desmont-inicio')?.value || null;
      var hora_desmont_fim = document.getElementById('ag-hora-desmont-fim')?.value || null;
      var descricao = (document.getElementById('ag-descricao')?.value || '').trim() || null;

      if (!titulo) { window.showToast('Informe o título do evento.', 'error'); return; }
      if (!data_evento) { window.showToast('Informe a data de montagem.', 'error'); return; }
      if (!hora_inicio) { window.showToast('Informe a hora de início da montagem.', 'error'); return; }

      var btn = document.getElementById('btn-salvar-ag');
      btn.disabled = true;

      var payload = {
        titulo, data_evento, hora_inicio,
        hora_fim: hora_fim || null,
        data_desmontagem: data_desmontagem || null,
        hora_desmont_inicio: hora_desmont_inicio || null,
        hora_desmont_fim: hora_desmont_fim || null,
        descricao,
        equipe: JSON.stringify(equipe),
        criado_por: window.operadorLogado?.login || null,
        filial_pk: window.filialLogada?.pk || null
      };

      var res;
      if (editPk) {
        res = await window.supabase.from('agenda').update(payload).eq('pk', editPk);
      } else {
        res = await window.supabase.from('agenda').insert([payload]);
      }
      btn.disabled = false;
      if (res.error) { window.showToast('Erro: ' + res.error.message, 'error'); return; }
      window.showToast(editPk ? 'Evento atualizado!' : 'Evento incluído na agenda!');
      editPk = null;
      carregarModulo('agenda.html', 'nav-agenda');
    }

    function limpar() {
      editPk = null; equipe = [];
      ['ag-titulo', 'ag-data', 'ag-hora-inicio', 'ag-hora-fim',
        'ag-data-desmont', 'ag-hora-desmont-inicio', 'ag-hora-desmont-fim',
        'ag-descricao', 'equipe-busca'].forEach(function (id) {
          var el = document.getElementById(id); if (el) el.value = '';
        });
      renderTags();
      filtrarEquipe('');
      document.getElementById('btn-salvar-ag').textContent = 'Salvar Evento';
      document.getElementById('edit-banner').style.display = 'none';
      document.getElementById('form-titulo').textContent = 'Incluir Evento';
    }

    return { salvar, limpar, filtrarEquipe, toggleOp, removerOp };
  })();
</script>
