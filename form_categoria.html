<link rel="icon" href="img/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}.mod-header p{color:var(--mmuted);font-size:13px}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-ghost{background:var(--mc);color:#4f46e5;border:1px solid #c7d2fe}.mbtn-ghost:hover{background:var(--mc2)}
.edit-banner{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#92400e}
html[data-theme="dark"] .edit-banner{background:#2d2000;border-color:#78350f;color:#fcd34d}
.mform-card{background:var(--mc);border-radius:14px;padding:22px 24px;max-width:460px;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mform-card{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mform-group{margin-bottom:15px}
.mform-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--mmuted);margin-bottom:5px;text-transform:uppercase}
.mform-group input,.mform-group textarea{width:100%;background:var(--mc2);border:1.5px solid var(--mborder);border-radius:8px;color:var(--mtext2);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
.mform-group input:focus,.mform-group textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.mform-group input::placeholder,.mform-group textarea::placeholder{color:#c4c9d9}
.mform-group textarea{resize:vertical;min-height:80px}
.filial-badge{display:inline-flex;align-items:center;gap:6px;background:#e0e7ff;color:#3730a3;border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:15px;font-weight:700;border:1px solid #c7d2fe}
html[data-theme="dark"] .filial-badge{background:#2e3250;color:#a78bfa;border-color:#3d4270}
.mdivider{height:1px;background:var(--mborder);margin:16px 0}
.mform-footer{display:flex;gap:10px;flex-wrap:wrap}
@keyframes mfadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
<div class="mod">
  <div class="mod-header">
    <div><h2 id="form-titulo">Nova Categoria</h2><p id="form-sub">Adicione uma categoria de produto</p></div>
    <button class="mbtn mbtn-ghost" onclick="window._editData=null;carregarModulo('cadastro_categoria.html','nav-categoria')">← Voltar</button>
  </div>
  <div id="edit-banner" class="edit-banner" style="display:none">✏️ <span>Modo edição — altere os campos e clique em <strong>Salvar Alterações</strong></span></div>
  <div class="mform-card">
    <div class="mform-group"><label>Filial</label><div class="filial-badge" id="cat-filial-badge">🏢 —</div></div>
    <div class="mform-group"><label>Nome da Categoria *</label><input type="text" id="cat-nome" placeholder="Ex: Balões, Tiaras, Fantasias..."></div>
    <div class="mform-group"><label>Descrição</label><textarea id="cat-desc" placeholder="Descrição opcional..."></textarea></div>
    <div class="mdivider"></div>
    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="btn-salvar-cat" onclick="salvarCategoria()">Salvar Categoria</button>
      <button class="mbtn mbtn-ghost" onclick="limparCat()">Limpar</button>
    </div>
  </div>
</div>
<script>
var _catPk=null;
var _filCat=window.filialLogada;
document.getElementById('cat-filial-badge').textContent='🏢 '+(_filCat?_filCat.codigo+' – '+_filCat.nome:'—');

(function(){
  var d=window._editData;window._editData=null;if(!d)return;
  _catPk=d.pk;
  document.getElementById('form-titulo').textContent='Alterar Categoria';
  document.getElementById('form-sub').textContent='Edite e salve';
  document.getElementById('edit-banner').style.display='flex';
  document.getElementById('btn-salvar-cat').textContent='Salvar Alterações';
  document.getElementById('cat-nome').value=d.nome||'';
  document.getElementById('cat-desc').value=d.descricao||'';
})();

async function salvarCategoria(){
  var nome=(document.getElementById('cat-nome')?.value||'').trim();
  if(!nome){window.showToast('Informe o nome.','error');return;}
  var btn=document.getElementById('btn-salvar-cat');btn.disabled=true;
  var payload={nome,descricao:document.getElementById('cat-desc')?.value.trim()||null,filial_pk:_filCat?.pk||null};
  if(_catPk){
    var{error}=await window.supabase.from('categorias').update(payload).eq('pk',_catPk);
    btn.disabled=false;if(error){window.showToast('Erro: '+error.message,'error');return;}
    window.showToast('Categoria atualizada!');_catPk=null;carregarModulo('cadastro_categoria.html','nav-categoria');
  }else{
    var{error}=await window.supabase.from('categorias').insert([payload]);
    btn.disabled=false;if(error){window.showToast('Erro: '+error.message,'error');return;}
    window.showToast('Categoria cadastrada!');limparCat();
  }
}
function limparCat(){_catPk=null;['cat-nome','cat-desc'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});document.getElementById('btn-salvar-cat').textContent='Salvar Categoria';document.getElementById('edit-banner').style.display='none';}
</script>
