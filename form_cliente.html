<link rel="icon" href="img/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}.mod-header p{color:var(--mmuted);font-size:13px}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-ghost{background:var(--mc);color:#4f46e5;border:1px solid #c7d2fe}.mbtn-ghost:hover{background:var(--mc2)}
.edit-banner{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#92400e}
html[data-theme="dark"] .edit-banner{background:#2d2000;border-color:#78350f;color:#fcd34d}
.mform-card{background:var(--mc);border-radius:14px;padding:22px 24px;max-width:540px;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mform-card{box-shadow:0 4px 20px rgba(0,0,0,.3)}
@media(max-width:600px){.mform-card{padding:16px;border-radius:10px}}
.mform-group{margin-bottom:15px}
.mform-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--mmuted);margin-bottom:5px;text-transform:uppercase}
.mform-group input,.mform-group textarea{width:100%;background:var(--mc2);border:1.5px solid var(--mborder);border-radius:8px;color:var(--mtext2);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
.mform-group input:focus,.mform-group textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.mform-group input::placeholder,.mform-group textarea::placeholder{color:#c4c9d9}
.mform-group textarea{resize:vertical;min-height:70px}
.mform-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.mform-row{grid-template-columns:1fr}}
.filial-badge{display:inline-flex;align-items:center;gap:6px;background:#e0e7ff;color:#3730a3;border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:15px;font-weight:700;border:1px solid #c7d2fe}
html[data-theme="dark"] .filial-badge{background:#2e3250;color:#a78bfa;border-color:#3d4270}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--mc2);border:1.5px solid var(--mborder);border-radius:10px;cursor:pointer}
.toggle-row:hover{border-color:#a5b4fc}
.toggle-row .tr-info{display:flex;flex-direction:column;gap:3px}
.toggle-row .tr-label{font-size:14px;font-weight:600;color:var(--mtext2)}
.toggle-row .tr-sub{font-size:12px;color:var(--mmuted)}
.toggle{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:26px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:#f59e0b}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.dec-badge-preview{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;transition:all .2s}
.dec-badge-preview.off{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb}
.mdivider{height:1px;background:var(--mborder);margin:16px 0}
.mform-footer{display:flex;gap:10px;flex-wrap:wrap}
@keyframes mfadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
<div class="mod">
  <div class="mod-header">
    <div><h2 id="form-titulo">Novo Cliente</h2><p id="form-sub">Adicione um cliente ao sistema</p></div>
    <button class="mbtn mbtn-ghost" onclick="window._editData=null;carregarModulo('cadastro_clientes.html','nav-clientes')">← Voltar</button>
  </div>
  <div id="edit-banner" class="edit-banner" style="display:none">✏️ <span>Modo edição — altere os campos e clique em <strong>Salvar Alterações</strong></span></div>
  <div class="mform-card">
    <div class="mform-group"><label>Filial</label><div class="filial-badge" id="cli-filial-badge">🏢 —</div></div>
    <div class="mform-group"><label>Nome Completo *</label><input type="text" id="cli-nome" placeholder="Ex: Maria Oliveira" autocomplete="name"></div>
    <div class="mform-row">
      <div class="mform-group"><label>Telefone / WhatsApp</label><input type="tel" id="cli-tel" placeholder="(92) 9 9999-9999" inputmode="tel"></div>
      <div class="mform-group"><label>CPF</label><input type="text" id="cli-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" oninput="mascaraCpf(this)"></div>
    </div>
    <div class="mform-group"><label>E-mail</label><input type="email" id="cli-email" placeholder="cliente@email.com" inputmode="email"></div>
    <div class="mform-group"><label>Observação</label><textarea id="cli-obs" placeholder="Observações sobre o cliente..."></textarea></div>
    <!-- Toggle Decorador -->
    <div class="mform-group">
      <label>Tipo de Cliente</label>
      <div class="toggle-row" onclick="toggleDecorador()">
        <div class="tr-info">
          <span class="tr-label">🎨 Decorador</span>
          <span class="tr-sub">Marque se este cliente é um decorador parceiro</span>
        </div>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" id="cli-decorador" onchange="atualizarBadge()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="dec-badge-preview off" id="dec-preview">👤 Cliente comum</div>
    </div>
    <div class="mdivider"></div>
    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="btn-salvar-cli" onclick="salvarCliente()">Salvar Cliente</button>
      <button class="mbtn mbtn-ghost" onclick="limparCliente()">Limpar</button>
    </div>
  </div>
</div>
<script>
var _cliPk=null, _filCli=window.filialLogada;
document.getElementById('cli-filial-badge').textContent='🏢 '+(_filCli?_filCli.codigo+' – '+_filCli.nome:'—');

(function(){
  var d=window._editData;window._editData=null;if(!d)return;
  _cliPk=d.pk;
  document.getElementById('form-titulo').textContent='Alterar Cliente';
  document.getElementById('form-sub').textContent='Edite os dados e salve';
  document.getElementById('edit-banner').style.display='flex';
  document.getElementById('btn-salvar-cli').textContent='Salvar Alterações';
  document.getElementById('cli-nome').value=d.nome||'';
  document.getElementById('cli-tel').value=d.telefone||'';
  document.getElementById('cli-cpf').value=d.cpf||'';
  document.getElementById('cli-email').value=d.email||'';
  document.getElementById('cli-obs').value=d.observacao||'';
  document.getElementById('cli-decorador').checked=d.decorador||false;
  atualizarBadge();
})();

function mascaraCpf(el){
  var v=el.value.replace(/\D/g,'');
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  el.value=v;
}

function toggleDecorador(){
  var cb=document.getElementById('cli-decorador');cb.checked=!cb.checked;atualizarBadge();
}

function atualizarBadge(){
  var isD=document.getElementById('cli-decorador').checked;
  var badge=document.getElementById('dec-preview');
  if(isD){badge.classList.remove('off');badge.textContent='🎨 Decorador';}
  else{badge.classList.add('off');badge.textContent='👤 Cliente comum';}
}

async function salvarCliente(){
  var nome=(document.getElementById('cli-nome')?.value||'').trim();
  if(!nome){window.showToast('Informe o nome.','error');return;}
  var btn=document.getElementById('btn-salvar-cli');btn.disabled=true;
  var payload={
    nome,
    telefone:(document.getElementById('cli-tel')?.value||'').trim()||null,
    cpf:(document.getElementById('cli-cpf')?.value||'').trim()||null,
    email:(document.getElementById('cli-email')?.value||'').trim()||null,
    observacao:(document.getElementById('cli-obs')?.value||'').trim()||null,
    decorador:document.getElementById('cli-decorador').checked,
    filial_pk:_filCli?.pk||null
  };
  if(_cliPk){
    var{error}=await window.supabase.from('clientes').update(payload).eq('pk',_cliPk);
    btn.disabled=false;if(error){window.showToast('Erro: '+error.message,'error');return;}
    window.showToast('Cliente atualizado!');_cliPk=null;carregarModulo('cadastro_clientes.html','nav-clientes');
  }else{
    var{error}=await window.supabase.from('clientes').insert([payload]);
    btn.disabled=false;if(error){window.showToast('Erro: '+error.message,'error');return;}
    window.showToast('Cliente cadastrado!');limparCliente();
  }
}

function limparCliente(){
  _cliPk=null;
  ['cli-nome','cli-tel','cli-cpf','cli-email','cli-obs'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('cli-decorador').checked=false;atualizarBadge();
  document.getElementById('btn-salvar-cli').textContent='Salvar Cliente';
  document.getElementById('edit-banner').style.display='none';
}
</script>
