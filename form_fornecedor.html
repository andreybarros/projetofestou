<link rel="icon" href="img/logo.png" type="image/png">
<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
<style>
    .mod* {
        box-sizing: border-box
    }

    .mod {
        font-family: 'DM Sans', sans-serif;
        --mc: #fff;
        --mc2: #fafafe;
        --mborder: #e0e7ff;
        --mtext2: #1e1b4b;
        --mmuted: #6b7280
    }

    html[data-theme="dark"] .mod {
        --mc: #1a1d27;
        --mc2: #22263a;
        --mborder: #2e3250;
        --mtext2: #e8e9f3;
        --mmuted: #7b7fa0
    }

    .mod-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
        animation: mfadeUp .3s ease;
        gap: 12px;
        flex-wrap: wrap
    }

    .mod-header h2 {
        font-size: 20px;
        font-weight: 600;
        color: var(--mtext2);
        margin-bottom: 4px
    }

    .mod-header p {
        color: var(--mmuted);
        font-size: 13px
    }

    .mbtn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        transition: all .15s;
        white-space: nowrap
    }

    .mbtn-primary {
        background: #4f46e5;
        color: #fff;
        box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
    }

    .mbtn-primary:hover {
        background: #3730a3;
        transform: translateY(-1px)
    }

    .mbtn-ghost {
        background: var(--mc);
        color: #4f46e5;
        border: 1px solid #c7d2fe
    }

    .mbtn-ghost:hover {
        background: var(--mc2)
    }

    .edit-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fffbeb;
        border: 1px solid #fcd34d;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #92400e
    }

    html[data-theme="dark"] .edit-banner {
        background: #2d2000;
        border-color: #78350f;
        color: #fcd34d
    }

    .mform-card {
        background: var(--mc);
        border-radius: 14px;
        padding: 22px 24px;
        max-width: 620px;
        box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
        border: 1px solid var(--mborder);
        animation: mfadeUp .35s ease .05s both
    }

    html[data-theme="dark"] .mform-card {
        box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
    }

    @media(max-width:600px) {
        .mform-card {
            padding: 16px;
            border-radius: 10px
        }
    }

    .mform-group {
        margin-bottom: 15px
    }

    .mform-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .8px;
        color: var(--mmuted);
        margin-bottom: 5px;
        text-transform: uppercase
    }

    .mform-group input,
    .mform-group textarea {
        width: 100%;
        background: var(--mc2);
        border: 1.5px solid var(--mborder);
        border-radius: 8px;
        color: var(--mtext2);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        padding: 11px 14px;
        outline: none;
        transition: border-color .2s, box-shadow .2s
    }

    .mform-group input:focus,
    .mform-group textarea:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
    }

    .mform-group input::placeholder,
    .mform-group textarea::placeholder {
        color: #c4c9d9
    }

    .mform-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px
    }

    @media(max-width:420px) {
        .mform-row {
            grid-template-columns: 1fr
        }
    }

    .filial-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #e0e7ff;
        color: #3730a3;
        border-radius: 8px;
        padding: 8px 14px;
        font-family: 'DM Mono', monospace;
        font-size: 15px;
        font-weight: 700;
        border: 1px solid #c7d2fe
    }

    html[data-theme="dark"] .filial-badge {
        background: #2e3250;
        color: #a78bfa;
        border-color: #3d4270
    }

    .mdivider {
        height: 1px;
        background: var(--mborder);
        margin: 16px 0
    }

    .mform-footer {
        display: flex;
        gap: 10px;
        flex-wrap: wrap
    }

    @keyframes mfadeUp {
        from {
            opacity: 0;
            transform: translateY(8px)
        }

        to {
            opacity: 1;
            transform: translateY(0)
        }
    }
</style>
<div class="mod">
    <div class="mod-header">
        <div>
            <h2 id="form-titulo">Novo Fornecedor</h2>
            <p id="form-sub">Adicione um fornecedor ao sistema</p>
        </div>
        <button class="mbtn mbtn-ghost"
            onclick="window._editData=null;carregarModulo('cadastro_fornecedores.html','nav-fornecedores')">←
            Voltar</button>
    </div>
    <div id="edit-banner" class="edit-banner" style="display:none">✏️ <span>Modo edição — altere os campos e clique em
            <strong>Salvar Alterações</strong></span></div>
    <div class="mform-card">
        <div class="mform-group"><label>Filial</label>
            <div class="filial-badge" id="forn-filial-badge">🏢 —</div>
        </div>
        <div class="mform-group"><label>Nome / Razão Social *</label><input type="text" id="forn-nome"
                placeholder="Ex: DJ Materiais"></div>
        <div class="mform-row">
            <div class="mform-group"><label>Telefone / WhatsApp</label><input type="tel" id="forn-tel"
                    placeholder="(92) 9 9999-9999" inputmode="tel"></div>
            <div class="mform-group"><label>CNPJ / CPF</label><input type="text" id="forn-doc"
                    placeholder="00.000.000/0001-00"></div>
        </div>
        <div class="mform-group"><label>E-mail</label><input type="email" id="forn-email"
                placeholder="contato@empresa.com" inputmode="email"></div>
        <div class="mdivider"></div>
        <div class="mform-footer">
            <button class="mbtn mbtn-primary" id="btn-salvar-forn" onclick="salvarFornecedor()">Salvar
                Fornecedor</button>
            <button class="mbtn mbtn-ghost" onclick="limparFornecedor()">Limpar</button>
        </div>
    </div>
</div>
<script>
    var _fornPk = null, _filForn = window.filialLogada;
    document.getElementById('forn-filial-badge').textContent = '🏢 ' + (_filForn ? _filForn.codigo + ' – ' + _filForn.nome : '—');

    (function () {
        var d = window._editData; window._editData = null; if (!d) return;
        _fornPk = d.pk;
        document.getElementById('form-titulo').textContent = 'Alterar Fornecedor';
        document.getElementById('form-sub').textContent = 'Edite os dados e salve';
        document.getElementById('edit-banner').style.display = 'flex';
        document.getElementById('btn-salvar-forn').textContent = 'Salvar Alterações';
        document.getElementById('forn-nome').value = d.nome || '';
        document.getElementById('forn-tel').value = d.telefone || '';
        document.getElementById('forn-doc').value = d.cnpj_cpf || '';
        document.getElementById('forn-email').value = d.email || '';
    })();

    async function salvarFornecedor() {
        var nome = (document.getElementById('forn-nome')?.value || '').trim();
        if (!nome) { window.showToast('Informe o nome/razão social.', 'error'); return; }
        var btn = document.getElementById('btn-salvar-forn'); btn.disabled = true;
        var payload = {
            nome,
            telefone: (document.getElementById('forn-tel')?.value || '').trim() || null,
            cnpj_cpf: (document.getElementById('forn-doc')?.value || '').trim() || null,
            email: (document.getElementById('forn-email')?.value || '').trim() || null,
            filial_pk: _filForn?.pk || null
        };
        if (_fornPk) {
            var { error } = await window.supabase.from('fornecedores').update(payload).eq('pk', _fornPk);
            btn.disabled = false; if (error) { window.showToast('Erro: ' + error.message, 'error'); return; }
            window.showToast('Fornecedor atualizado!'); _fornPk = null; carregarModulo('cadastro_fornecedores.html', 'nav-fornecedores');
        } else {
            var { error } = await window.supabase.from('fornecedores').insert([payload]);
            btn.disabled = false; if (error) { window.showToast('Erro: ' + error.message, 'error'); return; }
            window.showToast('Fornecedor cadastrado!'); limparFornecedor();
        }
    }

    function limparFornecedor() {
        _fornPk = null;
        ['forn-nome', 'forn-tel', 'forn-doc', 'forn-email'].forEach(function (id) { var el = document.getElementById(id); if (el) el.value = ''; });
        document.getElementById('btn-salvar-forn').textContent = 'Salvar Fornecedor';
        document.getElementById('edit-banner').style.display = 'none';
    }
</script>
