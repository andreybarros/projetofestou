<link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
<style>
    .mod* {
        box-sizing: border-box
    }

    .mod {
        font-family: 'DM Sans', sans-serif;
        --mc: #fff;
        --mc2: #fafafe;
        --mborder: #e0e7ff;
        --mtext2: #1e1b4b;
        --mmuted: #6b7280
    }

    html[data-theme="dark"] .mod {
        --mc: #1a1d27;
        --mc2: #22263a;
        --mborder: #2e3250;
        --mtext2: #e8e9f3;
        --mmuted: #7b7fa0
    }

    .mod-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
        animation: mfadeUp .3s ease;
        gap: 12px;
        flex-wrap: wrap
    }

    .mod-header h2 {
        font-size: 20px;
        font-weight: 600;
        color: var(--mtext2);
        margin-bottom: 4px
    }

    .mod-header p {
        color: var(--mmuted);
        font-size: 13px
    }

    .mbtn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        transition: all .15s;
        white-space: nowrap
    }

    .mbtn-primary {
        background: #4f46e5;
        color: #fff;
        box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
    }

    .mbtn-primary:hover {
        background: #3730a3;
        transform: translateY(-1px)
    }

    .mbtn-ghost {
        background: var(--mc);
        color: #4f46e5;
        border: 1px solid #c7d2fe
    }

    .mbtn-ghost:hover {
        background: var(--mc2)
    }

    .edit-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fffbeb;
        border: 1px solid #fcd34d;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #92400e
    }

    html[data-theme="dark"] .edit-banner {
        background: #2d2000;
        border-color: #78350f;
        color: #fcd34d
    }

    .mform-card {
        background: var(--mc);
        border-radius: 14px;
        padding: 22px 24px;
        max-width: 650px;
        box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
        border: 1px solid var(--mborder);
        animation: mfadeUp .35s ease .05s both
    }

    html[data-theme="dark"] .mform-card {
        box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
    }

    .mform-group {
        margin-bottom: 15px
    }

    .mform-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .8px;
        color: var(--mmuted);
        margin-bottom: 5px;
        text-transform: uppercase
    }

    .mform-group input,
    .mform-group select {
        width: 100%;
        background: var(--mc2);
        border: 1.5px solid var(--mborder);
        border-radius: 8px;
        color: var(--mtext2);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        padding: 11px 14px;
        outline: none;
        transition: border-color .2s, box-shadow .2s
    }

    .mform-group input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
    }

    .mform-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px
    }

    @keyframes mfadeUp {
        from {
            opacity: 0;
            transform: translateY(8px)
        }

        to {
            opacity: 1;
            transform: translateY(0)
        }
    }
</style>

<div class="mod">
    <div class="mod-header">
        <div>
            <h2 id="form-titulo-func">Cadastrar Funcionário</h2>
            <p id="form-subtitulo-func">Preencha os dados do novo colaborador</p>
        </div>
        <button class="mbtn mbtn-ghost" onclick="carregarModulo('cadastro_funcionario.html','nav-funcionario')">←
            Voltar</button>
    </div>

    <div id="edit-banner-func" class="edit-banner" style="display:none">✏️ <span>Modo edição — altere os campos e clique
            em <strong>Salvar Alterações</strong></span></div>

    <div class="mform-card">
        <div class="mform-group">
            <label>Nome Completo</label>
            <input type="text" id="func-nome" placeholder="Ex: Maria Oliveira">
        </div>

        <div class="mform-row">
            <div class="mform-group">
                <label>CPF</label>
                <input type="text" id="func-cpf" placeholder="000.000.000-00">
            </div>
            <div class="mform-group">
                <label>Data de Nascimento</label>
                <input type="date" id="func-nascimento">
            </div>
        </div>

        <div class="mform-row">
            <div class="mform-group">
                <label>Matrícula</label>
                <input type="text" id="func-matricula" placeholder="Ex: FUNC-001">
            </div>
            <div class="mform-group">
                <label>Salário Mensal (R$)</label>
                <input type="number" step="0.01" id="func-salario" placeholder="0.00">
            </div>
        </div>

        <div class="mform-group">
            <label>Filial</label>
            <select id="func-filial">
                <option value="">Selecione...</option>
            </select>
        </div>

        <div class="mform-row">
            <div class="mform-group">
                <label>Hora Entrada</label>
                <input type="time" id="func-entrada">
            </div>
            <div class="mform-group">
                <label>Hora Saída</label>
                <input type="time" id="func-saida">
            </div>
        </div>

        <div class="mform-row">
            <div class="mform-group">
                <label>Carga Horária Diária (h)</label>
                <input type="number" step="0.5" id="func-carga" value="8.0" placeholder="Ex: 8.0">
            </div>
            <div class="mform-group">
                <label>Minutos Intervalo (min)</label>
                <input type="number" id="func-intervalo" value="60" placeholder="Ex: 60">
            </div>
            <div class="mform-group">
                <label>Horas do Período (Mês/Quinzena)</label>
                <input type="number" step="1" id="func-horas-fechamento" value="120" placeholder="Ex: 120 ou 240">
                <small style="color:var(--mmuted); font-size:11px">Base para cálculo do salário.</small>
            </div>
        </div>

        <div class="mform-group">
            <label>Saldo Inicial Banco de Horas (h)</label>
            <input type="number" step="0.1" id="func-saldo-inicial" value="0.0" placeholder="Ex: 10.5">
            <small style="color:var(--mmuted); font-size:11px">Saldo positivo ou negativo vindo de outro sistema</small>
        </div>

        <div class="mform-group">
            <label>Nome da Mãe</label>
            <input type="text" id="func-mae" placeholder="Nome completo da mãe">
        </div>

        <div class="mform-group">
            <label>Nome do Pai</label>
            <input type="text" id="func-pai" placeholder="Nome completo do pai">
        </div>

        <div class="mform-footer" style="margin-top:20px;display:flex;gap:10px">
            <button class="mbtn mbtn-primary" id="btn-salvar-func" onclick="salvarFuncionario()">Salvar
                Funcionário</button>
            <button class="mbtn mbtn-ghost" onclick="limparFormFunc()">Limpar</button>
        </div>
    </div>
</div>

<script>
    (async function initFormFunc() {
        // Carrega filiais
        const { data } = await window.supabase.from('filiais').select('pk,codigo,nome').eq('ativo', true).order('codigo');
        const sel = document.getElementById('func-filial');
        (data || []).forEach(f => {
            const o = document.createElement('option');
            o.value = f.pk; o.textContent = `[${f.codigo}] ${f.nome}`; sel.appendChild(o);
        });

        // Se estiver editando
        const d = window._editData;
        window._editData = null;
        if (d) {
            window._editFuncPk = d.pk;
            document.getElementById('form-titulo-func').textContent = 'Alterar Funcionário';
            document.getElementById('edit-banner-func').style.display = 'flex';
            document.getElementById('btn-salvar-func').textContent = 'Salvar Alterações';

            document.getElementById('func-nome').value = d.nome || '';
            document.getElementById('func-cpf').value = d.cpf || '';
            document.getElementById('func-nascimento').value = d.data_nascimento || '';
            document.getElementById('func-matricula').value = d.matricula || '';
            document.getElementById('func-salario').value = d.salario_mensal || 0;
            document.getElementById('func-filial').value = d.filial_pk || '';
            document.getElementById('func-entrada').value = d.hora_entrada ? d.hora_entrada.substring(0, 5) : '';
            document.getElementById('func-saida').value = d.hora_saida ? d.hora_saida.substring(0, 5) : '';
            document.getElementById('func-carga').value = d.carga_horaria_diaria || 8.0;
            document.getElementById('func-intervalo').value = d.minutos_intervalo || 60;
            document.getElementById('func-horas-fechamento').value = d.horas_fechamento || 120;
            document.getElementById('func-saldo-inicial').value = d.saldo_inicial_banco || 0;
            document.getElementById('func-mae').value = d.nome_mae || '';
            document.getElementById('func-pai').value = d.nome_pai || '';
        } else {
            window._editFuncPk = null;
            if (window.filialLogada) document.getElementById('func-filial').value = window.filialLogada.pk;
        }
    })();

    async function salvarFuncionario() {
        const payload = {
            nome: document.getElementById('func-nome').value.trim(),
            cpf: document.getElementById('func-cpf').value.trim(),
            data_nascimento: document.getElementById('func-nascimento').value || null,
            matricula: document.getElementById('func-matricula').value.trim(),
            salario_mensal: parseFloat(document.getElementById('func-salario').value) || 0,
            filial_pk: parseInt(document.getElementById('func-filial').value) || null,
            hora_entrada: document.getElementById('func-entrada').value || null,
            hora_saida: document.getElementById('func-saida').value || null,
            carga_horaria_diaria: parseFloat(document.getElementById('func-carga').value) || 0,
            minutos_intervalo: parseInt(document.getElementById('func-intervalo').value) || 0,
            horas_fechamento: parseFloat(document.getElementById('func-horas-fechamento').value) || 120,
            saldo_inicial_banco: parseFloat(document.getElementById('func-saldo-inicial').value) || 0,
            nome_mae: document.getElementById('func-mae').value.trim(),
            nome_pai: document.getElementById('func-pai').value.trim(),
        };

        if (!payload.nome) { window.showToast('O nome é obrigatório.', 'error'); return; }
        if (!payload.filial_pk) { window.showToast('Selecione uma filial.', 'error'); return; }

        const btn = document.getElementById('btn-salvar-func');
        btn.disabled = true;

        let res;
        if (window._editFuncPk) {
            res = await window.supabase.from('funcionarios').update(payload).eq('pk', window._editFuncPk);
        } else {
            res = await window.supabase.from('funcionarios').insert([payload]);
        }

        btn.disabled = false;
        if (res.error) {
            window.showToast('Erro: ' + res.error.message, 'error');
        } else {
            window.showToast(window._editFuncPk ? 'Funcionário atualizado!' : 'Funcionário cadastrado!');
            carregarModulo('cadastro_funcionario.html', 'nav-funcionario');
        }
    }

    function limparFormFunc() {
        ['func-nome', 'func-cpf', 'func-nascimento', 'func-matricula', 'func-salario', 'func-mae', 'func-pai', 'func-entrada', 'func-saida', 'func-carga', 'func-intervalo', 'func-horas-fechamento', 'func-saldo-inicial'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('func-filial').value = window.filialLogada ? window.filialLogada.pk : '';
    }
</script>
