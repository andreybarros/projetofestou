<link rel="icon" href="img/logo.png" type="image/png">
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280;
    --mtext: #374151
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0;
    --mtext: #c9cce0
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mod-header p {
    color: var(--mmuted);
    font-size: 13px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-primary {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, .25)
  }

  .mbtn-primary:hover {
    background: #3730a3;
    transform: translateY(-1px)
  }

  .mbtn-ghost {
    background: var(--mc);
    color: #4f46e5;
    border: 1px solid #c7d2fe
  }

  .mbtn-ghost:hover {
    background: var(--mc2)
  }

  .mform-card {
    background: var(--mc);
    border-radius: 14px;
    padding: 24px 26px;
    max-width: 700px;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .08);
    border: 1px solid var(--mborder);
    animation: mfadeUp .35s ease .05s both
  }

  html[data-theme="dark"] .mform-card {
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
  }

  @media(max-width:600px) {
    .mform-card {
      padding: 16px;
      border-radius: 10px
    }
  }

  .mform-group {
    margin-bottom: 15px
  }

  .mform-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    color: var(--mmuted);
    margin-bottom: 6px;
    text-transform: uppercase
  }

  .mform-group input,
  .mform-group select {
    width: 100%;
    background: var(--mc2);
    border: 1.5px solid var(--mborder);
    border-radius: 8px;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s
  }

  .mform-group input:focus,
  .mform-group select:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, .1)
  }

  .mform-group input::placeholder {
    color: #c4c9d9
  }

  .mform-row {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 14px
  }

  @media(max-width:480px) {
    .mform-row {
      grid-template-columns: 1fr
    }
  }

  .mdivider {
    height: 1px;
    background: var(--mborder);
    margin: 18px 0
  }

  .mform-footer {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap
  }

  .filial-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ede9fe;
    border: 1.5px solid #c4b5fd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    color: #4f46e5;
    width: 100%
  }

  html[data-theme="dark"] .filial-badge {
    background: #1e1a3a;
    border-color: #4c3a9e;
    color: #a78bfa
  }

  .numero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0fdf4;
    border: 1.5px solid #86efac;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 22px;
    font-weight: 700;
    color: #166534;
    font-family: 'DM Mono', monospace
  }

  html[data-theme="dark"] .numero-badge {
    background: #052e16;
    border-color: #166534;
    color: #4ade80
  }

  /* Tabela de itens */
  .itens-section {
    margin-top: 4px
  }

  .itens-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px
  }

  .itens-header label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    color: var(--mmuted);
    text-transform: uppercase
  }

  .itens-table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--mborder)
  }

  .itens-table th {
    background: linear-gradient(90deg, #4f46e5, #6366f1);
    color: #fff;
    padding: 10px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: left
  }

  .itens-table td {
    padding: 10px 12px;
    font-size: 14px;
    color: var(--mtext);
    border-bottom: 1px solid var(--mborder)
  }

  .itens-table tbody tr:last-child td {
    border-bottom: none
  }

  .itens-table tbody tr:hover {
    background: var(--mc2)
  }

  .itens-empty {
    text-align: center;
    color: var(--mmuted);
    font-size: 13px;
    padding: 24px;
    font-style: italic
  }

  .item-code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #4f46e5
  }

  html[data-theme="dark"] .item-code {
    color: #a78bfa
  }

  .btn-rm-item {
    background: #fee2e2;
    color: #dc2626;
    border: none;
    border-radius: 5px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .btn-rm-item:hover {
    background: #fecaca
  }

  .qtd-input {
    width: 70px;
    padding: 6px 8px;
    border: 1.5px solid var(--mborder);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    background: var(--mc2);
    color: var(--mtext2);
    text-align: center;
    outline: none
  }

  .qtd-input:focus {
    border-color: #4f46e5
  }

  /* Produto picker modal */
  .picker-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .75);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(3px)
  }

  .picker-box {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
    border: 1.5px solid #c7d2fe
  }

  html[data-theme="dark"] .picker-box {
    background: #1a1d27;
    border-color: #3d4270
  }

  .picker-head {
    padding: 16px 20px;
    background: linear-gradient(90deg, #4f46e5, #6366f1);
    display: flex;
    justify-content: space-between;
    align-items: center
  }

  .picker-head h3 {
    font-size: 16px;
    font-weight: 700;
    color: #fff
  }

  .picker-search {
    padding: 12px 16px;
    border-bottom: 1.5px solid var(--mborder);
    background: var(--mc)
  }

  .picker-search input {
    width: 100%;
    background: var(--mc2);
    border: 1.5px solid var(--mborder);
    border-radius: 8px;
    color: var(--mtext2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    outline: none
  }

  .picker-search input:focus {
    border-color: #4f46e5
  }

  .picker-list {
    overflow-y: auto;
    flex: 1;
    background: var(--mc)
  }

  .picker-item {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--mborder);
    transition: background .1s
  }

  .picker-item:last-child {
    border-bottom: none
  }

  .picker-item:hover {
    background: var(--mc2)
  }

  .picker-item-code {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #4f46e5;
    font-weight: 600;
    background: #e0e7ff;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0
  }

  html[data-theme="dark"] .picker-item-code {
    background: #2e3250;
    color: #a78bfa
  }

  .picker-item-desc {
    font-size: 14px;
    color: var(--mtext2)
  }

  .picker-empty {
    padding: 32px;
    text-align: center;
    color: var(--mmuted);
    font-size: 13px
  }

  .btn-close-picker {
    background: rgba(255, 255, 255, .2);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s
  }

  .btn-close-picker:hover {
    background: rgba(255, 255, 255, .35)
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(8px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2>📋 Nova Ordem de Separação</h2>
      <p>Preencha os dados e adicione os produtos</p>
    </div>
    <button class="mbtn mbtn-ghost" onclick="carregarModulo('cadastro_separacao.html','nav-separacao')">←
      Voltar</button>
  </div>
  <div class="mform-card">
    <!-- Número + Filial -->
    <div class="mform-row" style="margin-bottom:15px">
      <div class="mform-group" style="margin-bottom:0">
        <label>Nº da Ordem</label>
        <div class="numero-badge" id="fs-numero">...</div>
      </div>
      <div class="mform-group" style="margin-bottom:0">
        <label>Filial</label>
        <div class="filial-badge">🏢 <span id="fs-filial-nome">—</span></div>
      </div>
    </div>

    <!-- Vínculo com Agenda -->
    <div class="mform-group">
      <label>Vínculo com Evento da Agenda <span
          style="font-weight:400;text-transform:none;font-size:10px">(opcional)</span></label>
      <select id="fs-agenda">
        <option value="">— Sem vínculo com evento —</option>
      </select>
    </div>

    <!-- Título -->
    <div class="mform-group">
      <label>Título da Ordem</label>
      <input type="text" id="fs-titulo" placeholder="Ex: Separação para Festa Minnie – 25/01">
    </div>

    <div class="mdivider"></div>

    <!-- Itens -->
    <div class="itens-section">
      <div class="itens-header">
        <label>📦 Produtos para Separar</label>
        <button class="mbtn mbtn-ghost" style="padding:6px 12px;font-size:12px" onclick="SepForm.abrirPicker()">+
          Adicionar Produto</button>
      </div>
      <table class="itens-table" id="fs-itens-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Produto</th>
            <th style="width:90px;text-align:center">Qtd</th>
            <th style="width:36px"></th>
          </tr>
        </thead>
        <tbody id="fs-itens-body">
          <tr>
            <td colspan="4" class="itens-empty">Nenhum produto adicionado. Clique em + Adicionar Produto.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="fs-btn-salvar" onclick="SepForm.salvar()">Criar Ordem</button>
      <button class="mbtn mbtn-ghost"
        onclick="carregarModulo('cadastro_separacao.html','nav-separacao')">Cancelar</button>
    </div>
  </div>
</div>

<!-- Picker de produtos -->
<div class="picker-overlay" id="picker-overlay" style="display:none">
  <div class="picker-box">
    <div class="picker-head">
      <h3>Selecionar Produto</h3>
      <button class="btn-close-picker" onclick="SepForm.fecharPicker()">✕</button>
    </div>
    <div class="picker-search">
      <input type="text" id="picker-busca" placeholder="Buscar por código ou descrição..."
        oninput="SepForm.filtrarPicker(this.value)">
    </div>
    <div class="picker-list" id="picker-list">
      <div class="picker-empty">⏳ Carregando produtos...</div>
    </div>
  </div>
</div>

<script>
  window.SepForm = (function () {
    var itens = [];           // [{produto_pk, codigo, descricao, qtd}]
    var todosProd = [];
    var prodFiltro = [];
    var proximoNumero = 100;

    // Filial badge
    (function () {
      var f = window.filialLogada;
      var el = document.getElementById('fs-filial-nome');
      if (el) el.textContent = f ? f.codigo + ' – ' + f.nome : 'Sem filial';
    })();

    // Carrega próximo número
    (async function () {
      var fil = window.filialLogada;
      var q = window.supabase.from('ordens_separacao').select('numero').order('numero', { ascending: false }).limit(1);
      if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);
      var res = await q;
      if (!res.error && res.data && res.data.length) proximoNumero = res.data[0].numero + 1;
      var el = document.getElementById('fs-numero');
      if (el) el.textContent = '#' + String(proximoNumero).padStart(4, '0');
    })();

    // Carrega eventos da agenda para vínculo
    (async function () {
      var fil = window.filialLogada;
      var q = window.supabase.from('agenda').select('pk,titulo,data_evento').order('data_evento', { ascending: false }).limit(60);
      if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);
      var res = await q;
      var sel = document.getElementById('fs-agenda');
      if (!res.error && sel) {
        (res.data || []).forEach(function (ev) {
          var opt = document.createElement('option');
          opt.value = ev.pk;
          var d = ev.data_evento ? new Date(ev.data_evento + 'T12:00').toLocaleDateString('pt-BR') : '';
          opt.textContent = ev.titulo + (d ? ' — ' + d : '');
          sel.appendChild(opt);
        });
      }
    })();

    // Carrega produtos
    (async function () {
      var fil = window.filialLogada;
      var q = window.supabase.from('produtos').select('pk,codigo,descricao').order('descricao');
      if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);
      var res = await q;
      todosProd = res.data || [];
      prodFiltro = todosProd.slice();
    })();

    function renderItens() {
      var tb = document.getElementById('fs-itens-body');
      if (!tb) return;
      if (!itens.length) {
        tb.innerHTML = '<tr><td colspan="4" class="itens-empty">Nenhum produto adicionado.</td></tr>';
        return;
      }
      tb.innerHTML = itens.map(function (it, idx) {
        return '<tr>' +
          '<td class="item-code">' + (it.codigo || '—') + '</td>' +
          '<td>' + it.descricao + '</td>' +
          '<td style="text-align:center"><input class="qtd-input" type="number" min="1" value="' + it.qtd + '" oninput="SepForm.setQtd(' + idx + ',this.value)"></td>' +
          '<td><button class="btn-rm-item" onclick="SepForm.remItem(' + idx + ')" title="Remover">✕</button></td>' +
          '</tr>';
      }).join('');
    }

    function abrirPicker() {
      prodFiltro = todosProd.slice();
      renderPicker(prodFiltro);
      document.getElementById('picker-busca').value = '';
      document.getElementById('picker-overlay').style.display = 'flex';
      setTimeout(function () { document.getElementById('picker-busca').focus(); }, 80);
    }
    function fecharPicker() { document.getElementById('picker-overlay').style.display = 'none'; }

    function renderPicker(lista) {
      var el = document.getElementById('picker-list');
      if (!el) return;
      if (!lista || !lista.length) { el.innerHTML = '<div class="picker-empty">Nenhum produto encontrado</div>'; return; }
      el.innerHTML = lista.map(function (p) {
        return '<div class="picker-item" onclick="SepForm.addProd(' + p.pk + ')">' +
          '<span class="picker-item-code">' + (p.codigo || '—') + '</span>' +
          '<span class="picker-item-desc">' + p.descricao + '</span>' +
          '</div>';
      }).join('');
    }

    function filtrarPicker(t) {
      t = (t || '').toLowerCase();
      prodFiltro = t ? todosProd.filter(function (p) {
        return (p.codigo || '').toLowerCase().includes(t) || (p.descricao || '').toLowerCase().includes(t);
      }) : todosProd.slice();
      renderPicker(prodFiltro);
    }

    function addProd(pk) {
      var p = todosProd.find(function (x) { return x.pk === pk; });
      if (!p) return;
      // Se já existe, incrementa qtd
      var ex = itens.find(function (i) { return i.produto_pk === pk; });
      if (ex) { ex.qtd++; } else { itens.push({ produto_pk: p.pk, codigo: p.codigo, descricao: p.descricao, qtd: 1 }); }
      renderItens();
      fecharPicker();
    }

    function remItem(idx) { itens.splice(idx, 1); renderItens(); }
    function setQtd(idx, v) { itens[idx].qtd = Math.max(1, parseInt(v) || 1); }

    async function salvar() {
      var titulo = (document.getElementById('fs-titulo')?.value || '').trim();
      var agendaPk = document.getElementById('fs-agenda')?.value || null;
      if (!titulo) { window.showToast('Informe o título da ordem.', 'error'); return; }
      if (!itens.length) { window.showToast('Adicione ao menos um produto.', 'error'); return; }
      var btn = document.getElementById('fs-btn-salvar');
      btn.disabled = true;
      var fil = window.filialLogada;
      var op = window.operadorLogado;
      var payload = {
        numero: proximoNumero,
        filial_pk: fil?.pk || null,
        agenda_pk: agendaPk ? parseInt(agendaPk) : null,
        titulo,
        status: 'a_separar',
        criado_por: op?.login || op?.nome || null
      };
      var res = await window.supabase.from('ordens_separacao').insert([payload]).select('pk').single();
      if (res.error) { btn.disabled = false; window.showToast('Erro: ' + res.error.message, 'error'); return; }
      var ordemPk = res.data.pk;
      // Salva itens
      var iPayload = itens.map(function (it) {
        return { ordem_pk: ordemPk, produto_pk: it.produto_pk || null, descricao: it.descricao, codigo: it.codigo || null, qtd_solicitada: it.qtd };
      });
      var ri = await window.supabase.from('itens_separacao').insert(iPayload);
      btn.disabled = false;
      if (ri.error) { window.showToast('Ordem criada, mas erro nos itens: ' + ri.error.message, 'error'); return; }
      window.showToast('Ordem #' + String(proximoNumero).padStart(4, '0') + ' criada!');
      carregarModulo('cadastro_separacao.html', 'nav-separacao');
    }

    // Fecha picker clicando fora
    document.getElementById('picker-overlay').addEventListener('click', function (e) {
      if (e.target === document.getElementById('picker-overlay')) fecharPicker();
    });

    return { abrirPicker, fecharPicker, filtrarPicker, addProd, remItem, setQtd, salvar };
  })();
</script>
