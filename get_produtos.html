<link rel="icon" href="img/logo.png" type="image/png">
<div class="mod">
  <div class="mod-header" style="flex-direction: column; align-items: flex-start; gap: 16px;">
    <div>
      <h2>Produtos Cadastrados</h2>
      <p>Filial: <span class="filial-chip" id="chip-filial-prod">—</span></p>
    </div>
    <div class="header-actions"
      style="display: flex; gap: 12px; align-items: center; width: 100%; justify-content: flex-start;">
      <div class="search-wrap" style="flex: 0 1 auto; width: 320px;">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
          style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--mmuted);pointer-events:none">
          <circle cx="11" cy="11" r="7" />
          <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
        </svg>
        <input class="search-input" id="busca-produto" type="text" placeholder="Pesquisar produto pela descrição..."
          oninput="ProdMod.filtrar(this.value)"
          style="background:var(--mc);border:1.5px solid var(--mborder);border-radius:10px;color:var(--mtext2);padding:10px 12px 10px 36px;outline:none;width:100%;">
      </div>
      <button class="mbtn mbtn-primary" onclick="carregarModulo('cadastro_produto.html','nav-produtos')"
        style="padding: 10px 20px;">+ Cadastrar Produto</button>
    </div>
  </div>
  <div class="mtable-wrap">
    <table class="mtable">
      <thead>
        <tr>
          <th style="width:56px">Foto</th>
          <th>Código</th>
          <th>Descrição</th>
          <th>Saldo</th>
          <th>Localização</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-produtos"></tbody>
    </table>
  </div>
</div>

<style>
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .code-cell {
    font-family: 'DM Mono', monospace !important;
    font-size: 13px;
    color: #4f46e5;
    font-weight: 500;
  }

  [data-theme="dark"] .code-cell {
    color: #a78bfa;
  }

  .badge-ok {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .badge-low {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5;
  }

  .prod-foto {
    width: 44px;
    height: 44px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--mborder2);
  }

  .prod-foto-ph {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--mc2);
    border: 1px solid var(--mborder2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--mmuted);
  }

  .acoes-cell {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .mstate td {
    text-align: center;
    padding: 52px;
    color: var(--mmuted);
    font-size: 14px;
  }

  .mstate-icon {
    font-size: 34px;
    display: block;
    margin-bottom: 10px;
  }
</style>

<script>
  window.ProdMod = (function () {
    var lista = [];

    function setChipFilial() {
      var el = document.getElementById('chip-filial-prod');
      if (!el) return;
      var f = window.filialLogada;
      el.textContent = f ? f.codigo + ' – ' + f.nome : 'Todas';
    }

    function setTbody(html) {
      var el = document.getElementById('tabela-produtos');
      if (el) el.innerHTML = html;
    }

    function render(data) {
      if (!data || !data.length) {
        setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">📭</span>Nenhum produto encontrado</td></tr>');
        return;
      }
      setTbody(data.map(function (p) {
        return '<tr id="prow-' + p.pk + '">' +
          '<td data-label="">' + (p.foto_url ? '<img class="prod-foto" src="' + p.foto_url + '" alt="foto">' : '<div class="prod-foto-ph">📷</div>') + '</td>' +
          '<td data-label="Código" class="code-cell">' + (p.codigo || '—') + '</td>' +
          '<td data-label="Descrição">' + (p.descricao || '—') + '</td>' +
          '<td data-label="Saldo"><span class="' + ((p.saldo || 0) < 5 ? 'badge-low' : 'badge-ok') + '">' + (p.saldo || 0) + '</span></td>' +
          '<td data-label="Localização">' + (p.localizacao || '—') + '</td>' +
          '<td data-label="Ações"><div class="acoes-cell">' +
          '<button class="mbtn-edit" onclick="ProdMod.editar(' + p.pk + ')">Alterar</button>' +
          '<button class="mbtn-danger" onclick="ProdMod.excluir(' + p.pk + ')">Excluir</button>' +
          '</div></td>' +
          '</tr>';
      }).join(''));
    }

    function filtrar(termo) {
      if (!termo || !termo.trim()) { render(lista); return; }
      var t = termo.toLowerCase();
      render(lista.filter(function (p) {
        return (p.codigo || '').toLowerCase().includes(t) ||
          (p.descricao || '').toLowerCase().includes(t) ||
          (p.localizacao || '').toLowerCase().includes(t);
      }));
    }

    function editar(pk) {
      var p = lista.find(function (x) { return x.pk === pk; });
      if (!p) { window.showToast('Produto não encontrado.', 'error'); return; }
      window._editData = p;
      carregarModulo('cadastro_produto.html', 'nav-produtos');
    }

    async function excluir(pk) {
      var p = lista.find(function (x) { return x.pk === pk; });
      if (!p || !confirm('Excluir "' + (p.descricao || '') + '"?\nEsta ação não pode ser desfeita.')) return;
      if (p.foto_url) {
        var path = p.foto_url.split('/produtos-fotos/')[1];
        if (path) await window.supabase.storage.from('produtos-fotos').remove([path]);
      }
      var res = await window.supabase.from('produtos').delete().eq('pk', pk);
      if (res.error) { window.showToast('Erro: ' + res.error.message, 'error'); return; }
      lista = lista.filter(function (x) { return x.pk !== pk; });
      var row = document.getElementById('prow-' + pk);
      if (row) row.remove();
      window.showToast('"' + p.descricao + '" excluído.');
      var busca = document.getElementById('busca-produto');
      filtrar(busca ? busca.value : '');
    }

    async function carregar() {
      setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">⏳</span>Carregando produtos...</td></tr>');
      setChipFilial();
      try {
        var fil = window.filialLogada;
        var q = window.supabase.from('produtos').select('*').order('codigo', { ascending: true });
        if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);
        var res = await q;
        if (res.error) {
          setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro: ' + res.error.message + '</td></tr>');
          return;
        }
        lista = res.data || [];
        render(lista);
      } catch (e) {
        setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro inesperado: ' + e.message + '</td></tr>');
      }
    }

    carregar();
    return { filtrar: filtrar, editar: editar, excluir: excluir };
  })();
</script>
