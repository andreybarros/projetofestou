<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mborder2:#f3f4f6;--mtext:#374151;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mborder2:#22263a;--mtext:#c9cce0;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;animation:mfadeUp .3s ease}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}
.mod-header p{color:var(--mmuted);font-size:13px}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-edit{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-edit:hover{background:#c7d2fe}
html[data-theme="dark"] .mbtn-edit{background:#2e3250;color:#a78bfa;border-color:#3d4270}
.mbtn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:6px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}.mbtn-danger:hover{background:#fecaca}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;width:16px;height:16px;stroke:var(--mmuted);pointer-events:none}
.search-input{background:var(--mc);border:1.5px solid var(--mborder);border-radius:8px;color:var(--mtext2);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px 8px 34px;outline:none;width:220px;transition:border-color .2s}
.search-input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.search-input::placeholder{color:var(--mmuted)}
@media(max-width:500px){.search-input{width:100%}.header-actions{width:100%}.search-wrap{flex:1}}
.filial-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#e0e7ff;color:#3730a3;border-radius:20px;font-size:12px;font-weight:600}
html[data-theme="dark"] .filial-chip{background:#2e3250;color:#a78bfa}
.mtable-wrap{background:var(--mc);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mtable-wrap{box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mtable{width:100%;border-collapse:collapse}
.mtable thead tr{background:linear-gradient(90deg,#4f46e5,#6366f1)}
.mtable th{padding:12px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.9);font-weight:600;text-align:left}
.mtable td{padding:12px 16px;font-size:14px;color:var(--mtext);border-bottom:1px solid var(--mborder2);vertical-align:middle}
.mtable tbody tr:last-child td{border-bottom:none}
.mtable tbody tr:hover{background:var(--mc2)}
.code-cell{font-family:'DM Mono',monospace!important;font-size:13px;color:#4f46e5;font-weight:500}
html[data-theme="dark"] .code-cell{color:#a78bfa}
.badge-ok{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.badge-low{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.prod-foto{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--mborder2)}
.prod-foto-ph{width:44px;height:44px;border-radius:6px;background:var(--mc2);border:1px solid var(--mborder2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--mmuted)}
.acoes-cell{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
@media(max-width:640px){
  .mtable-wrap{border-radius:10px;overflow:visible;background:transparent;border:none;box-shadow:none}
  .mtable thead{display:none}
  .mtable tbody tr{display:block;background:var(--mc);border:1px solid var(--mborder);border-radius:10px;margin-bottom:12px;padding:14px;box-shadow:0 2px 8px rgba(79,70,229,.06)}
  .mtable tbody tr:hover{background:var(--mc)}
  .mtable td{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--mborder2);font-size:13px}
  .mtable td:last-child{border-bottom:none;padding-top:10px}
  .mtable td::before{content:attr(data-label);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mmuted);font-weight:600;min-width:90px;flex-shrink:0}
  .mtable td[data-label=""]::before{display:none}
}
.mstate td{text-align:center;padding:52px;color:var(--mmuted);font-size:14px}
.mstate-icon{font-size:34px;display:block;margin-bottom:10px}
@keyframes mfadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2>Produtos Cadastrados</h2>
      <p>Filial: <span class="filial-chip" id="chip-filial-prod">—</span></p>
    </div>
    <div class="header-actions">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="busca-produto" type="text" placeholder="Pesquisar produto..." oninput="ProdMod.filtrar(this.value)">
      </div>
      <button class="mbtn mbtn-primary" onclick="carregarModulo('cadastro_produto.html','nav-produtos')">+ Cadastrar Produto</button>
    </div>
  </div>
  <div class="mtable-wrap">
    <table class="mtable">
      <thead><tr><th style="width:56px">Foto</th><th>Código</th><th>Descrição</th><th>Saldo</th><th>Localização</th><th>Ações</th></tr></thead>
      <tbody id="tabela-produtos"></tbody>
    </table>
  </div>
</div>

<script>
// Namespace isolado para evitar conflito com cópias antigas do script no body
window.ProdMod = (function() {
  var lista = [];

  function setChipFilial() {
    var el = document.getElementById('chip-filial-prod');
    if (!el) return;
    var f = window.filialLogada;
    el.textContent = f ? f.codigo + ' – ' + f.nome : 'Todas';
  }

  function setTbody(html) {
    var el = document.getElementById('tabela-produtos');
    if (el) el.innerHTML = html;
  }

  function render(data) {
    if (!data || !data.length) {
      setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">📭</span>Nenhum produto encontrado</td></tr>');
      return;
    }
    setTbody(data.map(function(p) {
      return '<tr id="prow-' + p.pk + '">' +
        '<td data-label="">' + (p.foto_url ? '<img class="prod-foto" src="' + p.foto_url + '" alt="foto">' : '<div class="prod-foto-ph">📷</div>') + '</td>' +
        '<td data-label="Código" class="code-cell">' + (p.codigo||'—') + '</td>' +
        '<td data-label="Descrição">' + (p.descricao||'—') + '</td>' +
        '<td data-label="Saldo"><span class="' + ((p.saldo||0)<5?'badge-low':'badge-ok') + '">' + (p.saldo||0) + '</span></td>' +
        '<td data-label="Localização">' + (p.localizacao||'—') + '</td>' +
        '<td data-label="Ações"><div class="acoes-cell">' +
          '<button class="mbtn-edit" onclick="ProdMod.editar(' + p.pk + ')">Alterar</button>' +
          '<button class="mbtn-danger" onclick="ProdMod.excluir(' + p.pk + ')">Excluir</button>' +
        '</div></td>' +
      '</tr>';
    }).join(''));
  }

  function filtrar(termo) {
    if (!termo || !termo.trim()) { render(lista); return; }
    var t = termo.toLowerCase();
    render(lista.filter(function(p) {
      return (p.codigo||'').toLowerCase().includes(t) ||
             (p.descricao||'').toLowerCase().includes(t) ||
             (p.localizacao||'').toLowerCase().includes(t);
    }));
  }

  function editar(pk) {
    var p = lista.find(function(x){ return x.pk === pk; });
    if (!p) { window.showToast('Produto não encontrado.','error'); return; }
    window._editData = p;
    carregarModulo('cadastro_produto.html','nav-produtos');
  }

  async function excluir(pk) {
    var p = lista.find(function(x){ return x.pk === pk; });
    if (!p || !confirm('Excluir "' + (p.descricao||'') + '"?\nEsta ação não pode ser desfeita.')) return;
    if (p.foto_url) {
      var path = p.foto_url.split('/produtos-fotos/')[1];
      if (path) await window.supabase.storage.from('produtos-fotos').remove([path]);
    }
    var res = await window.supabase.from('produtos').delete().eq('pk', pk);
    if (res.error) { window.showToast('Erro: ' + res.error.message,'error'); return; }
    lista = lista.filter(function(x){ return x.pk !== pk; });
    var row = document.getElementById('prow-' + pk);
    if (row) row.remove();
    window.showToast('"' + p.descricao + '" excluído.');
    var busca = document.getElementById('busca-produto');
    filtrar(busca ? busca.value : '');
  }

  async function carregar() {
    setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">⏳</span>Carregando produtos...</td></tr>');
    setChipFilial();
    try {
      var fil = window.filialLogada;
      var q = window.supabase.from('produtos').select('*').order('codigo', {ascending:true});
      if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);
      var res = await q;
      if (res.error) {
        setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro: ' + res.error.message + '</td></tr>');
        return;
      }
      lista = res.data || [];
      render(lista);
    } catch(e) {
      setTbody('<tr class="mstate"><td colspan="6"><span class="mstate-icon">❌</span>Erro inesperado: ' + e.message + '</td></tr>');
    }
  }

  carregar();
  return { filtrar: filtrar, editar: editar, excluir: excluir };
})();
</script>
