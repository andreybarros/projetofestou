<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
  rel="stylesheet">
<style>
  .mod* {
    box-sizing: border-box
  }

  .mod {
    font-family: 'DM Sans', sans-serif;
    --mc: #fff;
    --mc2: #fafafe;
    --mborder: #e0e7ff;
    --mborder2: #f3f4f6;
    --mtext: #374151;
    --mtext2: #1e1b4b;
    --mmuted: #6b7280
  }

  html[data-theme="dark"] .mod {
    --mc: #1a1d27;
    --mc2: #22263a;
    --mborder: #2e3250;
    --mborder2: #22263a;
    --mtext: #c9cce0;
    --mtext2: #e8e9f3;
    --mmuted: #7b7fa0
  }

  .mod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: mfadeUp .3s ease;
    gap: 12px;
    flex-wrap: wrap
  }

  .mod-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mtext2);
    margin-bottom: 4px
  }

  .mbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap
  }

  .mbtn-ghost {
    background: var(--mc);
    color: #4f46e5;
    border: 1px solid #c7d2fe
  }

  .mbtn-ghost:hover {
    background: var(--mc2)
  }

  .mbtn-sm {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600
  }

  .mbtn-ver {
    background: #e0e7ff;
    color: #3730a3
  }

  .mbtn-ver:hover {
    background: #c7d2fe
  }

  .mbtn-cancel {
    background: #fee2e2;
    color: #dc2626
  }

  .mbtn-cancel:hover {
    background: #fecaca
  }

  html[data-theme="dark"] .mbtn-ver {
    background: #2e3250;
    color: #a78bfa
  }

  /* Filtros */
  .filtros-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
    animation: mfadeUp .3s ease .05s both
  }

  .filtro-group {
    display: flex;
    flex-direction: column;
    gap: 4px
  }

  .filtro-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--mmuted)
  }

  .filtro-input {
    padding: 8px 12px;
    border: 1.5px solid var(--mborder);
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--mc);
    color: var(--mtext2);
    outline: none
  }

  .filtro-input:focus {
    border-color: #4f46e5
  }

  /* Cards resumo do dia */
  .resumo-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
    animation: mfadeUp .3s ease .08s both
  }

  .resumo-card {
    background: var(--mc);
    border: 1.5px solid var(--mborder);
    border-radius: 10px;
    padding: 14px 16px
  }

  .resumo-card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--mmuted);
    margin-bottom: 4px
  }

  .resumo-card-val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--mtext2)
  }

  .resumo-card-val.verde {
    color: #059669
  }

  .resumo-card-val.roxo {
    color: #4f46e5
  }

  /* Tabela */
  .htable-wrap {
    background: var(--mc);
    border-radius: 12px;
    border: 1px solid var(--mborder);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(79, 70, 229, .06);
    animation: mfadeUp .35s ease .1s both
  }

  .htable {
    width: 100%;
    border-collapse: collapse
  }

  .htable thead tr {
    background: linear-gradient(90deg, #4f46e5, #6366f1)
  }

  .htable th {
    padding: 11px 14px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, .9);
    font-weight: 600;
    text-align: left
  }

  .htable td {
    padding: 11px 14px;
    font-size: 14px;
    color: var(--mtext);
    border-bottom: 1px solid var(--mborder2)
  }

  .htable tbody tr:last-child td {
    border-bottom: none
  }

  .htable tbody tr:hover {
    background: var(--mc2)
  }

  .num-cell {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #4f46e5
  }

  html[data-theme="dark"] .num-cell {
    color: #a78bfa
  }

  .money-cell {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    color: #059669
  }

  .disc-cell {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #4f46e5
  }

  .badge-finalizada {
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #6ee7b7;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600
  }

  .badge-cancelada {
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600
  }

  .mstate {
    text-align: center;
    padding: 48px;
    color: var(--mmuted);
    font-size: 14px
  }

  /* Modal detalhes venda */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .75);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(3px)
  }

  .modal-box {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
    border: 1.5px solid #c7d2fe;
    overflow: hidden
  }

  html[data-theme="dark"] .modal-box {
    background: #1a1d27;
    border-color: #3d4270
  }

  .modal-head {
    background: linear-gradient(90deg, #4f46e5, #6366f1);
    padding: 16px 20px;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0
  }

  .modal-head h3 {
    font-size: 16px;
    font-weight: 700
  }

  .btn-mclose {
    background: rgba(255, 255, 255, .2);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .btn-mclose:hover {
    background: rgba(255, 255, 255, .35)
  }

  .modal-body {
    padding: 18px;
    overflow-y: auto;
    flex: 1
  }

  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px
  }

  .meta-chip {
    background: var(--mc2);
    border: 1px solid var(--mborder);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--mtext)
  }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--mmuted);
    margin-bottom: 8px;
    margin-top: 14px
  }

  .modal-itens-table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--mborder)
  }

  .modal-itens-table th {
    background: var(--mc2);
    padding: 8px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--mmuted);
    font-weight: 600;
    text-align: left
  }

  .modal-itens-table td {
    padding: 9px 10px;
    font-size: 13px;
    border-top: 1px solid var(--mborder2);
    color: var(--mtext)
  }

  .pag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px
  }

  .pag-chip {
    padding: 5px 12px;
    background: #d1fae5;
    color: #065f46;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace
  }

  html[data-theme="dark"] .pag-chip {
    background: #064e3b;
    color: #6ee7b7
  }

  .modal-total-box {
    background: var(--mc2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px
  }

  .modal-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
    color: var(--mtext)
  }

  .modal-total-row.big {
    font-size: 16px;
    font-weight: 700;
    color: var(--mtext2);
    margin-top: 4px
  }

  .modal-total-val {
    font-family: 'DM Mono', monospace
  }

  .modal-total-val.verde {
    color: #059669
  }

  .modal-total-val.roxo {
    color: #4f46e5
  }

  .modal-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--mborder);
    display: flex;
    gap: 8px;
    flex-shrink: 0
  }

  .mbtn-print {
    background: #4f46e5;
    color: #fff;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600
  }

  .mbtn-print:hover {
    background: #3730a3
  }

  @keyframes mfadeUp {
    from {
      opacity: 0;
      transform: translateY(8px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2>📊 Histórico de Vendas</h2>
      <p style="color:var(--mmuted);font-size:13px">Consulte e gerencie as vendas realizadas</p>
    </div>
    <button class="mbtn mbtn-ghost" onclick="carregarModulo('pdv.html','nav-pdv')">← Voltar ao PDV</button>
  </div>

  <div class="filtros-bar">
    <div class="filtro-group">
      <span class="filtro-label">Data Início</span>
      <input type="date" class="filtro-input" id="f-data-ini" onchange="HistVendas.carregar()">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Data Fim</span>
      <input type="date" class="filtro-input" id="f-data-fim" onchange="HistVendas.carregar()">
    </div>
    <div class="filtro-group">
      <span class="filtro-label">Status</span>
      <select class="filtro-input" id="f-status" onchange="HistVendas.carregar()">
        <option value="">Todos</option>
        <option value="finalizada">Finalizadas</option>
        <option value="cancelada">Canceladas</option>
      </select>
    </div>
    <button class="mbtn mbtn-ghost" style="padding:8px 14px;font-size:12px;align-self:flex-end"
      onclick="HistVendas.carregar()">🔄 Atualizar</button>
  </div>

  <div class="resumo-cards" id="resumo-cards" style="display:none">
    <div class="resumo-card">
      <div class="resumo-card-label">Locações Pendentes</div>
      <div class="resumo-card-val" style="color:#c2410c" id="r-loc-pend">—</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-card-label">📒 Contas a Receber</div>
      <div class="resumo-card-val" style="color:#7c3aed" id="r-crediario-pend">—</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-card-label">Vendas</div>
      <div class="resumo-card-val" id="r-qtd">—</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-card-label">Faturamento</div>
      <div class="resumo-card-val verde" id="r-fat">—</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-card-label">Descontos</div>
      <div class="resumo-card-val roxo" id="r-desc">—</div>
    </div>
    <div class="resumo-card">
      <div class="resumo-card-label">Ticket Médio</div>
      <div class="resumo-card-val" id="r-ticket">—</div>
    </div>
  </div>

  <div class="htable-wrap">
    <table class="htable">
      <thead>
        <tr>
          <th>Nº</th>
          <th>Data/Hora</th>
          <th>Cliente</th>
          <th>Subtotal</th>
          <th>Desconto</th>
          <th>Total</th>
          <th>Conta</th>
          <th>Operador</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="hist-tbody">
        <tr>
          <td colspan="9" class="mstate">⏳ Carregando...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal detalhe venda -->
<div class="modal-overlay" id="modal-venda" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="mv-titulo">Venda</h3>
      <button class="btn-mclose" onclick="HistVendas.fecharModal()">✕</button>
    </div>
    <div class="modal-body" id="mv-body">—</div>
    <div class="modal-footer">
      <button class="mbtn-print" onclick="HistVendas.imprimirAtual()">🖨️ Reimprimir</button>
      <button class="mbtn" id="mv-btn-devolucao" style="display:none;background:#f59e0b;color:#fff;border:none"
        onclick="HistVendas.iniciarDevolucao()">Registrar Devolução</button>
      <button class="mbtn mbtn-cancel" id="mv-btn-cancelar" style="display:none" onclick="HistVendas.estornarVenda()">↺
        Estornar</button>
      <button class="mbtn mbtn-ghost" onclick="HistVendas.fecharModal()" style="margin-left:auto">Fechar</button>
    </div>
    <div class="modal-devolucao" id="mv-devolucao"
      style="display:none; padding: 18px; border-top: 1px dashed var(--mborder); background: var(--mc2);">
      <h4 style="margin:0 0 10px 0;font-size:13px;color:var(--mtext2)">Concluir Devolução</h4>
      <div style="margin-bottom:10px">
        <label style="display:block;font-size:11px;color:var(--mmuted);margin-bottom:4px">Taxa de Atraso / Reposição
          (R$)</label>
        <input type="number" id="dev-taxa" value="0.00" step="0.01"
          style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--mborder);background:var(--mc);color:var(--mtext);font-family:'DM Sans',sans-serif;">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:11px;color:var(--mmuted);margin-bottom:4px">Conta de Destino (para a
          taxa)</label>
        <select id="dev-conta"
          style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--mborder);background:var(--mc);color:var(--mtext);font-family:'DM Sans',sans-serif;"></select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="mbtn mbtn-ghost"
          onclick="document.getElementById('mv-devolucao').style.display='none'">Cancelar</button>
        <button class="mbtn" style="background:#059669;color:#fff;border:none"
          onclick="HistVendas.salvarDevolucao()">Confirmar Devolução</button>
      </div>
    </div>
  </div>
</div>

<script>
  window.HistVendas = (function () {
    var vendaAtual = null;
    var FORMA_LABEL = { 'dinheiro': '💵 Dinheiro', 'pix': '📱 Pix', 'credito': '💳 Crédito', 'debito': '💳 Débito', 'crediario': '📒 Crediário' };

    function fmt(v) { return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ','); }

    // Define datas padrão (hoje)
    (function () {
      var hoje = new Date().toISOString().slice(0, 10);
      document.getElementById('f-data-ini').value = hoje;
      document.getElementById('f-data-fim').value = hoje;
    })();

    function setTbody(h) { var el = document.getElementById('hist-tbody'); if (el) el.innerHTML = h; }

    async function carregar() {
      setTbody('<tr><td colspan="9" class="mstate">⏳ Carregando...</td></tr>');
      document.getElementById('resumo-cards').style.display = 'none';

      var ini = document.getElementById('f-data-ini').value;
      var fim = document.getElementById('f-data-fim').value;
      var status = document.getElementById('f-status').value;
      var fil = window.filialLogada;

      var q = window.supabase.from('vendas').select('*, pagamentos_venda(forma, conta_pk, contas_bancarias(nome))').order('criado_em', { ascending: false });
      if (ini) q = q.gte('criado_em', ini + 'T00:00:00');
      if (fim) q = q.lte('criado_em', fim + 'T23:59:59');
      if (status) q = q.eq('status', status);
      if (fil && fil.pk) q = q.eq('filial_pk', fil.pk);

      var res = await q;
      if (res.error) { setTbody('<tr><td colspan="9" class="mstate">❌ ' + res.error.message + '</td></tr>'); return; }
      var vendas = res.data || [];

      if (!vendas.length) {
        setTbody('<tr><td colspan="9" class="mstate">📭 Nenhuma venda encontrada no período</td></tr>');
        return;
      }

      // Resumo
      var finalizadas = vendas.filter(function (v) { return v.status === 'finalizada'; });
      var locPendentes = finalizadas.filter(function (v) { return v.tipo_venda === 'locacao' && v.status_locacao === 'pendente'; });
      var crediarioPend = finalizadas.filter(function (v) { return v.status_crediario === 'pendente'; });
      var fat = finalizadas.reduce(function (s, v) { return s + Number(v.total); }, 0);
      var desc = finalizadas.reduce(function (s, v) { return s + Number(v.desconto_total); }, 0);

      document.getElementById('r-loc-pend').textContent = locPendentes.length;
      var rcp = document.getElementById('r-crediario-pend'); if (rcp) rcp.textContent = crediarioPend.length;
      document.getElementById('r-qtd').textContent = finalizadas.length;
      document.getElementById('r-fat').textContent = fmt(fat);
      document.getElementById('r-desc').textContent = fmt(desc);
      document.getElementById('r-ticket').textContent = finalizadas.length ? fmt(fat / finalizadas.length) : 'R$ 0,00';
      document.getElementById('resumo-cards').style.display = 'grid';

      var op = window.operadorLogado;
      var podeCancel = op && (op.admin || op.acesso_pdv);

      setTbody(vendas.map(function (v) {
        var dt = new Date(v.criado_em);
        var dtFmt = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        var badge = '';
        if (v.status === 'cancelada') {
          badge = '<span class="badge-cancelada">✕ Cancelada</span>';
        } else if (v.tipo_venda === 'locacao') {
          if (v.status_locacao === 'pendente') badge = '<span class="badge-finalizada" style="background:#fff7ed;color:#c2410c;border-color:#fdba74">⏳ Pendente</span>';
          else badge = '<span class="badge-finalizada" style="background:#eff6ff;color:#1d4ed8;border-color:#93c5fd">📦 Devolvida</span>';
        } else if (v.status_crediario) {
          if (v.status_crediario === 'pendente') badge = '<span class="badge-finalizada" style="background:#ede9fe;color:#7c3aed;border-color:#c4b5fd">📒 Crediário Pendente</span>';
          else badge = '<span class="badge-finalizada" style="background:#d1fae5;color:#059669;border-color:#6ee7b7">✔️ Crediário Recebido</span>';
        } else {
          badge = '<span class="badge-finalizada">✓ Finalizada</span>';
        }
        var tipoHtml = v.tipo_venda === 'locacao' ? '<span style="font-size:10px;background:#e2e8f0;padding:2px 6px;border-radius:4px;margin-right:6px">LOC</span>' : '';
        if (v.status_crediario) tipoHtml += '<span style="font-size:10px;background:#ede9fe;color:#7c3aed;padding:2px 6px;border-radius:4px;margin-right:4px">CRED</span>';
        var contaNomes = [];
        if (v.pagamentos_venda && v.pagamentos_venda.length > 0) {
          v.pagamentos_venda.forEach(function (pv) {
            if (pv.contas_bancarias && pv.contas_bancarias.nome) {
              var label = FORMA_LABEL[pv.forma] || pv.forma;
              contaNomes.push(label + ' - ' + pv.contas_bancarias.nome);
            }
          });
        }
        var cNmTxt = contaNomes.length > 0 ? contaNomes.join('<br>') : '—';

        var credHtml = '';
        if (v.data_vencimento_crediario) {
          var dvp = v.data_vencimento_crediario.split('-');
          credHtml = '<div style="margin-top:3px;font-size:11px;color:#7c3aed">📒 Venc.: ' + dvp[2] + '/' + dvp[1] + '/' + dvp[0] + '</div>';
        }

        return '<tr>' +
          '<td class="num-cell">' + tipoHtml + '#' + String(v.numero).padStart(4, '0') + '</td>' +
          '<td style="font-size:12px">' + dtFmt + credHtml + '</td>' +
          '<td>' + (v.cliente || '<span style="color:var(--mmuted);font-style:italic">—</span>') + '</td>' +
          '<td class="money-cell">' + fmt(v.subtotal) + '</td>' +
          '<td class="disc-cell">' + (Number(v.desconto_total) > 0 ? '- ' + fmt(v.desconto_total) : '—') + '</td>' +
          '<td class="money-cell">' + fmt(v.total) + '</td>' +
          '<td style="font-size:11px;color:var(--mmuted)">' + cNmTxt + '</td>' +
          '<td style="font-size:12px">' + (v.operador || '—') + '</td>' +
          '<td>' + badge + '</td>' +
          '<td><button class="mbtn-sm mbtn-ver" onclick="HistVendas.abrirModal(' + v.pk + ')">Ver</button></td>' +
          '</tr>';
      }).join(''));
    }

    async function abrirModal(pk) {
      document.getElementById('modal-venda').style.display = 'flex';
      document.getElementById('mv-body').innerHTML = '<div style="padding:32px;text-align:center;color:var(--mmuted)">⏳ Carregando...</div>';

      // Busca venda + itens + pagamentos (com conta)
      var [rv, ri, rp] = await Promise.all([
        window.supabase.from('vendas').select('*').eq('pk', pk).single(),
        window.supabase.from('itens_venda').select('*').eq('venda_pk', pk).order('pk'),
        window.supabase.from('pagamentos_venda').select('*, contas_bancarias(nome)').eq('venda_pk', pk)
      ]);
      if (rv.error) { document.getElementById('mv-body').innerHTML = '<p style="color:#ef4444">❌ ' + rv.error.message + '</p>'; return; }
      var v = rv.data;
      vendaAtual = { v: v, itens: ri.data || [], pags: rp.data || [] };

      var dt = new Date(v.criado_em).toLocaleString('pt-BR');
      document.getElementById('mv-titulo').textContent = (v.tipo_venda === 'locacao' ? 'Locação #' : 'Venda #') + String(v.numero).padStart(4, '0');

      var op = window.operadorLogado;
      var btnCancel = document.getElementById('mv-btn-cancelar');
      var btnDev = document.getElementById('mv-btn-devolucao');
      if (btnCancel) btnCancel.style.display = (op && (op.admin || op.acesso_pdv) && v.status === 'finalizada') ? '' : 'none';
      if (btnDev) btnDev.style.display = (v.tipo_venda === 'locacao' && v.status_locacao === 'pendente' && v.status === 'finalizada') ? '' : 'none';

      document.getElementById('mv-devolucao').style.display = 'none';
      var selConta = document.getElementById('dev-conta');
      if (selConta) {
        window.supabase.from('contas_bancarias').select('*').order('nome').then(function (rs_conta) {
          var opts = '<option value="">(Selecione uma conta se houver taxa)</option>';
          if (rs_conta.data) rs_conta.data.forEach(function (c) { opts += '<option value="' + c.pk + '">' + c.nome + '</option>'; });
          selConta.innerHTML = opts;
        });
      }

      var itensTr = (ri.data || []).map(function (it) {
        var desc = Number(it.desconto_pct) > 0 ? '<br><span style="font-size:11px;color:#4f46e5">' + it.desconto_pct + '% desc.</span>' : '';
        return '<tr>' +
          '<td>' + (it.codigo || '—') + '</td>' +
          '<td>' + it.descricao + desc + '</td>' +
          '<td style="text-align:center">' + it.qtd + '</td>' +
          '<td style="font-family:DM Mono,monospace">' + fmt(it.preco_unit) + '</td>' +
          '<td style="font-family:DM Mono,monospace;color:#059669;font-weight:700">' + fmt(it.total_item) + '</td>' +
          '</tr>';
      }).join('');

      var pagChips = (rp.data || []).map(function (p) {
        var cNome = p.contas_bancarias ? p.contas_bancarias.nome : '—';
        return '<span class="pag-chip" title="Conta: ' + cNome + '">' + (FORMA_LABEL[p.forma] || p.forma) + ': ' + fmt(p.valor) + '<br><span style="font-size:10px;opacity:0.8">💳 ' + cNome + '</span></span>';
      }).join('');

      document.getElementById('mv-body').innerHTML =
        '<div class="modal-meta">' +
        '<span class="meta-chip">📅 ' + dt + '</span>' +
        (v.cliente ? '<span class="meta-chip">👤 ' + v.cliente + '</span>' : '') +
        (v.operador ? '<span class="meta-chip">🔑 ' + v.operador + '</span>' : '') +
        (v.tipo_venda === 'locacao' ? '<span class="meta-chip" style="background:#e2e8f0">📋 Locação (' + v.status_locacao + ')</span>' : '') +
        '<span class="meta-chip ' + (v.status === 'finalizada' ? 'badge-finalizada' : 'badge-cancelada') + '">' +
        (v.status === 'finalizada' ? '✓ Finalizada' : '✕ Cancelada') + '</span>' +
        '</div>' +
        '<div class="modal-section-title">Itens</div>' +
        '<table class="modal-itens-table">' +
        '<thead><tr><th>Cód.</th><th>Produto</th><th>Qtd</th><th>Preço</th><th>Total</th></tr></thead>' +
        '<tbody>' + itensTr + '</tbody>' +
        '</table>' +
        '<div class="modal-section-title">Pagamentos</div>' +
        '<div class="pag-chips">' + pagChips + '</div>' +
        '<div class="modal-total-box">' +
        '<div class="modal-total-row"><span>Subtotal</span><span class="modal-total-val">' + fmt(v.subtotal) + '</span></div>' +
        (Number(v.desconto_total) > 0 ? '<div class="modal-total-row"><span>Desconto</span><span class="modal-total-val roxo">- ' + fmt(v.desconto_total) + '</span></div>' : '') +
        '<div class="modal-total-row big"><span>Total</span><span class="modal-total-val verde">' + fmt(v.total) + '</span></div>' +
        '</div>';
    }

    function fecharModal() {
      document.getElementById('modal-venda').style.display = 'none';
      document.getElementById('mv-devolucao').style.display = 'none';
      vendaAtual = null;
    }

    function iniciarDevolucao() {
      document.getElementById('mv-devolucao').style.display = 'block';
      document.getElementById('dev-taxa').value = '0.00';
    }

    async function salvarDevolucao() {
      var vPk = vendaAtual.v.pk;
      var taxa = Number(document.getElementById('dev-taxa').value) || 0;
      var contaPk = document.getElementById('dev-conta').value;

      if (taxa > 0 && !contaPk) {
        window.showToast('Selecione a conta para receber o valor da taxa de atraso/reposição.', 'error'); return;
      }

      if (taxa > 0) {
        var rm = await window.supabase.from('movimentacoes_financeiras').insert([{
          conta_pk: contaPk, venda_pk: vPk, tipo_movimento: 'entrada', valor: taxa,
          descricao: 'Taxa de Atraso/Reposição - Locação #' + String(vendaAtual.v.numero).padStart(4, '0')
        }]);
        if (rm.error) { window.showToast('Erro ao gravar taxa: ' + rm.error.message, 'error'); return; }
      }

      var ru = await window.supabase.from('vendas').update({ status_locacao: 'devolvida' }).eq('pk', vPk);
      if (ru.error) { window.showToast('Erro ao atualizar status: ' + ru.error.message, 'error'); return; }

      window.showToast('Devolução concluída com sucesso!');
      fecharModal();
      carregar();
    }

    async function estornarVenda() {
      if (!vendaAtual || !confirm('Estornar esta venda? O saldo dos produtos retornará e uma movimentação de saída será criada na conta.')) return;

      var btn = document.getElementById('mv-btn-cancelar');
      btn.disabled = true; btn.textContent = 'Estornando...';

      try {
        var vPk = vendaAtual.v.pk;

        // 1. Volta saldo dos produtos
        for (var i = 0; i < vendaAtual.itens.length; i++) {
          var it = vendaAtual.itens[i];
          if (!it.produto_pk) continue;

          // Pega saldo atual
          var rs = await window.supabase.from('produtos').select('saldo').eq('pk', it.produto_pk).single();
          if (rs.data) {
            var s = Number(rs.data.saldo || 0) + Number(it.qtd);
            await window.supabase.from('produtos').update({ saldo: s }).eq('pk', it.produto_pk);
          }
        }

        // 2. Mudar status da Venda
        var res = await window.supabase.from('vendas').update({ status: 'cancelada' }).eq('pk', vPk);
        if (res.error) throw res.error;

        // 3. Estorno financeiro (saída) p/ cada pagamento associado a conta
        for (var j = 0; j < vendaAtual.pags.length; j++) {
          var p = vendaAtual.pags[j];
          if (p.conta_pk) {
            await window.supabase.from('movimentacoes_financeiras').insert([{
              conta_pk: p.conta_pk,
              venda_pk: vPk,
              tipo_movimento: 'saida',
              valor: p.valor,
              descricao: 'Estorno de Venda #' + String(vendaAtual.v.numero).padStart(4, '0')
            }]);
          }
        }

        window.showToast('Venda estornada com sucesso!');
        fecharModal();
        carregar();
      } catch (err) {
        window.showToast('Erro: ' + err.message, 'error');
        btn.disabled = false; btn.textContent = '↺ Estornar Venda';
      }
    }

    function imprimirAtual() {
      if (!vendaAtual) return;
      var v = vendaAtual.v, itens = vendaAtual.itens, pags = vendaAtual.pags;
      var f = window.filialLogada;
      var dt = new Date(v.criado_em).toLocaleString('pt-BR');
      var itensTxt = itens.map(function (it) {
        var d = Number(it.desconto_pct) > 0 ? ' (' + it.desconto_pct + '% desc.)' : '';
        return it.qtd + 'x ' + it.descricao + d + '\n   ' + 'R$ ' + Number(it.preco_unit).toFixed(2) + ' x ' + it.qtd + ' = R$ ' + Number(it.total_item).toFixed(2);
      }).join('\n');
      var pagTxt = pags.map(function (p) { return '  ' + (FORMA_LABEL[p.forma] || p.forma) + ': R$ ' + Number(p.valor).toFixed(2); }).join('\n');
      var html = '<html><head><title>Cupom #' + v.numero + '</title><style>body{font-family:monospace;font-size:12px;width:300px;margin:0 auto;padding:10px}h2{text-align:center;font-size:14px}p{margin:2px 0}.l{border-top:1px dashed #000;margin:6px 0}</style></head><body>' +
        '<h2>' + (f ? f.nome : '') + '</h2>' +
        '<p style="text-align:center">Cupom #' + String(v.numero).padStart(4, '0') + '</p>' +
        '<p style="text-align:center">' + dt + '</p>' +
        (v.cliente ? '<p>Cliente: ' + v.cliente + '</p>' : '') +
        (v.operador ? '<p>Operador: ' + v.operador + '</p>' : '') +
        '<div class="l"></div><pre>' + itensTxt + '</pre><div class="l"></div>' +
        '<p>Subtotal: R$ ' + Number(v.subtotal).toFixed(2) + '</p>' +
        (Number(v.desconto_total) > 0 ? '<p>Desconto: - R$ ' + Number(v.desconto_total).toFixed(2) + '</p>' : '') +
        '<p><strong>TOTAL: R$ ' + Number(v.total).toFixed(2) + '</strong></p>' +
        '<div class="l"></div><p>Pagamentos:</p><pre>' + pagTxt + '</pre>' +
        '<div class="l"></div><p style="text-align:center">Obrigado pela preferência!</p>' +
        '</body></html>';
      var w = window.open('', '_blank', 'width=340,height=600');
      if (w) { w.document.write(html); w.document.close(); setTimeout(function () { w.print(); }, 400); }
    }

    carregar();
    // Expoe carregarVendas globalmente se estiver dentro da pdv principal
    window.carregarVendas = carregar;
    return { carregar, abrirModal, fecharModal, estornarVenda, imprimirAtual, iniciarDevolucao, salvarDevolucao };
  })();
</script>
