<!DOCTYPE html>
<html class="dark" lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festou</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0c0e12">
  <link rel="apple-touch-icon" href="img/logo.png">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface-variant": "#a8abb5",
            "surface-bright": "#292c34",
            "outline-variant": "#444850",
            "primary-dim": "#609efc",
            "tertiary-dim": "#d0beef",
            "secondary-dim": "#b0b9ce",
            "on-surface": "#e3e5ef",
            "surface-container-highest": "#22262d",
            "surface-dim": "#0c0e12",
            "primary-container": "#0560ba",
            "surface-container-high": "#1d2026",
            "surface-variant": "#22262d",
            "surface-container-low": "#111318",
            "surface-container": "#171a1f",
            "background": "#0c0e12"
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
          }
        }
      }
    }
  </script>

  <!-- Shared CSS (módulos dependem das variáveis CSS) -->
  <link rel="stylesheet" href="css/shared.css">

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body { background-color: #0c0e12; font-family: 'Inter', sans-serif; }

    /* Sincroniza data-theme com Tailwind dark class */
    html[data-theme="light"] { --tw-dark: 0; }
    html[data-theme="dark"]  { color-scheme: dark; }

    /* ── Light mode: sobrescreve fundos hardcoded dark ───────── */
    html[data-theme="light"] body              { background-color: #f4f4f9; }
    html[data-theme="light"] #app-main         { background-color: #f4f4f9; }
    html[data-theme="light"] #content          { background-color: #f4f4f9 !important; }
    html[data-theme="light"] header            { background-color: #ffffff !important; border-bottom-color: #e5e7eb; }
    html[data-theme="light"] #nav-drawer       { background-color: #ffffff; border-right-color: #e5e7eb; }
    html[data-theme="light"] #bottom-nav       { background-color: rgba(255,255,255,.9); border-top-color: #e5e7eb; }
    html[data-theme="light"] .nav-btn          { color: #374151; }
    html[data-theme="light"] .nav-btn:hover    { background-color: rgba(0,0,0,.05); }
    html[data-theme="light"] #topbar-filial-badge { background: rgba(0,0,0,.06); border-color: #d1d5db; color: #374151; }
    html[data-theme="light"] #topbar-user-name { color: #111827; }
    html[data-theme="light"] #user-display     { color: #111827; }
    html[data-theme="light"] #theme-label      { color: #6b7280; }
    html[data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* Drawer transition */
    #nav-drawer { transition: transform 0.3s cubic-bezier(.4,0,.2,1); overflow-y: auto; }

    /* Content area scroll */
    #content { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* Toast */
    #toast {
      position: fixed; bottom: 88px; right: 16px; left: 16px;
      max-width: 420px; margin: 0 auto;
      background: #333; color: #fff;
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; display: none; align-items: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.4); z-index: 9999;
    }
    @media(min-width: 480px) { #toast { left: auto; width: auto; } }
    @media(min-width: 1024px) { #toast { bottom: 16px; } }
    #toast.show  { display: flex; }
    #toast.success { background: #065f46; }
    #toast.error   { background: #991b1b; }

    /* Login */
    #login-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: #0c0e12;
    }
    #login-screen.hidden { display: none; }

    /* App */
    #app { display: none; }
    #app.visible { display: flex; width: 100%; }

    /* ── Desktop layout (≥1024px) ──────────────────────────── */
    @media(min-width: 1024px) {
      /* Sidebar always visible */
      #nav-drawer   { transform: translateX(0) !important; }
      /* Hide overlay */
      #nav-overlay  { display: none !important; }
      /* Content offset to the right of the sidebar */
      #app-main     { margin-left: 256px; }
      /* Hide mobile-only elements */
      #bottom-nav   { display: none !important; }
      #topbar-hamburger { display: none !important; }
      #topbar-logo-mobile { display: none !important; }
    }

    /* Content padding: horizontal + bottom nav space no mobile */
    #content { padding: 16px 16px 80px; }
    @media(min-width: 1024px) {
      #content { padding: 28px 40px 0; }
    }

    /* PDV precisa de full-bleed — sem padding no container */
    #content:has(.pdv-layout) { padding: 0 !important; }

    /* ── Modo PDV: tela cheia, sem sidebar/header ───────────── */
    body.pdv-mode #nav-drawer    { display: none !important; }
    body.pdv-mode header         { display: none !important; }
    body.pdv-mode #bottom-nav    { display: none !important; }
    body.pdv-mode #app-main      { margin-left: 0 !important; }

    /* ── Sidebar colapsada ──────────────────────────────────── */
    #nav-drawer.collapsed { width: 64px !important; }
    #nav-drawer.collapsed .nav-label,
    #nav-drawer.collapsed .sec-label,
    #nav-drawer.collapsed .sidebar-section-title { display: none !important; }
    #nav-drawer.collapsed .nav-btn span:not(.material-symbols-outlined) { display: none !important; }
    #nav-drawer.collapsed .nav-btn { justify-content: center !important; padding-left: 0 !important; padding-right: 0 !important; }
    #nav-drawer.collapsed p.px-3 { display: none !important; }
    #nav-drawer.collapsed #sidebar-logo-text { display: none !important; }
    body.sidebar-collapsed #app-main { margin-left: 64px !important; }
    #btn-sidebar-collapse { transition: transform .3s; }
    body.sidebar-collapsed #btn-sidebar-collapse { transform: scaleX(-1); }
  </style>
</head>

<body class="text-on-surface font-body">

  <!-- ══ LOGIN ══════════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="w-full max-w-sm mx-4 bg-[#171a1f] rounded-2xl p-8 border border-white/5 shadow-2xl">

      <div class="text-center mb-7">
        <img id="login-logo-padrao" src="img/logo.png" alt="Logo" class="max-w-[160px] mx-auto mb-3">
        <img id="login-festou-logo" src="logo_festou.png" alt="Festou" class="max-h-[120px] max-w-[240px] mx-auto mb-3 object-contain hidden">
        <p class="text-sm text-on-surface-variant">Faça login para acessar o sistema</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5">Filial</label>
          <div id="filial-wrap">
            <div id="filial-loading" class="text-sm text-on-surface-variant bg-white/5 rounded-lg px-4 py-3 text-center">⏳ Carregando filiais...</div>
            <select id="sel-filial" style="display:none"
              class="w-full bg-[#22262d] border border-white/10 text-on-surface rounded-lg px-4 py-3 text-sm outline-none focus:border-primary-dim transition-colors"
              onkeydown="if(event.key==='Enter') document.getElementById('inp-login').focus()"
              onchange="toggleLoginLogo()">
              <option value="">Selecione a filial...</option>
            </select>
          </div>
        </div>

        <div class="border-t border-white/5"></div>

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5">Login</label>
          <input type="text" id="inp-login" placeholder="Seu login"
            class="w-full bg-[#22262d] border border-white/10 text-on-surface rounded-lg px-4 py-3 text-sm outline-none focus:border-primary-dim transition-colors placeholder:text-on-surface-variant/50"
            onkeydown="if(event.key==='Enter') document.getElementById('inp-senha').focus()">
        </div>

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5">Senha</label>
          <input type="password" id="inp-senha" placeholder="Sua senha"
            class="w-full bg-[#22262d] border border-white/10 text-on-surface rounded-lg px-4 py-3 text-sm outline-none focus:border-primary-dim transition-colors placeholder:text-on-surface-variant/50"
            onkeydown="if(event.key==='Enter') fazerLogin()">
        </div>

        <button id="btn-entrar" onclick="fazerLogin()" disabled
          class="w-full bg-primary-container hover:bg-blue-700 disabled:bg-white/10 disabled:text-on-surface-variant text-white font-bold py-3 rounded-xl text-sm transition-all duration-200 active:scale-95">
          Entrar
        </button>

        <div id="login-error" class="text-red-400 text-xs text-center min-h-[16px]"></div>
      </div>
    </div>
  </div>

          <span class="material-symbols-outlined">menu</span>
        </button>
        <img src="img/logo_fundo_transp.png" alt="Logo" id="topbar-logo-mobile" class="max-h-[36px] max-w-[120px] object-contain">
      </div>
      <div class="flex items-center gap-3">
        <div id="topbar-filial-badge" class="hidden px-3 py-1 bg-white/5 rounded-full text-[11px] font-bold text-on-surface-variant border border-white/10"></div>
        <div id="topbar-user" class="hidden items-center gap-2 border-l border-white/10 pl-3">
          <span class="material-symbols-outlined text-on-surface-variant text-xl">account_circle</span>
          <span id="topbar-user-name" class="text-sm font-semibold text-white">—</span>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div id="content" class="flex-1 overflow-y-auto bg-[#0c0e12]">
    </div>

    <!-- Bottom Nav Bar (mobile only) -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-5 pt-2 bg-[#111318]/90 backdrop-blur-xl border-t border-white/5 rounded-t-2xl shadow-[0_-4px_40px_rgba(0,0,0,0.4)]">
      <button onclick="ir('home.html','nav-home')" id="bnav-home"
        class="bnav-btn flex flex-col items-center justify-center gap-0.5 py-1 px-3 text-on-surface-variant hover:text-white transition-colors active:scale-90">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[9px] font-medium uppercase tracking-widest">Início</span>
      </button>
      <button onclick="ir('get_produtos.html','nav-produtos')" id="bnav-produtos" style="display:none"
        class="bnav-btn flex flex-col items-center justify-center gap-0.5 py-1 px-3 text-on-surface-variant hover:text-white transition-colors active:scale-90">
        <span class="material-symbols-outlined text-2xl">inventory_2</span>
        <span class="text-[9px] font-medium uppercase tracking-widest">Produtos</span>
      </button>
      <button onclick="ir('cadastro_clientes.html','nav-clientes')" id="bnav-clientes" style="display:none"
        class="bnav-btn flex flex-col items-center justify-center gap-0.5 py-1 px-3 text-on-surface-variant hover:text-white transition-colors active:scale-90">
        <span class="material-symbols-outlined text-2xl">group</span>
        <span class="text-[9px] font-medium uppercase tracking-widest">Clientes</span>
      </button>
      <button onclick="ir('pdv.html','nav-pdv')" id="bnav-pdv" style="display:none"
        class="bnav-btn flex flex-col items-center justify-center gap-0.5 py-1 px-3 text-on-surface-variant hover:text-white transition-colors active:scale-90">
        <span class="material-symbols-outlined text-2xl">point_of_sale</span>
        <span class="text-[9px] font-medium uppercase tracking-widest">PDV</span>
      </button>
      <button onclick="abrirSidebar()"
        class="flex flex-col items-center justify-center gap-0.5 py-1 px-3 text-on-surface-variant hover:text-white transition-colors active:scale-90">
        <span class="material-symbols-outlined text-2xl">menu</span>
        <span class="text-[9px] font-medium uppercase tracking-widest">Menu</span>
      </button>
    </nav>

    </div><!-- /app-main -->

  </div><!-- /app -->

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/shared.js"></script>
  <script>
    window.operadorLogado = null;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    window.filialLogada = null;
    window._editData = null;
    window._modulosFilial = new Set();

    // ── Drawer ────────────────────────────────────────────────
    function abrirSidebar() {
      if (window.innerWidth >= 1024) return; // desktop: always visible
      const overlay = document.getElementById('nav-overlay');
      const drawer  = document.getElementById('nav-drawer');
      overlay.classList.remove('hidden');
      setTimeout(() => drawer.classList.remove('-translate-x-full'), 10);
    }

    function fecharSidebar() {
      if (window.innerWidth >= 1024) return; // desktop: never close
      const overlay = document.getElementById('nav-overlay');
      const drawer  = document.getElementById('nav-drawer');
      drawer.classList.add('-translate-x-full');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    // Compat alias
    function toggleSidebarCollapse() {}

    // ── Destaca item ativo no drawer e bottom nav ──────────────
    function marcarAtivo(navId) {
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('bg-white/10', 'text-white', 'font-semibold');
      });
      document.querySelectorAll('.bnav-btn').forEach(b => {
        b.classList.remove('text-white');
        b.classList.add('text-on-surface-variant');
      });
      if (navId) {
        const btn = document.getElementById(navId);
        if (btn) btn.classList.add('bg-white/10', 'text-white', 'font-semibold');
        // Bottom nav sync
        const bnavMap = {
          'nav-home': 'bnav-home',
          'nav-produtos': 'bnav-produtos',
          'nav-clientes': 'bnav-clientes',
          'nav-pdv': 'bnav-pdv'
        };
        const bBtn = document.getElementById(bnavMap[navId]);
        if (bBtn) { bBtn.classList.add('text-white'); bBtn.classList.remove('text-on-surface-variant'); }
      }
    }

    // ── Carrega filiais no login ───────────────────────────────
    (async function carregarFiliais() {
      const { data, error } = await window.supabase
        .from('filiais').select('pk,codigo,nome').eq('ativo', true).order('codigo');

      const loading = document.getElementById('filial-loading');
      const sel     = document.getElementById('sel-filial');
      const btn     = document.getElementById('btn-entrar');

      if (error || !data || data.length === 0) {
        loading.textContent = '⚠️ Nenhuma filial encontrada';
        return;
      }

      data.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.pk;
        opt.dataset.codigo = f.codigo;
        opt.dataset.nome   = f.nome;
        opt.textContent    = `[${f.codigo}] ${f.nome}`;
        sel.appendChild(opt);
      });

      if (data.length === 1) { sel.value = data[0].pk; toggleLoginLogo(); }

      loading.style.display = 'none';
      sel.style.display     = '';
      btn.disabled          = false;
    })();

    function toggleLoginLogo() {
      var sel  = document.getElementById('sel-filial');
      var opt  = sel ? sel.options[sel.selectedIndex] : null;
      var is02 = opt && opt.dataset.codigo === '02';
      var lp   = document.getElementById('login-logo-padrao');
      var lf   = document.getElementById('login-festou-logo');
      if (lp) lp.classList.toggle('hidden', is02);
      if (lf) lf.classList.toggle('hidden', !is02);
    }

    // ── Login ──────────────────────────────────────────────────
    async function fazerLogin() {
      const filialPk = document.getElementById('sel-filial').value;
      const login    = document.getElementById('inp-login').value.trim();
      const senha    = document.getElementById('inp-senha').value.trim();
      const erro     = document.getElementById('login-error');
      erro.textContent = '';

      if (!filialPk) { erro.textContent = 'Selecione a filial.'; return; }
      if (!login || !senha) { erro.textContent = 'Preencha login e senha.'; return; }

      const { data, error } = await window.supabase
        .from('operadores').select('*')
        .eq('login', login).eq('senha', senha).eq('ativo', true);

      if (error || !data || data.length === 0) { erro.textContent = 'Login ou senha inválidos.'; return; }

      const op = data.find(d => d.filial_pk === parseInt(filialPk) || d.filial_pk === null);
      if (!op) { erro.textContent = 'Usuário sem acesso a esta filial.'; return; }

      const resFil = await window.supabase.from('filiais').select('*').eq('pk', parseInt(filialPk)).single();
      if (resFil.error) { erro.textContent = 'Erro ao carregar dados da filial.'; return; }
      window.filialLogada  = resFil.data;
      window.operadorLogado = op;

      // Atualiza UI
      document.getElementById('user-display').textContent      = op.nome;
      document.getElementById('user-filial-badge').textContent = `${window.filialLogada.codigo} · ${window.filialLogada.nome}`;
      const badge = document.getElementById('topbar-filial-badge');
      if (badge) { badge.textContent = `${window.filialLogada.codigo} · ${window.filialLogada.nome}`; badge.classList.remove('hidden'); }
      const topUser = document.getElementById('topbar-user');
      const topUserName = document.getElementById('topbar-user-name');
      if (topUser) { topUser.classList.remove('hidden'); topUser.style.display = 'flex'; }
      if (topUserName) topUserName.textContent = op.nome;

      await aplicarPermissoes(op);

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');

      ir('home.html', 'nav-home');
    }

    async function aplicarPermissoes(op) {
      const show = (id, v) => {
        const el = document.getElementById(id);
        if (el) el.style.display = v ? '' : 'none';
      };
      const fil = window.filialLogada;

      const { data: modsData } = await window.supabase
        .from('modulos_filiais').select('modulo').eq('filial_pk', fil.pk).eq('ativo', true);
      const mods = new Set((modsData || []).map(m => m.modulo));
      window._modulosFilial = mods;

      const temAgenda    = mods.has('agenda')     && (op.admin || op.acesso_agenda);
      const temPdv       = mods.has('pdv')        && (op.admin || op.acesso_pdv);
      const temDash      = mods.has('pdv')        && (op.admin || op.acesso_dashboard);
      const temHist      = mods.has('historico')  && (op.admin || op.acesso_pdv || op.acesso_historico);
      const temFunc      = (mods.has('funcionarios') || mods.has('pdv')) && (op.admin || op.acesso_funcionarios);
      const temPonto     = (mods.has('ponto')     || mods.has('pdv')) && (op.admin || op.acesso_ponto);
      const temReceitas  = mods.has('receitas')   && (op.admin || op.acesso_pdv || op.acesso_receitas);
      const temCat       = mods.has('categorias') && (op.admin || op.acesso_produtos || op.acesso_categorias);
      const temSep       = mods.has('separacao')  && (op.admin || op.acesso_separacao || op.acesso_criar_ordem);
      const temClientes  = mods.has('clientes')   && (op.admin || op.acesso_clientes);
      const temDespesas  = mods.has('despesas')   && (op.admin || op.acesso_despesas);
      const temFinanceiro = mods.has('financeiro') && (op.admin || op.acesso_financeiro);

      window._acessoFechamentoPonto = (mods.has('ponto') || mods.has('pdv')) && (op.admin || op.acesso_fechamento_ponto);

      show('nav-produtos',    mods.has('produtos') && (op.admin || op.acesso_produtos));
      show('nav-armazem',     mods.has('armazens') && (op.admin || op.acesso_armazens));
      show('nav-agenda',      temAgenda);
      show('sec-agenda',      temAgenda);
      show('nav-dashboard',   temDash);
      show('nav-pdv',         temPdv);
      show('nav-vendedor',    temPdv);
      show('nav-historico',   temHist);
      show('nav-funcionario', temFunc);
      show('nav-ponto',       temPonto);
      show('nav-holerites',   op.matricula ? true : false);
      show('nav-espelho',     op.acesso_espelho_ponto || false);
      show('sec-rh',          temFunc || temPonto || op.matricula || op.acesso_espelho_ponto);
      show('nav-receitas',    temReceitas);
      show('sec-pdv',         temDash || temPdv || temHist || temReceitas);
      show('nav-clientes',    temClientes);
      show('nav-fornecedores',temClientes);
      show('nav-categoria',   temCat);
      show('nav-separacao',   temSep);
      show('sec-separacao',   temSep);
      show('sec-admin',       op.admin);
      show('nav-financeiro',  temFinanceiro);
      show('nav-despesas',    temDespesas);
      show('nav-filiais',     op.admin);
      show('nav-operador',    op.admin);
      show('nav-fechamento',  mods.has('fechamento') && (op.admin || op.acesso_fechamento));

      // Bottom nav
      show('bnav-produtos', mods.has('produtos') && (op.admin || op.acesso_produtos));
      show('bnav-clientes', temClientes);
      show('bnav-pdv',      temPdv);
    }

    function logout() {
      window.operadorLogado = null;
      window.filialLogada   = null;
      window._editData      = null;

      const badge = document.getElementById('topbar-filial-badge');
      if (badge) badge.classList.add('hidden');
      const topUser = document.getElementById('topbar-user');
      if (topUser) topUser.classList.add('hidden');

      document.getElementById('app').classList.remove('visible');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('inp-login').value = '';
      document.getElementById('inp-senha').value = '';
      document.getElementById('content').innerHTML = '';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-white/10','text-white','font-semibold'));
    }

    // ── Carregador de módulos ──────────────────────────────────
    window.ir = window.carregarModulo = function (arquivo, navId) {
      fecharSidebar();
      marcarAtivo(navId);

      // Modo PDV: esconde sidebar e header para tela cheia
      const isPdv = arquivo === 'pdv.html';
      document.body.classList.toggle('pdv-mode', isPdv);

      // Restaura bottom nav ao navegar (o PDV esconde quando carregado)
      const bn = document.getElementById('bottom-nav');
      if (bn) bn.style.removeProperty('display');

      fetch(arquivo)
        .then(r => { if (!r.ok) throw new Error('Arquivo não encontrado: ' + arquivo); return r.text(); })
        .then(html => {
          const content = document.getElementById('content');
          content.innerHTML = html;
          content.scrollTo(0, 0);
          content.querySelectorAll('script').forEach(old => {
            const s = document.createElement('script');
            Array.from(old.attributes).forEach(attr => s.setAttribute(attr.name, attr.value));
            s.textContent = old.textContent;
            document.body.appendChild(s);
            old.remove();
          });
        })
        .catch(err => {
          document.getElementById('content').innerHTML = `<p style="color:#dc2626;padding:20px">❌ ${err.message}</p>`;
        });
    };

    // ── Sair do PDV (volta ao home) ────────────────────────────
    window.sairDoPDV = function() {
      document.body.classList.remove('pdv-mode');
      window.ir('home.html', 'nav-home');
    };

    // ── Colapsar/expandir sidebar ──────────────────────────────
    function toggleSidebarCollapse() {
      const drawer = document.getElementById('nav-drawer');
      const collapsed = drawer.classList.toggle('collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      try { localStorage.setItem('sidebar_collapsed', collapsed ? '1' : '0'); } catch(e) {}
    }

    // Restaurar estado do sidebar ao carregar
    try {
      if (localStorage.getItem('sidebar_collapsed') === '1') {
        document.getElementById('nav-drawer')?.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
      }
    } catch(e) {}
  </script>
</body>

</html>
