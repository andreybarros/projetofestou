<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque</title>
  <link rel="icon" href="img/logo.png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* Estilos específicos do layout principal (Sidebar e Login) que ainda não foram totalmente abstraídos ou são estruturais */
    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: var(--content-bg);
    }

    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .12);
      margin: 16px;
    }

    [data-theme="dark"] .login-box {
      background: #1a1d27;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-logo div:first-child {
      font-size: 36px;
      margin-bottom: 6px;
    }

    .login-logo h2 {
      color: #4f46e5;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-logo p {
      color: #888;
      font-size: 12px;
    }

    .login-box label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    [data-theme="dark"] .login-box label {
      color: #9ca3af;
    }

    .login-box input,
    .login-box select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
      background: #fff;
      color: #333;
    }

    [data-theme="dark"] .login-box input,
    [data-theme="dark"] .login-box select {
      background: #22263a;
      border-color: #2e3250;
      color: #e8e9f3;
    }

    .filial-select-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .filial-select-wrap select {
      appearance: none;
      padding-right: 36px;
      cursor: pointer;
    }

    .filial-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #4f46e5;
      pointer-events: none;
    }

    .login-error {
      color: #dc2626;
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: var(--surface);
      color: var(--sidebar-txt);
      flex-direction: column;
      padding: 0;
      display: none;
      transition: transform .25s;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar.visible {
      display: flex;
    }

    @media(max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        display: flex !important;
      }

      .sidebar.open {
        transform: translateX(0);
      }
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: bold;
    }

    .sidebar-filial {
      font-size: 10px;
      color: var(--sidebar-mut);
      margin-top: 3px;
    }

    .btn-close-sidebar {
      display: none;
      background: none;
      border: none;
      color: var(--sidebar-txt);
      font-size: 22px;
      cursor: pointer;
    }

    @media(max-width: 768px) {
      .btn-close-sidebar {
        display: block;
      }
    }

    .sidebar-section {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--sidebar-mut);
      padding: 16px 16px 6px;
    }

    .sidebar button.nav-btn {
      background: transparent;
      border: none;
      color: var(--sidebar-txt);
      padding: 10px 16px;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      width: 100%;
      transition: background .15s;
    }

    .sidebar button.nav-btn:hover {
      background: var(--surface-hv);
    }

    .sidebar button.nav-btn.active {
      background: var(--sidebar-act);
      font-weight: bold;
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 14px 16px;
    }

    .user-info .user-name {
      font-size: 12px;
      color: var(--sidebar-mut);
    }

    .user-info strong {
      color: var(--sidebar-txt);
      display: block;
      font-size: 13px;
    }

    .user-filial-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 10px;
      background: rgba(255, 255, 255, .15);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--sidebar-mut);
    }

    .toggle-btn {
      position: relative;
      width: 38px;
      height: 20px;
      background: rgba(255, 255, 255, .2);
      border-radius: 20px;
      cursor: pointer;
      border: none;
      transition: background .2s;
    }

    .toggle-btn::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform .2s;
    }

    [data-theme="dark"] .toggle-btn {
      background: rgba(108, 99, 255, .5);
    }

    [data-theme="dark"] .toggle-btn::after {
      transform: translateX(18px);
    }

    .btn-logout {
      width: 100%;
      background: rgba(255, 255, 255, .1) !important;
      border: 1px solid rgba(255, 255, 255, .25) !important;
      color: #fff !important;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    /* APP STRUCTURE */
    #app {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    #app.visible {
      display: flex;
    }

    .topbar {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      padding: 12px 16px;
    }

    @media(max-width: 768px) {
      .topbar {
        display: flex;
      }
    }

    .content {
      flex: 1;
      padding: 20px;
      background: var(--content-bg);
      overflow-y: auto;
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 99;
    }

    #sidebar-overlay.show {
      display: block;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 16px;
      left: 16px;
      max-width: 420px;
      margin: 0 auto;
      background: #333;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
      z-index: 999;
    }

    #toast.show {
      display: flex;
    }

    #toast.success {
      background: #065f46;
    }

    #toast.error {
      background: #991b1b;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <img src="img/logo.png" alt="Logo" style="width: 140px; height: auto; margin-bottom: 12px;">
        <h2>Controle de Estoque</h2>
        <p>Faça login para acessar o sistema</p>
      </div>

      <label>Filial</label>
      <div class="filial-select-wrap" id="filial-wrap">
        <div id="filial-loading" style="font-size:12px;color:#888;text-align:center;padding:10px">⏳ Carregando
          filiais...</div>
        <select id="sel-filial" style="display:none"
          onkeydown="if(event.key==='Enter') document.getElementById('inp-login').focus()">
          <option value="">Selecione a filial...</option>
        </select>
      </div>

      <div style="height:1px;background:#e5e7eb;margin:12px 0"></div>

      <label>Login</label>
      <input type="text" id="inp-login" placeholder="Seu login"
        onkeydown="if(event.key==='Enter') document.getElementById('inp-senha').focus()">
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="Sua senha" onkeydown="if(event.key==='Enter') fazerLogin()">
      <button class="mbtn mbtn-primary" style="width:100%;padding:12px" id="btn-entrar" onclick="fazerLogin()"
        disabled>Entrar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div id="sidebar-overlay" onclick="carregarModulo(null)"></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div>
          <div class="sidebar-title">
            <img src="img/logo.png" alt="Logo" style="width: 24px; vertical-align: middle; margin-right: 6px;">
            Controle de Estoque
          </div>
          <div class="sidebar-filial" id="sidebar-filial-label">—</div>
        </div>
        <button class="btn-close-sidebar"
          onclick="document.getElementById('sidebar').classList.remove('open')">✕</button>
      </div>

      <span class="sidebar-section">Geral</span>
      <button class="nav-btn" id="nav-home" onclick="ir('home.html','nav-home')">🏠 Home</button>

      <span class="sidebar-section">Estoque</span>
      <button class="nav-btn" id="nav-produtos" onclick="ir('get_produtos.html','nav-produtos')" style="display:none">📦
        Produtos</button>

      <span class="sidebar-section">Estrutura</span>
      <button class="nav-btn" id="nav-armazem" onclick="ir('cadastro_armazem.html','nav-armazem')"
        style="display:none">🏭 Armazéns</button>

      <span class="sidebar-section" id="sec-agenda" style="display:none">Eventos</span>
      <button class="nav-btn" id="nav-agenda" onclick="ir('agenda.html','nav-agenda')" style="display:none">📅
        Agenda</button>

      <span class="sidebar-section" id="sec-separacao" style="display:none">Separação</span>
      <button class="nav-btn" id="nav-separacao" onclick="ir('cadastro_separacao.html','nav-separacao')"
        style="display:none">📋 Separação de Material</button>

      <span class="sidebar-section" id="sec-admin" style="display:none">Administração</span>
      <button class="nav-btn" id="nav-filiais" onclick="ir('cadastro_filial.html','nav-filiais')"
        style="display:none">🏢 Filiais</button>
      <button class="nav-btn" id="nav-operador" onclick="ir('cadastro_operador.html','nav-operador')"
        style="display:none">👤 Operadores</button>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-name">Logado como</div>
          <strong id="user-display">—</strong>
          <span class="user-filial-badge" id="user-filial-badge">—</span>
        </div>
        <div class="theme-toggle">
          <span id="theme-label">☀️ Light</span>
          <button class="toggle-btn" onclick="alternarTema()"></button>
        </div>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="topbar">
        <button style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer"
          onclick="document.getElementById('sidebar').classList.add('open')">☰</button>
        <span style="color:#fff;font-size:14px;font-weight:bold">
          <img src="img/logo.png" alt="Logo" style="width: 20px; vertical-align: middle; margin-right: 6px;">
          Controle de Estoque
        </span>
      </div>
      <div class="content" id="content">
        <div style="text-align: center; margin-top: 40px;">
          <img src="img/logo.png" alt="Logo" style="width: 180px; margin-bottom: 20px;">
          <h2 style="color:var(--mtext2)">Bem-vindo ao Controle de Estoque</h2>
          <p style="color:var(--mmuted);margin-top:6px;font-size:13px">Escolha um módulo no menu lateral.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/shared.js"></script>
  <script>
    // Lógica de Login específica da index
    async function fazerLogin() {
      const filialPk = document.getElementById('sel-filial').value;
      const login = document.getElementById('inp-login').value.trim();
      const senha = document.getElementById('inp-senha').value.trim();
      const erro = document.getElementById('login-error');
      erro.textContent = '';

      if (!filialPk) { erro.textContent = 'Selecione a filial.'; return; }
      if (!login || !senha) { erro.textContent = 'Preencha login e senha.'; return; }

      const { data, error } = await window.supabase
        .from('operadores').select('*')
        .eq('login', login).eq('senha', senha).eq('ativo', true);

      if (error || !data || data.length === 0) { erro.textContent = 'Login ou senha inválidos.'; return; }

      const op = data.find(d => d.filial_pk === parseInt(filialPk) || d.filial_pk === null);
      if (!op) { erro.textContent = 'Usuário sem acesso a esta filial.'; return; }

      const sel = document.getElementById('sel-filial');
      const opt = sel.options[sel.selectedIndex];
      const filialLogada = { pk: parseInt(filialPk), codigo: opt.dataset.codigo, nome: opt.dataset.nome };

      window.setSessao(filialLogada, op);

      document.getElementById('user-display').textContent = op.nome;
      document.getElementById('user-filial-badge').textContent = `${window.filialLogada.codigo} · ${window.filialLogada.nome}`;
      document.getElementById('sidebar-filial-label').textContent = `Filial ${window.filialLogada.codigo} — ${window.filialLogada.nome}`;

      aplicarPermissoes(op);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      document.getElementById('sidebar').classList.add('visible');
      ir('home.html', 'nav-home');
    }

    // Tenta restaurar sessão ao carregar a página
    (function restaurarSessao() {
      if (window.filialLogada && window.operadorLogado) {
        document.getElementById('user-display').textContent = window.operadorLogado.nome;
        document.getElementById('user-filial-badge').textContent = `${window.filialLogada.codigo} · ${window.filialLogada.nome}`;
        document.getElementById('sidebar-filial-label').textContent = `Filial ${window.filialLogada.codigo} — ${window.filialLogada.nome}`;
        aplicarPermissoes(window.operadorLogado);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        document.getElementById('sidebar').classList.add('visible');
        ir('home.html', 'nav-home');
      }
    })();

    function aplicarPermissoes(op) {
      const show = (id, v) => { const el = document.getElementById(id); if (el) el.style.display = v ? '' : 'none'; };
      const temAgenda = op.admin || op.acesso_agenda;
      show('nav-produtos', op.admin || op.acesso_produtos);
      show('nav-armazem', op.admin || op.acesso_armazens);
      show('nav-agenda', temAgenda);
      show('sec-agenda', temAgenda);
      const temSep = op.admin || op.acesso_separacao || op.acesso_criar_ordem;
      show('nav-separacao', temSep);
      show('sec-separacao', temSep);
      show('sec-admin', op.admin);
      show('nav-filiais', op.admin);
      show('nav-operador', op.admin);
    }

    function logout() {
      window.operadorLogado = null;
      window.filialLogada = null;
      document.getElementById('app').classList.remove('visible');
      document.getElementById('sidebar').classList.remove('visible');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('content').innerHTML = `
    <h2 style="color:var(--mtext2)">Bem-vindo</h2>
    <p style="color:var(--mmuted);font-size:13px;margin-top:6px">Escolha um módulo no menu lateral.</p>`;
    }

    // Carrega filiais ao iniciar
    (async function init() {
      const { data, error } = await window.supabase.from('filiais').select('pk,codigo,nome').eq('ativo', true).order('codigo');
      const loading = document.getElementById('filial-loading');
      const sel = document.getElementById('sel-filial');
      const btn = document.getElementById('btn-entrar');

      if (error || !data || data.length === 0) {
        if (loading) loading.textContent = '⚠️ Nenhuma filial encontrada';
        return;
      }

      data.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.pk;
        opt.dataset.codigo = f.codigo;
        opt.dataset.nome = f.nome;
        opt.textContent = `[${f.codigo}] ${f.nome}`;
        sel.appendChild(opt);
      });

      if (data.length === 1) sel.value = data[0].pk;
      if (loading) loading.style.display = 'none';
      sel.style.display = '';
      btn.disabled = false;
    })();
  </script>
</body>

</html>
