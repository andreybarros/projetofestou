<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    :root {
      --surface: #4f46e5;
      --surface-hv: #3730a3;
      --sidebar-act: #3730a3;
      --sidebar-txt: #fff;
      --sidebar-mut: rgba(255, 255, 255, .55);
      --content-bg: #f4f4f9;
      --content-txt: #1e1b4b;
      --content-muted: #6b7280;
      --border: rgba(255, 255, 255, .2);
    }

    [data-theme="dark"] {
      --surface: #1a1d27;
      --surface-hv: #22263a;
      --sidebar-act: #2e3250;
      --sidebar-txt: #e8e9f3;
      --sidebar-mut: rgba(255, 255, 255, .35);
      --content-bg: #0f1117;
      --content-txt: #e8e9f3;
      --content-muted: #7b7fa0;
      --border: rgba(255, 255, 255, .08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--content-bg);
      color: var(--sidebar-txt);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background .2s
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: var(--content-bg)
    }

    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .12);
      margin: 16px
    }

    [data-theme="dark"] .login-box {
      background: #1a1d27
    }

    .login-logo {
      text-align: center;
      margin-bottom: 20px
    }

    .login-logo div:first-child {
      font-size: 36px;
      margin-bottom: 6px
    }

    .login-logo h2 {
      color: #4f46e5;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .login-logo p {
      color: #888;
      font-size: 12px
    }

    .login-box label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    [data-theme="dark"] .login-box label {
      color: #9ca3af
    }

    .login-box input,
    .login-box select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
      background: #fff;
      color: #333;
      font-family: Arial, sans-serif
    }

    [data-theme="dark"] .login-box input,
    [data-theme="dark"] .login-box select {
      background: #22263a;
      border-color: #2e3250;
      color: #e8e9f3
    }

    .login-box input:focus,
    .login-box select:focus {
      border-color: #4f46e5
    }

    /* Filial select com badge */
    .filial-select-wrap {
      position: relative;
      margin-bottom: 12px
    }

    .filial-select-wrap select {
      margin-bottom: 0;
      appearance: none;
      padding-right: 36px;
      cursor: pointer
    }

    .filial-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #4f46e5;
      pointer-events: none;
      font-size: 14px
    }

    .filial-loading {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #f9fafb;
      border-radius: 6px;
      text-align: center
    }

    [data-theme="dark"] .filial-loading {
      background: #22263a;
      color: #7b7fa0
    }

    .divider-form {
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0 12px
    }

    [data-theme="dark"] .divider-form {
      background: #2e3250
    }

    .login-box .btn-entrar {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s
    }

    .login-box .btn-entrar:hover {
      background: #3730a3
    }

    .login-box .btn-entrar:disabled {
      background: #9ca3af;
      cursor: not-allowed
    }

    .login-error {
      color: #dc2626;
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      min-height: 16px
    }

    /* OVERLAY */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 99
    }

    #sidebar-overlay.show {
      display: block
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: var(--surface);
      color: var(--sidebar-txt);
      flex-direction: column;
      padding: 0;
      display: none;
      transition: width .25s, transform .25s, background .2s;
      flex-shrink: 0;
      display: flex;
      /* Garante que o flex funcione */
    }

    .sidebar-scroller {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-scroller::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-scroller::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .sidebar.visible {
      display: flex
    }

    .sidebar.collapsed {
      width: 70px
    }

    @media(max-width:768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        display: flex !important
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .sidebar.collapsed {
        width: 240px
      }

      /* Não colapsar no mobile */
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar.collapsed .sidebar-head {
      justify-content: center
    }

    .sidebar.collapsed .sidebar-titles {
      display: none
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: bold;
      line-height: 1.3;
      white-space: nowrap
    }

    .sidebar-filial {
      font-size: 11px;
      color: var(--sidebar-mut);
      margin-top: 3px;
      white-space: nowrap
    }

    .btn-close-sidebar {
      display: none;
      background: none;
      border: none;
      color: var(--sidebar-txt);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px
    }

    .btn-collapse-sidebar {
      background: none;
      border: none;
      color: var(--sidebar-txt);
      font-size: 18px;
      cursor: pointer;
      opacity: .7;
      transition: all .2s;
      display: block
    }

    .btn-collapse-sidebar:hover {
      opacity: 1
    }

    .sidebar.collapsed .btn-collapse-sidebar {
      transform: rotate(180deg)
    }

    @media(max-width:768px) {
      .btn-close-sidebar {
        display: block
      }

      .btn-collapse-sidebar {
        display: none
      }
    }

    .sidebar-section {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--sidebar-mut);
      padding: 16px 16px 6px;
      display: block;
      white-space: nowrap
    }

    .sidebar.collapsed .sidebar-section {
      display: none
    }

    .sidebar button.nav-btn {
      background: transparent;
      border: none;
      color: var(--sidebar-txt);
      padding: 12px 16px;
      margin: 0;
      border-radius: 0;
      cursor: pointer;
      text-align: left;
      font-family: Arial, sans-serif;
      font-size: 14px;
      width: 100%;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap
    }

    .sidebar button.nav-btn .nav-icon {
      font-size: 18px;
      min-width: 24px;
      text-align: center
    }

    .sidebar.collapsed button.nav-btn {
      padding: 14px 0;
      justify-content: center
    }

    .sidebar.collapsed button.nav-btn .nav-icon {
      font-size: 22px
    }

    .sidebar.collapsed button.nav-btn .nav-text {
      display: none
    }

    .sidebar button.nav-btn:hover {
      background: var(--surface-hv)
    }

    .sidebar button.nav-btn.active {
      background: var(--sidebar-act);
      font-weight: bold
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 0;
      background: inherit;
    }

    .sidebar.collapsed .sidebar-footer {
      padding: 14px 8px;
      text-align: center
    }

    .sidebar.collapsed .user-info {
      display: none
    }

    .sidebar.collapsed .theme-label {
      display: none
    }

    .sidebar.collapsed .theme-toggle {
      justify-content: center
    }

    .sidebar.collapsed .btn-logout span {
      display: none
    }

    .sidebar.collapsed .btn-logout::before {
      content: '🚪'
    }

    .user-info {
      margin-bottom: 10px
    }

    .user-info .user-name {
      font-size: 12px;
      color: var(--sidebar-mut)
    }

    .user-info strong {
      color: var(--sidebar-txt);
      display: block;
      font-size: 13px
    }

    .user-filial-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 10px;
      background: rgba(255, 255, 255, .15);
      color: var(--sidebar-txt);
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 600
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px
    }

    .theme-toggle span {
      font-size: 12px;
      color: var(--sidebar-mut)
    }

    .toggle-btn {
      position: relative;
      width: 38px;
      height: 20px;
      background: rgba(255, 255, 255, .2);
      border-radius: 20px;
      cursor: pointer;
      border: none;
      transition: background .2s;
      flex-shrink: 0
    }

    .toggle-btn::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform .2s
    }

    [data-theme="dark"] .toggle-btn {
      background: rgba(108, 99, 255, .5)
    }

    [data-theme="dark"] .toggle-btn::after {
      transform: translateX(18px)
    }

    .btn-logout {
      width: 100%;
      background: rgba(255, 255, 255, .1) !important;
      border: 1px solid rgba(255, 255, 255, .25) !important;
      color: var(--sidebar-txt) !important;
      padding: 8px 10px !important;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-family: Arial, sans-serif
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, .2) !important
    }

    /* APP */
    #app {
      display: none;
      flex: 1;
      flex-direction: row;
      overflow: hidden
    }

    #app.visible {
      display: flex
    }

    .topbar {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      padding: 12px 16px;
      flex-shrink: 0
    }

    @media(max-width:768px) {
      .topbar {
        display: flex
      }
    }

    .btn-hamburger {
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1
    }

    .topbar-title {
      color: #fff;
      font-size: 14px;
      font-weight: bold
    }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: var(--content-bg);
    }

    .content {
      flex: 1;
      padding: 20px;
      background: var(--content-bg);
      color: var(--content-txt);
      overflow-y: auto;
      transition: background .2s, color .2s
    }

    .content::-webkit-scrollbar {
      width: 5px
    }

    .content::-webkit-scrollbar-thumb {
      background: #c7d2fe;
      border-radius: 3px
    }

    @media(max-width:768px) {
      .content {
        padding: 14px
      }
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 16px;
      left: 16px;
      max-width: 420px;
      margin: 0 auto;
      background: #333;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
      z-index: 999
    }

    .sidebar-logo {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo img {
      max-width: 140px;
      height: auto;
    }

    .sidebar.collapsed .sidebar-logo {
      padding: 10px 5px;
    }

    .sidebar.collapsed .sidebar-logo img {
      max-width: 45px;
    }

    @media(min-width:480px) {
      #toast {
        left: auto;
        width: auto
      }
    }

    #toast.show {
      display: flex
    }

    #toast.success {
      background: #065f46
    }

    #toast.error {
      background: #991b1b
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <img src="img/logo.png" alt="Logo" style="max-width: 180px; margin-bottom: 12px;">

  <div id="app">

        <span class="sidebar-section">Estoque</span>

        <button class="nav-btn" id="nav-categoria" onclick="ir('cadastro_categoria.html','nav-categoria')"

        <button class="nav-btn" id="nav-clientes" onclick="ir('cadastro_clientes.html','nav-clientes')"

        <button class="nav-btn" id="nav-fornecedores" onclick="ir('cadastro_fornecedores.html','nav-fornecedores')"
          style="display:none"><span class="nav-icon">🤝</span><span class="nav-text">Fornecedores</span></button>

        <span class="sidebar-section">Estrutura</span>
        <button class="nav-btn" id="nav-armazem" onclick="ir('cadastro_armazem.html','nav-armazem')"

        <span class="sidebar-section" id="sec-agenda" style="display:none">Agenda</span>

        <button class="nav-btn" id="nav-filiais" onclick="ir('cadastro_filial.html','nav-filiais')"

        <button class="nav-btn" id="nav-fechamento" onclick="ir('fechamento_caixa.html','nav-fechamento')"

      <div class="sidebar-footer">

  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/shared.js"></script>
  <script>
    window.operadorLogado = null;
    window.filialLogada = null;
    window._editData = null;
    window._modulosFilial = new Set();

    // ── Sidebar ────────────────────────────────────────────────
    function abrirSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show') }
    function fecharSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show') }
    function toggleSidebarCollapse() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // ── Carrega filiais no login ───────────────────────────────
    (async function carregarFiliais() {
      const { data, error } = await window.supabase
        .from('filiais').select('pk,codigo,nome').eq('ativo', true).order('codigo');

      const wrap = document.getElementById('filial-wrap');
      const loading = document.getElementById('filial-loading');
      const sel = document.getElementById('sel-filial');
      const btn = document.getElementById('btn-entrar');

      if (error || !data || data.length === 0) {
        loading.textContent = '⚠️ Nenhuma filial encontrada';
        return;
      }

      data.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.pk;
        opt.dataset.codigo = f.codigo;
        opt.dataset.nome = f.nome;
        opt.textContent = `[${f.codigo}] ${f.nome}`;
        sel.appendChild(opt);
      });

      // Se só houver uma filial, seleciona automaticamente
      if (data.length === 1) sel.value = data[0].pk;

      loading.style.display = 'none';
      sel.style.display = '';
      btn.disabled = false;
    })();

    // ── Login ──────────────────────────────────────────────────
    async function fazerLogin() {
      const filialPk = document.getElementById('sel-filial').value;
      const login = document.getElementById('inp-login').value.trim();
      const senha = document.getElementById('inp-senha').value.trim();
      const erro = document.getElementById('login-error');
      erro.textContent = '';

      if (!filialPk) { erro.textContent = 'Selecione a filial.'; return; }
      if (!login || !senha) { erro.textContent = 'Preencha login e senha.'; return; }

      // Busca operador: aceita se filial_pk bater OU se for superadmin (filial_pk null)
      const { data, error } = await window.supabase
        .from('operadores').select('*')
        .eq('login', login).eq('senha', senha).eq('ativo', true);

      if (error || !data || data.length === 0) { erro.textContent = 'Login ou senha inválidos.'; return; }

      // Pega o operador que tem acesso a essa filial
      const op = data.find(d => d.filial_pk === parseInt(filialPk) || d.filial_pk === null);
      if (!op) { erro.textContent = 'Usuário sem acesso a esta filial.'; return; }

      // Monta objeto da filial
      const sel = document.getElementById('sel-filial');
      const opt = sel.options[sel.selectedIndex];
      window.filialLogada = { pk: parseInt(filialPk), codigo: opt.dataset.codigo, nome: opt.dataset.nome };
      window.operadorLogado = op;

      // Atualiza UI
      document.getElementById('user-display').textContent = op.nome;
      document.getElementById('user-filial-badge').textContent = `${window.filialLogada.codigo} · ${window.filialLogada.nome}`;
      document.getElementById('sidebar-filial-label').textContent = `Filial ${window.filialLogada.codigo} — ${window.filialLogada.nome}`;

      await aplicarPermissoes(op);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      document.getElementById('sidebar').classList.add('visible');

      // Carrega a Home por padrão
      ir('home.html', 'nav-home');
    }

    async function aplicarPermissoes(op) {
      const show = (id, v) => { const el = document.getElementById(id); if (el) el.style.display = v ? '' : 'none'; };
      const fil = window.filialLogada;

      // Busca módulos habilitados para esta filial
      const { data: modsData } = await window.supabase
        .from('modulos_filiais').select('modulo').eq('filial_pk', fil.pk).eq('ativo', true);
      const mods = new Set((modsData || []).map(m => m.modulo));
      window._modulosFilial = mods;

      const temAgenda = mods.has('agenda') && (op.admin || op.acesso_agenda);
      const temPdv = mods.has('pdv') && (op.admin || op.acesso_pdv);
      const temDash = mods.has('pdv') && (op.admin || op.acesso_dashboard);
      const temHist = mods.has('historico') && (op.admin || op.acesso_pdv || op.acesso_historico);
      const temReceitas = mods.has('receitas') && (op.admin || op.acesso_pdv || op.acesso_receitas);
      const temCat = mods.has('categorias') && (op.admin || op.acesso_produtos || op.acesso_categorias);
      const temSep = mods.has('separacao') && (op.admin || op.acesso_separacao || op.acesso_criar_ordem);
      const temClientes = mods.has('clientes') && (op.admin || op.acesso_clientes);
      const temDespesas = mods.has('despesas') && (op.admin || op.acesso_despesas);
      const temFinanceiro = mods.has('financeiro') && (op.admin || op.acesso_financeiro);

      show('nav-produtos', mods.has('produtos') && (op.admin || op.acesso_produtos));
      show('nav-armazem', mods.has('armazens') && (op.admin || op.acesso_armazens));
      show('nav-agenda', temAgenda);
      show('sec-agenda', temAgenda);
      show('nav-dashboard', temDash);
      show('nav-pdv', temPdv);
      show('nav-historico', temHist);
      show('nav-receitas', temReceitas);
      show('sec-pdv', temDash || temPdv || temHist || temReceitas);
      show('nav-clientes', temClientes);
      show('nav-fornecedores', temClientes);
      show('nav-categoria', temCat);
      show('nav-separacao', temSep);
      show('sec-separacao', temSep);
      show('sec-admin', op.admin);
      show('nav-financeiro', temFinanceiro);
      show('nav-despesas', temDespesas);
      show('nav-filiais', op.admin);
      show('nav-operador', op.admin);
      show('nav-fechamento', op.admin || op.acesso_fechamento);
    }

    function logout() {
      window.operadorLogado = null;
      window.filialLogada = null;
      window._editData = null;
      document.getElementById('app').classList.remove('visible');
      document.getElementById('sidebar').classList.remove('visible');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('inp-login').value = '';
      document.getElementById('inp-senha').value = '';
      document.getElementById('content').innerHTML =
        '<h2 style="color:var(--content-txt)">Bem-vindo</h2><p style="color:var(--content-muted);font-size:13px;margin-top:6px">Escolha um módulo no menu lateral.</p>';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    }

    // ── Carregador de módulos ──────────────────────────────────
    window.ir = window.carregarModulo = function (arquivo, navId) {
      fecharSidebar();
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (navId) document.getElementById(navId)?.classList.add('active');
      fetch(arquivo)
        .then(r => { if (!r.ok) throw new Error('Arquivo não encontrado: ' + arquivo); return r.text(); })
        .then(html => {
          const content = document.getElementById('content');
          content.innerHTML = html;
          content.scrollTo(0, 0);
          content.querySelectorAll('script').forEach(old => {
            const s = document.createElement('script');
            s.textContent = old.textContent;
            document.body.appendChild(s);
            old.remove();
          });
        })
        .catch(err => {
          document.getElementById('content').innerHTML = `<p style="color:#dc2626;padding:20px">❌ ${err.message}</p>`;
        });
    };
  </script>
</body>

</html>
