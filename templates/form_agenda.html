<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.mod*{box-sizing:border-box}
.mod{font-family:'DM Sans',sans-serif;--mc:#fff;--mc2:#fafafe;--mborder:#e0e7ff;--mtext2:#1e1b4b;--mmuted:#6b7280}
html[data-theme="dark"] .mod{--mc:#1a1d27;--mc2:#22263a;--mborder:#2e3250;--mtext2:#e8e9f3;--mmuted:#7b7fa0}
.mod-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:mfadeUp .3s ease;gap:12px;flex-wrap:wrap}
.mod-header h2{font-size:20px;font-weight:600;color:var(--mtext2);margin-bottom:4px}
.mod-header p{color:var(--mmuted);font-size:13px}
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.mbtn-primary{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}
.mbtn-primary:hover{background:#3730a3;transform:translateY(-1px)}
.mbtn-ghost{background:var(--mc);color:#4f46e5;border:1px solid #c7d2fe}
.mbtn-ghost:hover{background:var(--mc2)}
.edit-banner{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#92400e}
html[data-theme="dark"] .edit-banner{background:#2d2000;border-color:#78350f;color:#fcd34d}
.mform-card{background:var(--mc);border-radius:14px;padding:24px 26px;max-width:600px;box-shadow:0 4px 20px rgba(79,70,229,.08);border:1px solid var(--mborder);animation:mfadeUp .35s ease .05s both}
html[data-theme="dark"] .mform-card{box-shadow:0 4px 20px rgba(0,0,0,.3)}
@media(max-width:600px){.mform-card{padding:16px;border-radius:10px}}
.mform-group{margin-bottom:16px}
.mform-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--mmuted);margin-bottom:6px;text-transform:uppercase}
.mform-group input,.mform-group select,.mform-group textarea{width:100%;background:var(--mc2);border:1.5px solid var(--mborder);border-radius:8px;color:var(--mtext2);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
.mform-group input:focus,.mform-group select:focus,.mform-group textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.mform-group input::placeholder,.mform-group textarea::placeholder{color:#c4c9d9}
.mform-group textarea{resize:vertical;min-height:180px;line-height:1.6}
.mform-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mform-row-3{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px}
.filial-badge{display:inline-flex;align-items:center;gap:8px;background:#ede9fe;border:1.5px solid #c4b5fd;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;color:#4f46e5;width:100%}
html[data-theme="dark"] .filial-badge{background:#1e1a3a;border-color:#4c3a9e;color:#a78bfa}
@media(max-width:500px){.mform-row,.mform-row-3{grid-template-columns:1fr}}
.mdivider{height:1px;background:var(--mborder);margin:18px 0}
.mform-footer{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.textarea-hint{font-size:11px;color:var(--mmuted);margin-top:5px}
@keyframes mfadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

<div class="mod">
  <div class="mod-header">
    <div>
      <h2 id="form-titulo">Incluir Evento</h2>
      <p id="form-subtitulo">Preencha os dados do evento da agenda</p>
    </div>
    <button class="mbtn mbtn-ghost" onclick="window._editData=null; window._editAgPk=null; carregarModulo('agenda.html','nav-agenda')">← Voltar à Agenda</button>
  </div>
  <div id="edit-banner" class="edit-banner" style="display:none">
    ✏️ <span>Modo edição — altere os campos e clique em <strong>Salvar Alterações</strong></span>
  </div>
  <div class="mform-card">
    <div class="mform-group">
      <label>Filial</label>
      <div class="filial-badge" id="ag-filial-badge">🏢 <span id="ag-filial-nome">—</span></div>
    </div>
    <div class="mform-group">
      <label>Título do Evento</label>
      <input type="text" id="ag-titulo" placeholder="Ex: Festa Minnie, Chá de Bebê, Aniversário 10 anos...">
    </div>
    <div class="mform-row-3">
      <div class="mform-group">
        <label>Data do Evento</label>
        <input type="date" id="ag-data">
      </div>
      <div class="mform-group">
        <label>Hora Início</label>
        <input type="time" id="ag-hora-inicio">
      </div>
      <div class="mform-group">
        <label>Hora Fim <span style="font-weight:400;text-transform:none;font-size:10px">(opcional)</span></label>
        <input type="time" id="ag-hora-fim">
      </div>
    </div>
    <div class="mform-group">
      <label>O que precisa para o evento</label>
      <textarea id="ag-descricao" placeholder="Descreva tudo o que é necessário para o evento:&#10;&#10;• Decoração (balões, faixas, centro de mesa...)&#10;• Buffet (bolo, doces, salgados...)&#10;• Equipe necessária&#10;• Equipamentos&#10;• Observações importantes..."></textarea>
      <div class="textarea-hint">Este campo só aparece ao abrir o evento na agenda</div>
    </div>
    <div class="mdivider"></div>
    <div class="mform-footer">
      <button class="mbtn mbtn-primary" id="btn-salvar-ag" onclick="salvarEvento()">Salvar Evento</button>
      <button class="mbtn mbtn-ghost" onclick="limparFormAg()">Limpar</button>
    </div>
  </div>
</div>

<script>
window._editAgPk = null;

// Preenche badge da filial
(function(){
  var f=window.filialLogada;
  var el=document.getElementById('ag-filial-nome');
  if(el) el.textContent = f ? f.codigo+' – '+f.nome : 'Sem filial';
})();

(function() {
  const d = window._editData;
  window._editData = null;
  if (!d) return;
  window._editAgPk = d.pk;
  document.getElementById('form-titulo').textContent    = 'Alterar Evento';
  document.getElementById('form-subtitulo').textContent = 'Edite os dados e salve';
  document.getElementById('edit-banner').style.display  = 'flex';
  document.getElementById('btn-salvar-ag').textContent  = 'Salvar Alterações';
  document.getElementById('ag-titulo').value       = d.titulo       ?? '';
  document.getElementById('ag-data').value         = d.data_evento  ?? '';
  document.getElementById('ag-hora-inicio').value  = d.hora_inicio ? d.hora_inicio.slice(0,5) : '';
  document.getElementById('ag-hora-fim').value     = d.hora_fim    ? d.hora_fim.slice(0,5)    : '';
  document.getElementById('ag-descricao').value    = d.descricao    ?? '';
})();

async function salvarEvento() {
  const titulo      = document.getElementById('ag-titulo')?.value.trim();
  const data_evento = document.getElementById('ag-data')?.value;
  const hora_inicio = document.getElementById('ag-hora-inicio')?.value;
  const hora_fim    = document.getElementById('ag-hora-fim')?.value || null;
  const descricao   = document.getElementById('ag-descricao')?.value.trim() || null;

  if (!titulo)      { window.showToast('Informe o título do evento.','error'); return; }
  if (!data_evento) { window.showToast('Informe a data do evento.','error');  return; }
  if (!hora_inicio) { window.showToast('Informe a hora de início.','error');  return; }

  const criado_por = window.operadorLogado?.login ?? null;
  const btn = document.getElementById('btn-salvar-ag');
  btn.disabled = true;

  const filial_pk = window.filialLogada?.pk || null;
  const payload = { titulo, data_evento, hora_inicio, hora_fim, descricao, criado_por, filial_pk };

  if (window._editAgPk) {
    const { error } = await window.supabase.from('agenda').update(payload).eq('pk', window._editAgPk);
    btn.disabled = false;
    if (error) { window.showToast('Erro: '+error.message,'error'); return; }
    window._editAgPk = null;
    window.showToast('Evento atualizado!');
    carregarModulo('agenda.html','nav-agenda');
  } else {
    const { error } = await window.supabase.from('agenda').insert([payload]);
    btn.disabled = false;
    if (error) { window.showToast('Erro: '+error.message,'error'); return; }
    window.showToast('Evento incluído na agenda!');
    carregarModulo('agenda.html','nav-agenda');
  }
}

function limparFormAg() {
  window._editAgPk = null;
  ['ag-titulo','ag-data','ag-hora-inicio','ag-hora-fim','ag-descricao'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('btn-salvar-ag').textContent = 'Salvar Evento';
  document.getElementById('edit-banner').style.display = 'none';
}
</script>
